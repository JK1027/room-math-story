<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 방탈출 게임</title>
    <!-- 구글 폰트 및 외부 리소스 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbit&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;500;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #18120F;
            --glass-bg: rgba(30, 20, 15, 0.75);
            --glass-border: rgba(229, 169, 60, 0.25);
            --accent: #E5A93C;
            --accent-hover: #F2C063;
            --text-main: #F4EBE1;
            --text-muted: #A89F91;
        }

        /* ─── 학년/단원별 테마별 CSS 확장 바인딩 ─── */
        body.theme-atlantis {
            --bg-main: #0b1a2d;
            --glass-bg: rgba(15, 30, 50, 0.75);
            --glass-border: rgba(96, 165, 250, 0.25);
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
        }
        body.theme-da_vinci {
            --bg-main: #24140a;
            --glass-bg: rgba(45, 25, 15, 0.75);
            --glass-border: rgba(217, 119, 6, 0.25);
            --accent: #d97706;
            --accent-hover: #fbbf24;
        }
        body.theme-space {
            --bg-main: #0c0a1c;
            --glass-bg: rgba(20, 15, 35, 0.75);
            --glass-border: rgba(168, 85, 247, 0.25);
            --accent: #a855f7;
            --accent-hover: #c084fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(229,169,60,0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(139,92,26,0.08) 0%, transparent 40%);
            z-index: -2;
        }

        /* 반응형 컨테이너 레이아웃 */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        /* 공통 글래스모피즘 패널 구조 */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.02);
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-size: 1.4rem;
            color: var(--text-main);
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* 타이머 영역 */
        .game-timer {
            float: right;
            color: #ef4444;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #ef4444;
        }

        .panel-image {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        /* 스토리 및 지문 */
        .story-box {
            cursor: pointer;
            position: relative;
            background: linear-gradient(90deg, rgba(55,40,30,0.5) 0%, rgba(0,0,0,0.3) 100%);
            border-left: 4px solid var(--accent);
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
            border-radius: 0 12px 12px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            height: 90px;
            max-height: 90px;
            overflow: hidden;
            box-sizing: border-box;
        }

        .story-text {
            width: 100%;
            height: 100%;
            overflow: hidden;
            line-height: 1.6;
            font-size: 1.02rem;
            color: var(--text-main);
            text-align: justify;
        }

        .story-log-trigger {
            position: absolute;
            bottom: 4px;
            right: 8px;
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #34D399;
            padding: 2px 6px;
            font-size: 0.7rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            z-index: 10;
        }
        
        .story-log-trigger:hover {
            background: rgba(16, 185, 129, 0.4);
            color: white;
        }

        /* 퀴즈 문제 구역 */
        .question-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
        }

        .question-box::before {
            content: 'Q';
            position: absolute;
            font-family: 'Share Tech Mono', monospace;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.02);
            top: -10px;
            right: 10px;
            font-weight: bold;
            pointer-events: none;
        }

        .question-content {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .input-group {
            margin-top: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-family: 'Share Tech Mono', monospace, 'Noto Sans KR';
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            box-sizing: border-box;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(229,169,60,0.4), inset 0 2px 4px rgba(0,0,0,0.5);
        }

        /* 객관식 라디오 레이아웃 */
        .radio-label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
        }
        
        .radio-label:hover {
            background: rgba(229, 169, 60, 0.08);
            border-color: var(--accent);
        }

        /* 버튼 및 그룹 */
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            background: linear-gradient(135deg, #a16207, #78350f);
            color: white;
            border: 1px solid #d97706;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(120,53,15,0.5), inset 0 2px 5px rgba(255,255,255,0.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            outline: none;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.6s;
        }

        .btn:hover::after {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(229,169,60,0.5), inset 0 2px 5px rgba(255,255,255,0.5);
            border-color: #f59e0b;
        }

        .btn-hint {
            display: inline-block;
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #34D399;
            padding: 4px 10px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            vertical-align: middle;
            margin-left: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-hint:hover {
            background: rgba(16, 185, 129, 0.4);
            color: #fff;
            box-shadow: 0 0 10px rgba(52,211,153,0.4);
        }

        /* 에러 메시지 */
        .error-msg {
            color: #EF4444;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(239,68,68,0.3);
        }

        /* 락다운 오버레이 */
        .glitch-overlay-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(239, 68, 68, 0.15);
            z-index: 99999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            border: 10px solid #ef4444;
        }
        .glitch-overlay-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2.8rem;
            color: #ef4444;
            text-shadow: 0 0 20px #ef4444;
        }

        /* 모달 로그 오버레이 */
        #logModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 600px;
            background: rgba(30, 20, 15, 0.95);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 2rem;
            z-index: 10000;
            color: #ffffff;
        }

        /* 사운드 조절 고정 버튼 */
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(30, 20, 15, 0.6);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
            transition: all 0.3s;
            font-weight: bold;
        }

        .sound-toggle:hover {
            background: var(--accent);
            border-color: white;
            box-shadow: 0 0 15px var(--accent);
        }

        /* 진행도 표시 바 */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin-bottom: 2rem;
            overflow: hidden;
            display: none;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b95c1a, var(--accent));
            border-radius: 3px;
            box-shadow: 0 0 10px var(--accent);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 쉐이크 흔들림 효과 */
        .shake { animation: shake-act 0.4s; }
        @keyframes shake-act {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            body {
                overflow-y: auto;
            }
            .container {
                padding: 10px;
            }
            .glass-panel {
                padding: 1.5rem;
                border-radius: 16px;
            }
            h2 {
                font-size: 1.1rem;
                margin-bottom: 1.2rem;
            }
            .story-box {
                height: 80px;
                max-height: 80px;
            }
            .btn-group {
                flex-direction: column;
                gap: 0.6rem;
            }
            .sound-toggle {
                top: 10px;
                right: 10px;
                font-size: 0.8rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <button id="soundToggle" class="sound-toggle" onclick="toggleSound()">🔇 소리 꺼짐</button>

    <div class="container">
        <!-- 상단 진행도 표시 바 -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 런타임 패널 컨테이너 -->
        <div id="panels-container"></div>
    </div>

    <!-- 락다운 및 공통 모달 -->
    <div id="glitchOverlay" class="glitch-overlay-screen">
        <div class="glitch-overlay-text">🚨 SYSTEM ERROR 🚨</div>
        <div style="color: white; margin-top: 10px;">ACCESS TEMPORARILY LOCKDOWN</div>
    </div>

    <div id="logModal">
        <h3>📜 지나온 이전 스토리 로그</h3>
        <div id="logContent" style="max-height: 250px; overflow-y: auto; font-size: 0.9rem; line-height: 1.5;"></div>
        <button class="btn" style="margin-top: 15px; width: 100%;" onclick="closeLog()">닫기</button>
    </div>

    <!-- ─── GameRuntime 공통 자바스크립트 엔진 ─── -->
    <script>
        // 전역 다이얼로그 로그 저장
        const storyLogHistory = [];

        const GameRuntime = {
            data: null,
            timerId: null,
            timeLeft: 2400,
            currentWrongCount: 0,
            totalWrongCount: 0,
            activePanelId: 'panel_intro',

            start: function(gameData) {
                this.data = gameData;
                this.timeLeft = gameData.timer_limit_sec || 2400;
                
                // CSS 테마 적용
                document.body.className = 'theme-' + (gameData.theme || 'atlantis');
                
                this.render();
                this.bindEvents();
                this.showPanel('panel_intro');
            },

            showPanel: function(panelId) {
                document.querySelectorAll('.glass-panel').forEach(p => p.classList.remove('active'));
                const target = document.getElementById(panelId);
                if (target) {
                    target.classList.add('active');
                    this.activePanelId = panelId;

                    // 퀴즈 입력 폼 및 진행 버튼 탐색 후 숨김 처리
                    const toHide = target.querySelectorAll('.question-box, .btn-group');
                    toHide.forEach(el => {
                        el.style.opacity = '0';
                        el.style.transform = 'translateY(10px)';
                        el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                        el.style.pointerEvents = 'none';
                    });

                    // 스토리 타이머 구동 후 완료 콜백에서 보여줌
                    const storyBox = target.querySelector('.story-box');
                    if (storyBox) {
                        typeWriterHTML(storyBox, 15, () => {
                            toHide.forEach(el => {
                                el.style.opacity = '1';
                                el.style.transform = 'translateY(0)';
                                el.style.pointerEvents = 'auto';
                            });
                        });
                    } else {
                        toHide.forEach(el => {
                            el.style.opacity = '1';
                            el.style.transform = 'translateY(0)';
                            el.style.pointerEvents = 'auto';
                        });
                    }
                }
                
                // 오프닝을 넘어가 게임에 들어가는 시점에 타이머 자동 시작
                if (panelId === 'panel_q1') {
                    this.startTimer();
                }
            },

            render: function() {
                const container = document.getElementById('panels-container');
                container.innerHTML = '';
                
                const assetsBase = 'https://raw.githubusercontent.com/JK1027/room-math-story/feat/cleanup-storyboards/assets/units/' + this.data.unit_code;
                
                // 1. INTRO PANEL
                const introHtml = 
                    '<div id="panel_intro" class="glass-panel active">\n' +
                    '    <h2>SYSTEM INITIATION</h2>\n' +
                    '    <img src="' + assetsBase + '/' + this.data.intro.image + '" class="panel-image" alt="Intro">\n' +
                    '    <div class="story-box">\n' +
                    '        <div class="story-text"></div>\n' +
                    '    </div>\n' +
                    '    <!-- 학번/이름 입력 및 사운드 조절 UI 영역 -->\n' +
                    '    <div class="user-info-section" style="margin-top: 15px; border-top: 1px solid var(--border-glass); padding-top: 15px;">\n' +
                    '        <div style="display: flex; gap: 10px; margin-bottom: 10px;">\n' +
                    '            <div style="flex: 1;">\n' +
                    '                <label style="font-size: 0.85rem; color: var(--accent-neon); display: block; margin-bottom: 5px;">학번 (예: 10101)</label>\n' +
                    '                <input type="text" id="studentNum" placeholder="5자리 학번" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 4px; color: white; box-sizing: border-box;">\n' +
                    '            </div>\n' +
                    '            <div style="flex: 1;">\n' +
                    '                <label style="font-size: 0.85rem; color: var(--accent-neon); display: block; margin-bottom: 5px;">이름</label>\n' +
                    '                <input type="text" id="studentName" placeholder="이름" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 4px; color: white; box-sizing: border-box;">\n' +
                    '            </div>\n' +
                    '        </div>\n' +
                    '        <div style="display: flex; justify-content: space-between; align-items: center;">\n' +
                    '            <div id="intro-error" style="color: var(--danger-neon); font-size: 0.85rem; display: none;"></div>\n' +
                    '            <button id="soundToggle" class="btn-hint" onclick="toggleSound()" style="margin-left: auto;">🔇 소리 꺼짐</button>\n' +
                    '        </div>\n' +
                    '    </div>\n' +
                    '    <div class="btn-group">\n' +
                    '        <button class="btn" onclick="GameRuntime.submitUserInfo()">미션 개시</button>\n' +
                    '    </div>\n' +
                    '</div>';
                container.insertAdjacentHTML('beforeend', introHtml);
                
                // 인트로 안전 주입
                const introPanel = container.lastElementChild;
                const introHtmlParsed = parseMarkdown(this.data.intro.story);
                introPanel.querySelector('.story-text').dataset.rawHtml = introHtmlParsed;
                introPanel.querySelector('.story-text').innerHTML = '';
                
                // 동적으로 로드되는 UI 연계 처리
                const isGasEnv = typeof google !== 'undefined' && google.script && google.script.run;
                if (!isGasEnv) {
                    window.playerFirstName = "캡틴";
                }
                
                storyLogHistory.push('[오프닝]: ' + this.data.intro.story);

                // 2. Q1 ~ Q20 PANELS
                this.data.questions.forEach((q, idx) => {
                    const nextStage = idx === 19 ? 'panel_event4' : 
                                     (q.qnum === 5 ? 'panel_event1' : 
                                      (q.qnum === 10 ? 'panel_event2' : 
                                       (q.qnum === 15 ? 'panel_event3' : ('panel_q' + (q.qnum + 1)))));
                    
                    const btnText = q.qnum === 1 ? '잠항 시작' : (q.qnum === 20 ? '탈출하기' : '다음으로');
                    
                    let inputHtml = '';
                    if (q.choices && q.choices.length > 0) {
                        let optionsHtml = '';
                        q.choices.forEach(opt => {
                            optionsHtml += 
                                '<label class="radio-label">\n' +
                                '    <input type="radio" name="ans_group' + q.qnum + '" value="' + opt + '"> ' + opt + '\n' +
                                '</label>';
                        });
                        inputHtml = '<div class="options-group" id="ans' + q.qnum + '_group">' + optionsHtml + '</div>';
                    } else {
                        inputHtml = 
                            '<div class="input-group">\n' +
                            '    <input type="text" id="ans' + q.qnum + '" placeholder="' + q.placeholder + '">\n' +
                            '</div>';
                    }

                    const qHtml = 
                        '<div class="glass-panel ' + (q.extra_class || '') + '">\n' +
                        '    <h2>제 ' + q.qnum + '구역: ' + q.title + ' <span class="game-timer">40:00</span></h2>\n' +
                        '    <img src="' + assetsBase + '/' + q.image + '" class="panel-image" alt="Q' + q.qnum + '">\n' +
                        '    <div class="story-box">\n' +
                        '        <div class="story-text"></div>\n' +
                        '        <button class="story-log-trigger" onclick="openLog()">📜 이전 대사</button>\n' +
                        '    </div>\n' +
                        '    <div class="question-box">\n' +
                        '        <div class="question-content">\n' +
                        '            <strong class="q-text-el"></strong>\n' +
                        '            <button class="btn-hint">💡 힌트</button>\n' +
                        '            <div class="q-input-container"></div>\n' +
                        '        </div>\n' +
                        '    </div>\n' +
                        '    <div class="error-msg"></div>\n' +
                        '    <div class="btn-group">\n' +
                        '        <button class="btn" onclick="GameRuntime.submitAnswer(' + q.qnum + ')">' + btnText + '</button>\n' +
                        '    </div>\n' +
                        '</div>';
                    container.insertAdjacentHTML('beforeend', qHtml);
                    
                    // 퀴즈 요소 안전 주입 및 동적 ID 부여
                    const qPanel = container.lastElementChild;
                    qPanel.id = 'panel_q' + q.qnum;
                    
                    const errorEl = qPanel.querySelector('.error-msg');
                    errorEl.id = 'error' + q.qnum;
                    
                    const qStoryParsed = parseMarkdown(q.story);
                    qPanel.querySelector('.story-text').dataset.rawHtml = qStoryParsed;
                    qPanel.querySelector('.story-text').innerHTML = '';
                    qPanel.querySelector('.q-text-el').innerHTML = q.qtext;

            startTimer: function() {

                this.updateTimerDisplay();
                this.timerId = setInterval(() => {
                    this.timeLeft--;

                    if (this.timeLeft <= 0) {
                        clearInterval(this.timerId);
                        this.showPanel('gameover');
                    }
                }, 1000);
            },

            updateTimerDisplay: function() {
                const minutes = Math.floor(this.timeLeft / 60);
                const seconds = this.timeLeft % 60;
                const timeStr = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                document.querySelectorAll('.game-timer').forEach(el => {
                    el.innerText = timeStr;
                });
            },

            submitAnswer: function(qnum) {
                const q = this.data.questions[qnum - 1];
                let userAns = '';
                
                if (q.choices && q.choices.length > 0) {
                    const checked = document.querySelector(`input[name="ans_group${qnum}"]:checked`);
                    userAns = checked ? checked.value : '';
                } else {
                    const inputEl = document.getElementById(`ans${qnum}`);
                    userAns = inputEl ? inputEl.value.trim() : '';
                }

                const isCorrect = this.checkAnswer(q.answer, userAns);
                
                if (isCorrect) {
                    this.currentWrongCount = 0;
                    try { playSuccess(); } catch(e) {}
                    
                    const nextStage = qnum === 20 ? 'panel_event4' : 
                                     (qnum === 5 ? 'panel_event1' : 
                                      (qnum === 10 ? 'panel_event2' : 
                                       (qnum === 15 ? 'panel_event3' : `panel_q${qnum + 1}`))
                                     );
                                     
                    const nextProgress = qnum * 5;
                    this.triggerStageTransition(`panel_q${qnum}`, nextStage, nextProgress);
                } else {
                    try { playError(); } catch(e) {}
                    this.currentWrongCount++;
                    this.totalWrongCount++;
                    this.timeLeft -= 60; // 오답시 60초 감소 페널티
                    if (this.timeLeft < 0) this.timeLeft = 0;
                    this.updateTimerDisplay();
                    
                    // 패널 흔들기 효과
                    const panel = document.getElementById(`panel_q${qnum}`);
                    if (panel) {
                        panel.classList.remove('shake');
                        void panel.offsetWidth;
                        panel.classList.add('shake');
                    }

                    const errMsg = document.getElementById(`error${qnum}`);
                    if (errMsg) {
                        errMsg.style.display = 'block';
                        setTimeout(() => errMsg.style.display = 'none', 3000);
                    }

                    // 3회 오답 시 구역 초기화
                    if (this.currentWrongCount >= 3) {
                        this.currentWrongCount = 0;
                        document.getElementById('glitchOverlay').style.display = 'flex';
                        setTimeout(() => document.getElementById('glitchOverlay').style.display = 'none', 1500);
                        
                        let resetQnum, resetProg, zoneName;
                        if (qnum <= 5) {
                            resetQnum = 1; resetProg = 0; zoneName = "1구역";
                        } else if (qnum <= 10) {
                            resetQnum = 6; resetProg = 25; zoneName = "2구역";
                        } else if (qnum <= 15) {
                            resetQnum = 11; resetProg = 50; zoneName = "3구역";
                        } else {
                            resetQnum = 16; resetProg = 75; zoneName = "4구역";
                        }

                        alert(`🚨 3회 오답! ${zoneName}의 처음인 제 ${resetQnum}구역으로 강제 이송됩니다.`);
                        // 입력 초기화
                        const resetInput = document.getElementById(`ans${resetQnum}`);
                        if (resetInput) resetInput.value = '';
                        document.querySelectorAll(`input[name="ans_group${resetQnum}"]`).forEach(el => el.checked = false);
                        
                        this.triggerStageTransition(`panel_q${qnum}`, `panel_q${resetQnum}`, resetProg);
                    }
                }
            },

            checkAnswer: function(spec, ans) {
                if (!spec || !spec.type || !spec.values) return false;
                
                const cleanAns = ans.trim();
                
                if (spec.type === 'exact') {
                    return spec.values.includes(cleanAns);
                } else if (spec.type === 'any_of') {
                    return spec.values.includes(cleanAns);
                } else if (spec.type === 'normalized_exact') {
                    const normUser = cleanAns.replace(/\s+/g, '').toUpperCase();
                    return spec.values.some(v => v.replace(/\s+/g, '').toUpperCase() === normUser);
                }
                
                return false;
            },

            triggerStageTransition: function(currentId, nextId, progress) {
                if (currentId === 'panel_intro') {
                    const progContainer = document.getElementById('progressContainer');
                    if (progContainer) progContainer.style.display = 'block';
                }
                
                const progBar = document.getElementById('progressBar');
                if (progBar) progBar.style.width = progress + '%';

                // 최종 성공 도달 시
                if (nextId === 'outro') {
                    clearInterval(this.timerId);
                    try { playVictory(); } catch(e) {}
                    
                    // 구글 앱스 스크립트 종료 처리 호출
                    try {
                        if (window.userRecordRow && typeof google !== 'undefined' && google.script && google.script.run) {
                            google.script.run.recordEnd(window.userRecordRow, this.data.unit_code);
                        }
                    } catch(e) {
                        console.warn("GAS recordEnd failed:", e);
                    }

                    // 멀티엔딩 텍스트 분기
                    const outroTextEl = document.getElementById('outro-dynamic-text');

                        } else {
                            outroTextEl.innerHTML = `간신히 관문을 통과했습니다.<br><br><strong>[${this.data.helper}]</strong>: "휴, ${firstName}님, 간신히 보물을 챙겼습니다. 탈출 장치를 가동해 이곳을 떠납시다!"<br><br>미션 성공!`;

                this.showPanel(nextId);
                
                // GAS 진행도 리포트

                        google.script.run.recordProgress(window.userRecordRow, progress);
                    }

                    console.warn("GAS progress report failed:", e);

            skipStory: function() {
                if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
                const activePanel = document.getElementById(this.activePanelId);
                if (!activePanel) return;
                const storyBox = activePanel.querySelector('.story-box');
                if (storyBox) {
                    const textEl = storyBox.querySelector('.story-text') || storyBox;
                    let rawHtml = textEl.dataset.rawHtml || textEl.innerHTML;
                    rawHtml = rawHtml.replace(/- \*\*\[일러스트 지시.*?\]\*\*[^\n]*/gi, '');
                    rawHtml = rawHtml.replace(/- \[일러스트 지시.*?\][^\n]*/gi, '');
                    rawHtml = rawHtml.replace(/<br><span style="font-size:0.8rem; color:var\(--accent\); font-weight:bold; animation: blink 1s infinite;">\(클릭하여 다음 대사 보기 ▼\)<\/span>/gi, '');
                    textEl.innerHTML = rawHtml.trim();
                    storyBox.style.cursor = 'default';
                }
                
                // 숨김 패널들 즉시 표시
                const toShow = activePanel.querySelectorAll('.question-box, .btn-group');

        };

        // 간단한 Markdown -> HTML 변환 헬퍼 함수
        function parseMarkdown(text) {
            if (!text) return '';
            let html = text;
            // 일러스트 지시 제거
            html = html.replace(/- \*\*\[일러스트 지시.*?\]\*\*[^\n]*/gi, '');
            html = html.replace(/- \[일러스트 지시.*?\][^\n]*/gi, '');
            html = html.trim();
            // **bold** -> <strong>bold</strong>
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // *italic* -> <em>italic</em>
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            // \n -> <br>
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        // Web Audio API 기반 오디오 엔진 (기본 Muted)
        let isMuted = true;
        let audioCtx = null;
        let bgmOsc = null;
        let bgmGain = null;
        let bgmLfo = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSynth(freq, type, duration, vol) {
            if (isMuted) return;
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        function stopBGM() {
            try {
                if(bgmOsc) { bgmOsc.stop(); bgmOsc.disconnect(); bgmOsc = null; }
                if(bgmLfo) { bgmLfo.stop(); bgmLfo.disconnect(); bgmLfo = null; }
            } catch(e){}
        }

        function startBGM() {
            if (isMuted) return;
            try {
                initAudio();
                if(bgmOsc) return;
                bgmOsc = audioCtx.createOscillator();
                bgmGain = audioCtx.createGain();
                bgmOsc.type = 'triangle';
                bgmOsc.frequency.setValueAtTime(55.00, audioCtx.currentTime);
                bgmGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                bgmOsc.connect(bgmGain);
                bgmGain.connect(audioCtx.destination);
                bgmOsc.start();
                
                bgmLfo = audioCtx.createOscillator();
                bgmLfo.type = 'sine';
                bgmLfo.frequency.setValueAtTime(0.15, audioCtx.currentTime); 
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                bgmLfo.connect(lfoGain);
                lfoGain.connect(bgmGain.gain);
                bgmLfo.start();
            } catch(e) {}
        }

        function toggleSound() {
            isMuted = !isMuted;
            const btn = document.getElementById('soundToggle');
            if (isMuted) {
                if(btn) btn.innerText = '🔇 소리 꺼짐';
                stopBGM();
            } else {
                if(btn) btn.innerText = '🔊 소리 켜짐';
                startBGM();
            }
        }

        function playClick() { playSynth(800, 'sine', 0.1, 0.5); }
        function playTick() { playSynth(1500, 'square', 0.04, 0.15); }
        function playSuccess() { 
            playSynth(523.25, 'sine', 0.15, 0.7); 
            setTimeout(()=>playSynth(659.25, 'sine', 0.15, 0.7), 150); 
            setTimeout(()=>playSynth(783.99, 'sine', 0.3, 0.7), 300); 
        }
        function playError() {
            playSynth(150, 'sawtooth', 0.3, 0.6);
            setTimeout(()=>playSynth(100, 'sawtooth', 0.4, 0.6), 200);
        }
        function playVictory() {
            stopBGM();
            [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                setTimeout(()=>playSynth(f, 'square', 0.2, 0.6), i*150);
            });
        }

        // 문장 마침표/느낌표/물음표 분할 헬퍼
        let typeWriterTimeout;
        function splitSentences(text) {
            let result = [];
            let start = 0;
            for (let i = 0; i < text.length; i++) {
                const char = text.charAt(i);
                if (char === '.' || char === '!' || char === '?') {
                    const nextChar = text.charAt(i + 1);
                    if (!nextChar || nextChar === ' ' || nextChar === '\n' || nextChar === '<') {
                        result.push(text.substring(start, i + 1).trim());
                        start = i + 1;
                    }
                }
            }
            const finalChunk = text.substring(start).trim();
            if (finalChunk) result.push(finalChunk);
            return result;
        }

        // 타이핑 효과 구현 함수 (HTML 태그 안전 파싱 및 지연 렌더링)
        function typeWriterHTML(element, speed = 25, onComplete = null) {
            let isComplete = false;
            let currentChunkIndex = 0;
            let chunks = [];
            const textEl = element.querySelector('.story-text') || element;
            if(!textEl) {
                if(onComplete) onComplete();
                return;
            }

            function triggerComplete() {
                if(!isComplete) {
                    isComplete = true;
                    element.style.cursor = 'default';
                    if(onComplete) onComplete();
                }
            }
            if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
            
            let htmlContent = textEl.dataset.rawHtml || textEl.innerHTML;
            // 일러스트 지시 필터링
            htmlContent = htmlContent.replace(/- \*\*\[일러스트 지시.*?\]\*\*[^\n]*/gi, '');
            htmlContent = htmlContent.replace(/- \[일러스트 지시.*?\][^\n]*/gi, '');
            htmlContent = htmlContent.trim();

            if (!textEl.dataset.rawHtml) {
                textEl.dataset.rawHtml = htmlContent;
            }
            
            let rawLines = htmlContent.split(/<br\s*\/?>/i);
            for(let line of rawLines) {
                let sentences = splitSentences(line);
                for(let s of sentences) {
                    if(s.trim()) chunks.push(s.trim());
                }
            }

            if(chunks.length === 0) {
                triggerComplete();
                return;
            }
            let i = 0;
            let textStr = '';
            let typingFinished = false;
            element.style.cursor = 'pointer';
            
            function renderChunk() {
                if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
                i = 0;
                textStr = '';
                typingFinished = false;
                let chunkText = chunks[currentChunkIndex].trim();
                
                const currentPanel = element.closest('.glass-panel');
                const panelTitle = currentPanel.querySelector('h2') ? currentPanel.querySelector('h2').innerText : '단서';
                const logEntry = '<strong>[' + panelTitle + ']</strong> ' + chunkText;
                if (!storyLogHistory.includes(logEntry)) {
                    storyLogHistory.push(logEntry);
                }
                
                if(currentChunkIndex < chunks.length - 1) {
                    chunkText += '<br><span style="font-size:0.8rem; color:var(--accent); font-weight:bold; animation: blink 1s infinite;">(클릭하여 다음 대사 보기 ▼)</span>';
                }
                textEl.innerHTML = '';
                
                function type() {
                    if (i < chunkText.length) {
                        if (chunkText.charAt(i) === '<') {
                            const endTag = chunkText.indexOf('>', i);
                            if (endTag !== -1) {
                                textStr += chunkText.substring(i, endTag + 1);
                                i = endTag + 1;
                            } else {
                                textStr += chunkText.charAt(i);
                                i++;
                            }
                        } else {
                            textStr += chunkText.charAt(i);
                            i++;
                        }
                        // 깜빡이 커서 효과 적용
                        textEl.innerHTML = textStr + (i % 2 === 0 ? '█' : '');
                        if (chunkText.charAt(i-1) !== ' ' && chunkText.charAt(i-1) !== '\n') {
                            try { playTick(); } catch(e) {}
                        }
                        typeWriterTimeout = setTimeout(type, speed);
                    } else {
                        textEl.innerHTML = chunkText;
                        typingFinished = true;
                        if(currentChunkIndex === chunks.length - 1) {
                            triggerComplete();
                        }
                    }
                }
                type();
            }
            element.onclick = (e) => {
                // 스킵 버튼을 직접 클릭한 경우는 이벤트 전파 방지로 여기서 걸러짐
                if (!typingFinished) {
                    clearTimeout(typeWriterTimeout);
                    let chunkText = chunks[currentChunkIndex].trim();
                    if(currentChunkIndex < chunks.length - 1) {
                        chunkText += '<br><span style="font-size:0.8rem; color:var(--accent); font-weight:bold; animation: blink 1s infinite;">(클릭하여 다음 대사 보기 ▼)</span>';
                    }
                    textEl.innerHTML = chunkText;
                    typingFinished = true;
                    if(currentChunkIndex === chunks.length - 1) triggerComplete();
                } else {
                    if (currentChunkIndex < chunks.length - 1) {
                        currentChunkIndex++;
                        renderChunk();
                    }
                }
            };
            renderChunk();
        }

        // 모달 이전 대사 다이얼로그 열기
        function openLog() {
            const modal = document.getElementById('logModal');
            const content = document.getElementById('logContent');
            if (modal && content) {
                content.innerHTML = storyLogHistory.map(line => `<p style='border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:6px;'>${line}</p>`).join('');
                modal.style.display = 'block';
            }
        }

        function closeLog() {
            const modal = document.getElementById('logModal');
            if (modal) modal.style.display = 'none';
        }
    </script>
</body>
</html>
