<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 방탈출 게임</title>
    <!-- Pretendard 웹폰트 및 외부 리소스 -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0F172A; 
            --secondary: #1E3A8A; 
            --accent: #FBBF24; 
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --danger: #EF4444;
            --success: #10B981;
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(96, 165, 250, 0.4);
            --accent-blue: #60A5FA;
            --error-red: #EF4444;
        }

        /* ─── 학년/단원별 테마별 CSS 확장 바인딩 ─── */
        body.theme-atlantis {
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(96, 165, 250, 0.4);
            --accent: #FBBF24;
            --accent-blue: #60A5FA;
        }
        body.theme-da_vinci {
            --glass-bg: rgba(45, 25, 15, 0.75);
            --glass-border: rgba(217, 119, 6, 0.4);
            --accent: #fbbf24;
            --accent-blue: #f59e0b;
        }
        body.theme-space {
            --glass-bg: rgba(20, 15, 35, 0.75);
            --glass-border: rgba(168, 85, 247, 0.4);
            --accent: #c084fc;
            --accent-blue: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #020617;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(2, 6, 23, 0.95) 100%), rgba(15, 23, 42, 0.85);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.25) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.6;
        }

        /* 배경 거품 기포 애니메이션 효과 */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            bottom: -50px;
            animation: floatUp 10s infinite linear;
            z-index: -1;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* 반응형 컨테이너 레이아웃 */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        /* 공통 글래스모피즘 패널 구조 */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(96, 165, 250, 0.1);
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-size: 1.8rem;
            color: var(--accent);
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.8), 0 0 20px rgba(251, 191, 36, 0.4), 0 2px 5px rgba(0,0,0,0.8);
            border-bottom: 2px solid rgba(251, 191, 36, 0.5);
            padding-bottom: 10px;
            display: inline-block;
            width: 100%;
            box-shadow: 0 10px 10px -10px rgba(251, 191, 36, 0.3);
        }

        /* 타이머 영역 */
        .game-timer {
            float: right;
            color: var(--danger);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.4rem;
            text-shadow: 0 0 8px var(--danger);
        }

        .panel-image {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        /* 스토리 및 지문 */
        .story-box {
            cursor: pointer;
            position: relative;
            background: linear-gradient(90deg, rgba(30, 58, 138, 0.5) 0%, rgba(0,0,0,0.3) 100%);
            border-left: 4px solid var(--accent);
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
            border-radius: 0 12px 12px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            height: 120px;
            overflow: hidden;
            box-sizing: border-box;
        }

        .story-text {
            width: 100%;
            height: 100%;
            overflow: hidden;
            line-height: 1.6;
            font-size: 1.02rem;
            color: var(--text-main);
            text-align: justify;
        }

        /* 퀴즈 문제 구역 */
        .question-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .question-box::before {
            content: 'Q';
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 6rem;
            font-weight: 900;
            color: rgba(96, 165, 250, 0.05);
            z-index: 0;
        }

        .question-content {
            position: relative;
            z-index: 1;
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .input-group {
            margin-top: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1.2rem;
            background: rgba(2, 6, 23, 0.8);
            border: 2px solid rgba(96, 165, 250, 0.5);
            color: #60A5FA;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.3s;
            box-sizing: border-box;
            letter-spacing: 1px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #60A5FA;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.5), inset 0 2px 10px rgba(0,0,0,0.8);
        }

        /* 객관식 라디오 레이아웃 */
        .radio-label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
        }
        
        .radio-label:hover {
            background: rgba(30, 58, 138, 0.4);
            border-color: var(--accent-blue);
        }

        /* 버튼 및 그룹 */
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            background: linear-gradient(135deg, #3B82F6, #1D4ED8);
            color: white;
            border: 1px solid #60A5FA;
            padding:  0.6rem 1.5rem;
            font-size:  1.1rem;
            font-weight: 900;
            border-radius:  8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(29, 78, 216, 0.5), inset 0 2px 5px rgba(255,255,255,0.4);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            outline: none;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg) translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn:hover::after {
            transform: rotate(45deg) translateX(100%);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(29, 78, 216, 0.7), inset 0 2px 5px rgba(255,255,255,0.6);
        }

        .btn-hint {
            display: inline-block;
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #34D399;
            padding: 4px 10px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            vertical-align: middle;
            margin-left: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-hint:hover {
            background: rgba(16, 185, 129, 0.4);
            color: #fff;
            box-shadow: 0 0 10px rgba(52,211,153,0.4);
        }

        /* 에러 메시지 */
        .error-msg {
            color: #EF4444;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(239,68,68,0.3);
        }

        /* 쉐이크 흔들림 효과 */
        .shake { animation: shake-act 0.5s; }
        @keyframes shake-act {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        /* 4단원용 그래프 박스 전용 레이아웃 */
        .graph-container {
            background: rgba(248, 250, 252, 0.9);
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.3), inset 0 0 10px rgba(0,0,0,0.1);
            border: 2px solid #60A5FA;
        }

        /* 오답 시 적색 레이저 플래시 오버레이 */
        .laser-flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0);
            pointer-events: none;
            z-index: 9999;
            transition: background 0.15s ease-out;
        }
        .laser-flash-active {
            background: rgba(255, 0, 0, 0.15);
            transition: none;
        }

        /* 화면 흔들림 효과 */
        @keyframes shakePage {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-2px, -1px) rotate(-0.5deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-0.5deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
        }
        .shake-effect {
            animation: shakePage 0.3s ease-in-out;
        }

        /* 최상단 슬라이딩 이전 대사 로그 모달 */
        .log-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; max-height: 50vh;
            background: rgba(40, 40, 40, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: flex-start;
            border-bottom: 2px solid var(--accent-blue);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .log-modal.active {
            display: flex;
            animation: slideDown 0.3s ease-out forwards;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        .log-content {
            background: transparent;
            border: none;
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            max-height: 50vh;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.9);
        }
        .log-content h2 { margin-top: 0; color: var(--accent-blue); }
        .log-content hr { border-color: rgba(255,255,255,0.1); margin: 15px 0; }
        .close-log {
            float: right;
            background: var(--error-red);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 3회 오답 강제 이송 락다운 오버레이 및 펄스 보더 */
        .glitch-overlay-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(239, 68, 68, 0.15);
            z-index: 99999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            border: 10px solid #ef4444;
            animation: pulse-border 0.2s infinite;
        }
        .glitch-overlay-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2.8rem;
            color: #ef4444;
            text-shadow: 0 0 20px #ef4444;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: #ef4444; background: rgba(239, 68, 68, 0.15); }
            50% { border-color: #ffffff; background: rgba(239, 68, 68, 0.3); }
        }

        /* 타이머 경고 점멸 */
        .timer-warning {
            animation: blink-red 0.2s 5;
            font-size: 1.5rem !important;
        }
        @keyframes blink-red {
            0%, 100% { color: #ef4444; text-shadow: 0 0 15px #ef4444; }
            50% { color: #ffffff; text-shadow: none; }
        }

        /* 사운드 조절 고정 버튼 */
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
            transition: all 0.3s;
            font-weight: bold;
        }

        .sound-toggle:hover {
            background: rgba(0, 0, 0, 0.9);
            border-color: #60A5FA;
            box-shadow: 0 0 15px #60A5FA;
        }

        /* 진행도 표시 바 */
        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            margin-bottom: 2rem;
            overflow: hidden;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #60A5FA;
            box-shadow: 0 0 15px #60A5FA;
            transition: width 0.5s ease;
        }

        .radio-msg {
            color: #60a5fa;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            font-weight: bold;
            text-shadow: 0 0 5px #3b82f6;
            text-align: center;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            body {
                overflow-y: auto;
            }
            .container {
                padding: 10px;
            }
            .glass-panel {
                padding: 1.5rem;
                border-radius: 16px;
            }
            h2 {
                font-size: 1.2rem;
                margin-bottom: 1.2rem;
            }
            .story-box {
                height: 110px;
            }
            .btn-group {
                flex-direction: column;
                gap: 0.6rem;
            }
            .sound-toggle {
                top: 10px;
                right: 10px;
                font-size: 0.8rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <div id="laserOverlay" class="laser-flash-overlay"></div>

    <div class="bubble" style="left: 10%; width: 20px; height: 20px; animation-delay: 0s; animation-duration: 12s;"></div>
    <div class="bubble" style="left: 30%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 8s;"></div>
    <div class="bubble" style="left: 50%; width: 25px; height: 25px; animation-delay: 1s; animation-duration: 10s;"></div>
    <div class="bubble" style="left: 70%; width: 18px; height: 18px; animation-delay: 3s; animation-duration: 11s;"></div>
    <div class="bubble" style="left: 90%; width: 22px; height: 22px; animation-delay: 5s; animation-duration: 9s;"></div>

    <button id="soundToggle" class="sound-toggle" onclick="toggleSound()">🔇 소리 꺼짐</button>

    <div class="container">
        <!-- 상단 진행도 표시 바 -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 런타임 패널 컨테이너 -->
        <div id="panels-container"></div>
    </div>

    <!-- 락다운 및 공통 모달 -->
    <div id="glitchOverlay" class="glitch-overlay-screen">
        <div class="glitch-overlay-text">🚨 SYSTEM ERROR 🚨</div>
        <div class="glitch-overlay-sub">ACCESS TEMPORARILY LOCKDOWN</div>
    </div>

    <!-- Story Log UI -->
    <div id="storyLogModal" class="log-modal">
        <div class="log-content">
            <button class="close-log" onclick="closeLog()">닫기 ✕</button>
            <h2>📜 지나온 해저 탐사 기록</h2>
            <div id="logContainer">기록이 없습니다.</div>
        </div>
    </div>

    <!-- ─── GameRuntime 공통 자바스크립트 엔진 ─── -->
    <script>
        // 전역 다이얼로그 로그 저장
        const storyLogHistory = [];

        const GameRuntime = {
            data: null,
            timerId: null,
            timeLeft: 2400,
            currentWrongCount: 0,
            totalWrongCount: 0,
            activePanelId: 'panel_intro',

            start: function(gameData) {
                this.data = gameData;
                this.timeLeft = gameData.timer_limit_sec || 2400;
                
                // CSS 테마 적용
                document.body.className = 'theme-' + (gameData.theme || 'atlantis');
                
                this.render();
                this.bindEvents();
                this.showPanel('panel_intro');
            },

            showPanel: function(panelId) {
                document.querySelectorAll('.glass-panel').forEach(p => p.classList.remove('active'));
                const target = document.getElementById(panelId);
                if (target) {
                    target.classList.add('active');
                    this.activePanelId = panelId;

                    // 퀴즈 입력 폼 및 진행 버튼 탐색 후 숨김 처리
                    const toHide = target.querySelectorAll('.question-box, .btn-group');
                    toHide.forEach(el => {
                        el.style.opacity = '0';
                        el.style.transform = 'translateY(10px)';
                        el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                        el.style.pointerEvents = 'none';
                    });

                    // 스토리 타이머 구동 후 완료 콜백에서 보여줌
                    const storyBox = target.querySelector('.story-box');
                    if (storyBox) {
                        typeWriterHTML(storyBox, 15, () => {
                            toHide.forEach(el => {
                                el.style.opacity = '1';
                                el.style.transform = 'translateY(0)';
                                el.style.pointerEvents = 'auto';
                            });
                        });
                    } else {
                        toHide.forEach(el => {
                            el.style.opacity = '1';
                            el.style.transform = 'translateY(0)';
                            el.style.pointerEvents = 'auto';
                        });
                    }
                }
                
                // 오프닝을 넘어가 게임에 들어가는 시점에 타이머 자동 시작
                if (panelId === 'panel_q1') {
                    this.startTimer();
                }
            },

            render: function() {
                const container = document.getElementById('panels-container');
                container.innerHTML = '';
                
                const assetsBase = 'https://raw.githubusercontent.com/JK1027/room-math-story/feat/cleanup-storyboards/assets/units/' + this.data.unit_code;
                
                // 1. INTRO PANEL
                const introHtml = 
                    '<div id="panel_intro" class="glass-panel active">\n' +
                    '    <h2>SYSTEM INITIATION</h2>\n' +
                    '    <img src="' + assetsBase + '/' + this.data.intro.image + '" class="panel-image" alt="Intro">\n' +
                    '    <div class="story-box">\n' +
                    '        <div class="story-text"></div>\n' +
                    '    </div>\n' +
                    '    <!-- 학번/이름 입력 및 사운드 조절 UI 영역 -->\n' +
                    '    <div class="user-info-section" style="margin-top: 15px; border-top: 1px solid var(--border-glass); padding-top: 15px;">\n' +
                    '        <div style="display: flex; gap: 10px; margin-bottom: 10px;">\n' +
                    '            <div style="flex: 1;">\n' +
                    '                <label style="font-size: 0.85rem; color: var(--accent-neon); display: block; margin-bottom: 5px;">학번 (예: 1101)</label>\n' +

            startTimer: function() {
                if (this.timerId) return;
                this.updateTimerDisplay();
                this.timerId = setInterval(() => {
                    this.timeLeft--;
                    this.updateTimerDisplay();
                    if (this.timeLeft <= 0) {
                        clearInterval(this.timerId);
                        this.showPanel('gameover');
                    }
                }, 1000);
            },

            updateTimerDisplay: function() {
                const minutes = Math.floor(this.timeLeft / 60);
                const seconds = this.timeLeft % 60;
                const timeStr = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
                
                const timers = document.querySelectorAll('.game-timer');
                timers.forEach(el => {
                    el.innerText = timeStr;
                    if (this.timeLeft <= 180) {
                        el.classList.add('timer-warning');
                    } else {
                        el.classList.remove('timer-warning');
                    }
                });
            },

            submitAnswer: function(qnum) {
                const q = this.data.questions[qnum - 1];
                let userAns = '';
                
                if (q.choices && q.choices.length > 0) {
                    const checked = document.querySelector(`input[name="ans_group${qnum}"]:checked`);
                    userAns = checked ? checked.value : '';
                } else {
                    const inputEl = document.getElementById(`ans${qnum}`);
                    userAns = inputEl ? inputEl.value.trim() : '';
                }

                const isCorrect = this.checkAnswer(q.answer, userAns);
                
                if (isCorrect) {
                    this.currentWrongCount = 0;
                    try { playSuccess(); } catch(e) {}
                    
                    const nextStage = qnum === 20 ? 'panel_event4' : 
                                     (qnum === 5 ? 'panel_event1' : 
                                      (qnum === 10 ? 'panel_event2' : 
                                       (qnum === 15 ? 'panel_event3' : `panel_q${qnum + 1}`))
                                     );
                                     
                    const nextProgress = qnum * 5;
                    this.triggerStageTransition(`panel_q${qnum}`, nextStage, nextProgress);
                } else {
                    this.triggerLaserAndShake();
                    try { playError(); } catch(e) {}
                    this.currentWrongCount++;
                    this.totalWrongCount++;
                    this.timeLeft -= 60; // 오답시 60초 감소 페널티
                    if (this.timeLeft < 0) this.timeLeft = 0;
                    this.updateTimerDisplay();
                    
                    // 패널 흔들기 효과
                    const panel = document.getElementById(`panel_q${qnum}`);
                    if (panel) {
                        panel.classList.remove('shake');
                        void panel.offsetWidth;
                        panel.classList.add('shake');
                    }

                    const errMsg = document.getElementById(`error${qnum}`);
                    if (errMsg) {
                        errMsg.style.display = 'block';
                        setTimeout(() => errMsg.style.display = 'none', 3000);
                    }

                    // 3회 오답 시 구역 초기화
                    if (this.currentWrongCount >= 3) {
                        this.currentWrongCount = 0;
                        document.getElementById('glitchOverlay').style.display = 'flex';
                        setTimeout(() => document.getElementById('glitchOverlay').style.display = 'none', 1500);
                        
                        let resetQnum, resetProg, zoneName;
                        if (qnum <= 5) {
                            resetQnum = 1; resetProg = 0; zoneName = "1구역";
                        } else if (qnum <= 10) {
                            resetQnum = 6; resetProg = 25; zoneName = "2구역";
                        } else if (qnum <= 15) {
                            resetQnum = 11; resetProg = 50; zoneName = "3구역";
                        } else {
                            resetQnum = 16; resetProg = 75; zoneName = "4구역";
                        }

                        alert(`🚨 3회 오답! ${zoneName}의 처음인 제 ${resetQnum}구역으로 강제 이송됩니다.`);
                        // 입력 초기화
                        const resetInput = document.getElementById(`ans${resetQnum}`);
                        if (resetInput) resetInput.value = '';
                        document.querySelectorAll(`input[name="ans_group${resetQnum}"]`).forEach(el => el.checked = false);
                        
                        this.triggerStageTransition(`panel_q${qnum}`, `panel_q${resetQnum}`, resetProg);
                    }
                }
            },

            triggerLaserAndShake: function() {
                const overlay = document.getElementById('laserOverlay');
                if (overlay) {
                    overlay.classList.add('laser-flash-active');
                    setTimeout(() => overlay.classList.remove('laser-flash-active'), 150);
                }
                document.body.classList.add('shake-effect');
                setTimeout(() => document.body.classList.remove('shake-effect'), 300);
            },

            checkAnswer: function(spec, ans) {
                if (!spec || !spec.type || !spec.values) return false;
                
                const cleanAns = ans.replace(/\(/g, '').replace(/\)/g, '').trim();
                
                if (spec.type === 'exact') {
                    return spec.values.includes(cleanAns);
                } else if (spec.type === 'any_of') {
                    return spec.values.includes(cleanAns);
                } else if (spec.type === 'normalized_exact') {
                    const normUser = cleanAns.replace(/\s+/g, '').toUpperCase();
                    return spec.values.some(v => v.replace(/\s+/g, '').toUpperCase() === normUser);
                }
                
                return false;
            },

                        } else {

                if (typeWriterTimeout) clearTimeout(typeWriterTimeout);

                if (!activePanel) return;

                if (storyBox) {

                    let rawHtml = textEl.dataset.rawHtml || textEl.innerHTML;
                    rawHtml = rawHtml.replace(/- \*\*\[일러스트 지시.*?\]\*\*[^\n]*/gi, '');
                    rawHtml = rawHtml.replace(/- \[일러스트 지시.*?\][^\n]*/gi, '');
                    rawHtml = rawHtml.replace(/<br><span style="font-size:0.8rem; color:var\(--accent\); font-weight:bold; animation: blink 1s infinite;">\(클릭하여 다음 대사 보기 ▼\)<\/span>/gi, '');
                    textEl.innerHTML = rawHtml.trim();

                }
                
                // 숨김 패널들 즉시 표시
                const toShow = activePanel.querySelectorAll('.question-box, .btn-group');

                    el.style.opacity = '1';

                    el.style.pointerEvents = 'auto';
                });
            }

        // 간단한 Markdown -> HTML 변환 헬퍼 함수
        function parseMarkdown(text) {
            if (!text) return '';
            
            // 줄 단위로 분할하여 "일러스트 지시"가 포함된 모든 라인 원천 차단
            let lines = text.split('\n');
            let filteredLines = lines.filter(line => {
                return !line.includes('일러스트 지시') && !line.includes('일러스트지시');
            });
            let html = filteredLines.join('\n').trim();

            // **bold** -> <strong>bold</strong>
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // *italic* -> <em>italic</em>
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            // \n -> <br>
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        // Web Audio API 기반 오디오 엔진 (기본 Muted)
        let isMuted = true;
        let audioCtx = null;
        let bgmOsc = null;
        let bgmGain = null;
        let bgmLfo = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSynth(freq, type, duration, vol) {
            if (isMuted) return;
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        function stopBGM() {
            try {
                if(bgmOsc) { bgmOsc.stop(); bgmOsc.disconnect(); bgmOsc = null; }
                if(bgmLfo) { bgmLfo.stop(); bgmLfo.disconnect(); bgmLfo = null; }
            } catch(e){}
        }

        function startBGM() {
            // 저주파 우웅 거리는 BGM 사운드 완전 차단
            return;
        }

        function toggleSound() {
            isMuted = !isMuted;
            const btn = document.getElementById('soundToggle');
            if (isMuted) {
                if(btn) btn.innerText = '🔇 소리 꺼짐';
                stopBGM();
            } else {
                if(btn) btn.innerText = '🔊 소리 켜짐';
                startBGM();
            }
        }

        function playClick() { playSynth(800, 'sine', 0.1, 0.5); }
        function playTick() { playSynth(1500, 'square', 0.04, 0.15); }
        function playSuccess() { 
            playSynth(523.25, 'sine', 0.15, 0.7); 
            setTimeout(()=>playSynth(659.25, 'sine', 0.15, 0.7), 150); 
            setTimeout(()=>playSynth(783.99, 'sine', 0.3, 0.7), 300); 
        }
        function playError() {
            playSynth(150, 'sawtooth', 0.3, 0.6);
            setTimeout(()=>playSynth(100, 'sawtooth', 0.4, 0.6), 200);
        }
        function playVictory() {
            stopBGM();
            [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                setTimeout(()=>playSynth(f, 'square', 0.2, 0.6), i*150);
            });
        }

        // 문장 마침표/느낌표/물음표 분할 및 초과 길이 정밀 분할 헬퍼
        let typeWriterTimeout;
        function splitSentences(text) {
            let result = [];
            let rawChunks = [];
            let start = 0;
            for (let i = 0; i < text.length; i++) {
                const char = text.charAt(i);
                if (char === '.' || char === '!' || char === '?') {
                    const nextChar = text.charAt(i + 1);
                    if (!nextChar || nextChar === ' ' || nextChar === '\n' || nextChar === '<') {
                        rawChunks.push(text.substring(start, i + 1).trim());
                        start = i + 1;
                    }
                }
            }
            const finalChunk = text.substring(start).trim();
            if (finalChunk) rawChunks.push(finalChunk);

            // 각 청크가 대사 박스 높이를 넘지 않도록 60자 기준으로 2차 안전 슬라이싱
            const MAX_LEN = 60;
            rawChunks.forEach(chunk => {
                if (chunk.length <= MAX_LEN) {
                    result.push(chunk);
                } else {
                    let temp = chunk;
                    while (temp.length > MAX_LEN) {
                        let splitIdx = -1;
                        for (let j = MAX_LEN; j > 10; j--) {
                            const c = temp.charAt(j);
                            if (c === ',' || c === ' ') {
                                splitIdx = j;
                                break;
                            }
                        }
                        if (splitIdx === -1) {
                            splitIdx = MAX_LEN;
                        }
                        result.push(temp.substring(0, splitIdx + 1).trim());
                        temp = temp.substring(splitIdx + 1).trim();
                    }
                    if (temp) result.push(temp);
                }
            });

            return result;
        }

        // 타이핑 효과 구현 함수 (HTML 태그 안전 파싱 및 지연 렌더링)
        function typeWriterHTML(element, speed = 25, onComplete = null) {
            let isComplete = false;
            let currentChunkIndex = 0;
            let chunks = [];
            const textEl = element.querySelector('.story-text') || element;
            if(!textEl) {
                if(onComplete) onComplete();
                return;
            }

            function triggerComplete() {
                if(!isComplete) {
                    isComplete = true;
                    element.style.cursor = 'default';
                    if(onComplete) onComplete();
                }
            }
            if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
            
            let htmlContent = textEl.dataset.rawHtml || textEl.innerHTML;
            // 일러스트 지시 필터링
            htmlContent = htmlContent.replace(/- \*\*\[일러스트 지시.*?\]\*\*[^\n]*/gi, '');
            htmlContent = htmlContent.replace(/- \[일러스트 지시.*?\][^\n]*/gi, '');
            htmlContent = htmlContent.trim();

            if (!textEl.dataset.rawHtml) {
                textEl.dataset.rawHtml = htmlContent;
            }
            
            let rawLines = htmlContent.split(/<br\s*\/?>/i);
            for(let line of rawLines) {
                let sentences = splitSentences(line);
                for(let s of sentences) {
                    if(s.trim()) chunks.push(s.trim());
                }
            }

            if(chunks.length === 0) {
                triggerComplete();
                return;
            }
            let i = 0;
            let textStr = '';
            let typingFinished = false;
            element.style.cursor = 'pointer';
            
            function renderChunk() {
                if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
                i = 0;
                textStr = '';
                typingFinished = false;
                let chunkText = chunks[currentChunkIndex].trim();
                
                const currentPanel = element.closest('.glass-panel');
                const panelTitle = currentPanel.querySelector('h2') ? currentPanel.querySelector('h2').innerText : '단서';
                const logEntry = '<strong>[' + panelTitle + ']</strong> ' + chunkText;
                if (!storyLogHistory.includes(logEntry)) {
                    storyLogHistory.push(logEntry);
                }
                
                if(currentChunkIndex < chunks.length - 1) {
                    chunkText += '<br><span style="font-size:0.8rem; color:var(--accent); font-weight:bold; animation: blink 1s infinite;">(클릭하여 다음 대사 보기 ▼)</span>';
                }
                textEl.innerHTML = '';
                
                function type() {
                    if (i < chunkText.length) {
                        if (chunkText.charAt(i) === '<') {
                            const endTag = chunkText.indexOf('>', i);
                            if (endTag !== -1) {
                                textStr += chunkText.substring(i, endTag + 1);
                                i = endTag + 1;
                            } else {
                                textStr += chunkText.charAt(i);
                                i++;
                            }
                        } else {
                            textStr += chunkText.charAt(i);
                            i++;
                        }
                        // 깜빡이 커서 효과 적용
                        textEl.innerHTML = textStr + (i % 2 === 0 ? '█' : '');
                        if (chunkText.charAt(i-1) !== ' ' && chunkText.charAt(i-1) !== '\n') {
                            try { playTick(); } catch(e) {}
                        }
                        typeWriterTimeout = setTimeout(type, speed);
                    } else {
                        textEl.innerHTML = chunkText;
                        typingFinished = true;
                        if(currentChunkIndex === chunks.length - 1) {
                            triggerComplete();
                        }
                    }
                }
                type();
            }
            element.onclick = (e) => {
                // 스킵 버튼을 직접 클릭한 경우는 이벤트 전파 방지로 여기서 걸러짐
                if (!typingFinished) {
                    clearTimeout(typeWriterTimeout);
                    let chunkText = chunks[currentChunkIndex].trim();
                    if(currentChunkIndex < chunks.length - 1) {
                        chunkText += '<br><span style="font-size:0.8rem; color:var(--accent); font-weight:bold; animation: blink 1s infinite;">(클릭하여 다음 대사 보기 ▼)</span>';
                    }
                    textEl.innerHTML = chunkText;
                    typingFinished = true;
                    if(currentChunkIndex === chunks.length - 1) triggerComplete();
                } else {
                    if (currentChunkIndex < chunks.length - 1) {
                        currentChunkIndex++;
                        renderChunk();
                    }
                }
            };
            renderChunk();
        }

        // 모달 이전 대사 다이얼로그 열기
        function openLog() {
            const modal = document.getElementById('storyLogModal');
            const container = document.getElementById('logContainer');
            if (modal && container) {
                if (storyLogHistory.length === 0) {
                    container.innerHTML = '기록이 없습니다.';
                } else {
                    container.innerHTML = storyLogHistory.map(line => '<p>' + line + '</p>').join('<hr>');
                }
                modal.classList.add('active');
            }
        }

        function closeLog() {
            const modal = document.getElementById('storyLogModal');
            if (modal) {
                modal.classList.remove('active');
            }
        }
    </script>
