    <script>
        function tryStartGame(unitId) {
            const sid = document.getElementById('studentId');
            const sname = document.getElementById('studentName');
            if(sid && sname) {
                if(!sid.value.trim() || !sname.value.trim()) {
                    alert('학번과 이름을 모두 입력해주세요!');
                    return;
                }
                // GAS 로직
                try {
                    if(typeof google !== 'undefined' && google.script && google.script.run) {
                        google.script.run
                            .withSuccessHandler(function(row) { window.userRecordRow = row; })
                            .recordStart(sid.value.trim(), sname.value.trim(), unitId);
                    }
                } catch(e) { console.warn('GAS 연동 안됨:', e); }
            }
            
            // 브라우저 오디오 정책 해제 (락 풀기)
            try {
                if (!isMuted) {
                    bgm.volume = 0.15;
                    bgm.play().catch(e => {});
                    [sndClick, sndTick, sndSuccess, sndError, sndVictory].forEach(snd => {
                        if(snd) {
                            snd.volume = 0;
                            snd.play().catch(e=>{});
                            snd.pause();
                            snd.currentTime = 0;
                        }
                    });
                }
            } catch(e) {}
            
            nextStage('intro', 'panel_q1', 5);
        }

        

        
        let timeLeft = 40 * 60;
        let timerId = null;

        function updateTimerDisplay() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            let timeStr = (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
            document.querySelectorAll('.game-timer').forEach(el => el.innerText = timeStr);
        }

        function startTimer() {
            if (timerId) return;
            updateTimerDisplay();
            timerId = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    updateTimerDisplay();
                    alert("⏰ 제한 시간 40분이 초과되었습니다! 미궁에 영원히 갇혔습니다...");
                    location.reload();
                } else {
                    updateTimerDisplay();
                }
            }, 1000);
        }

        function nextStage(currentId, nextId, progressPercent) {
            if (currentId === 'intro') startTimer();
            if (nextId === 'outro') {
                clearInterval(timerId);
                if (window.userRecordRow) {
                    try {
                        google.script.run.recordEnd(window.userRecordRow);
                    } catch(e) {
                        console.error("기록 저장 실패: ", e);
                    }
                }
            }
            try { playClick(); } catch(e) {}
            if(currentId === 'intro') {
                try { startBGM(); } catch(e) {}
            }
            const currentEl = document.getElementById(currentId);
            const nextEl = document.getElementById(nextId);
            const progContainer = document.getElementById('progressContainer');
            const progBar = document.getElementById('progressBar');
            
            if (currentEl) currentEl.classList.remove('active');
            
            setTimeout(() => {
                if(nextId !== 'intro' && progContainer) progContainer.style.display = 'block';
                if(progBar) progBar.style.width = progressPercent + '%';
                if(nextEl) {
                    nextEl.classList.add('active');
                    
                    const toHide = nextEl.querySelectorAll('.question-box, .graph-container, .btn-group');
                    toHide.forEach(el => {
                        el.style.opacity = '0';
                        el.style.transform = 'translateY(10px)';
                        el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                        el.style.pointerEvents = 'none';
                    });
                    
                    const storyBox = nextEl.querySelector('.story-box');
                    if(storyBox) {
                        typeWriterHTML(storyBox, 25, () => {
                            toHide.forEach(el => {
                                el.style.opacity = '1';
                                el.style.transform = 'translateY(0)';
                                el.style.pointerEvents = 'auto';
                            });
                        });
                    } else {
                        toHide.forEach(el => {
                            el.style.opacity = '1';
                            el.style.transform = 'translateY(0)';
                            el.style.pointerEvents = 'auto';
                        });
                    }
                }
            }, 300);
        }

        function prevStage(currentId, prevId, progressPercent) {
            try { playClick(); } catch(e) {}
            const currentEl = document.getElementById(currentId);
            const prevEl = document.getElementById(prevId);
            const progContainer = document.getElementById('progressContainer');
            const progBar = document.getElementById('progressBar');
            
            if (currentEl) currentEl.classList.remove('active');
            
            setTimeout(() => {
                if(prevId === 'intro' && progContainer) progContainer.style.display = 'none';
                if(progBar) progBar.style.width = progressPercent + '%';
                if(prevEl) {
                    prevEl.classList.add('active');
                    
                    const toHide = prevEl.querySelectorAll('.question-box, .graph-container, .btn-group');
                    toHide.forEach(el => {
                        el.style.opacity = '0';
                        el.style.transform = 'translateY(10px)';
                        el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                        el.style.pointerEvents = 'none';
                    });
                    
                    const storyBox = prevEl.querySelector('.story-box');
                    if(storyBox) {
                        typeWriterHTML(storyBox, 25, () => {
                            toHide.forEach(el => {
                                el.style.opacity = '1';
                                el.style.transform = 'translateY(0)';
                                el.style.pointerEvents = 'auto';
                            });
                        });
                    } else {
                        toHide.forEach(el => {
                            el.style.opacity = '1';
                            el.style.transform = 'translateY(0)';
                            el.style.pointerEvents = 'auto';
                        });
                    }
                }
            }, 300);
        }

        function showError(panelId, errorId) {
            playError(); 
            const panel = document.getElementById(panelId);
            const errMsg = document.getElementById(errorId);
            
            panel.classList.remove('shake');
            void panel.offsetWidth; 
            panel.classList.add('shake');
            
            errMsg.style.display = 'block';
            setTimeout(() => { errMsg.style.display = 'none'; }, 3000);
        }

        let wrongCount = 0;

        function cleanString(str) {
            return str.replace(/\s+/g, '').toLowerCase();
        }

        // 엔터키 정답 제출 바인딩
        document.addEventListener('keydown', function(e) {
            if (e.target && e.target.id.startsWith('ans') && e.key === 'Enter') {
                const qnum = e.target.id.replace('ans', '');
                const activePanel = e.target.closest('.glass-panel');
                if (activePanel) {
                    const btn = activePanel.querySelector('.btn-group .btn');
                    if (btn) btn.click();
                }
            }
        });

        // 오디오 로드 에러 복구/예외 방어선
        window.addEventListener('DOMContentLoaded', () => {
            const audios = [
                document.getElementById('bgm'),
                document.getElementById('sndClick'),
                document.getElementById('sndTick'),
                document.getElementById('sndSuccess'),
                document.getElementById('sndError'),
                document.getElementById('sndVictory')
            ];
            audios.forEach(audio => {
                if (audio) {
                    audio.addEventListener('error', (e) => {
                        console.warn(`사운드 리소스 로드 실패: ${audio.id}`);
                    });
                }
            });
        });


        // Q1

        // Q1
        function checkQ1() {
            const ans = cleanString(document.getElementById('ans1').value).replace('(','').replace(')','');
            if (ans === '-5,8') {
                wrongCount = 0;
                try { playSuccess(); } catch(e) {} 
                nextStage('panel_q1', 'panel_q2', 5);
            } else {
