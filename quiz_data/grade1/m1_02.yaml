questions:
  q1:
    title: 빛과 어둠의 대비
    qtext: <strong>Q1. [양수와 음수]</strong><br>해발 1000m를 +1000m로 나타낼 때, 해저 500m는 어떻게
      나타내는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-500m' || ans === '-500'
    options:
    - -500m
    - -500m 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: -300m'
    error: 마력이 충돌합니다! 방향과 부호를 다시 확인하십시오.
  q2:
    title: 정수의 조건
    qtext: <strong>Q2. [정수의 판별]</strong><br>다음 중 정수가 아닌 것의 번호를 쓰시오.<br>(1) -3 &nbsp;&nbsp;(2)
      0 &nbsp;&nbsp;(3) 1.5 &nbsp;&nbsp;(4) 7
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3' || ans === '1.5' || ans === '(3)'
    options:
    - '-3'
    - '0'
    - '1.5'
    - '7'
    placeholder: 보기 번호 입력
    error: 스파크가 튑니다! 정수가 아닌 수를 다시 골라 보십시오.
  q3:
    title: 수직선의 기점
    qtext: <strong>Q3. [원점]</strong><br>수직선에서 0을 나타내는 점을 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '원점'
    options:
    - 원점
    - y축
    - x축
    - 좌표평면
    placeholder: 한글 단어 입력
    error: 수직선 기점이 정렬되지 않습니다!
  q4:
    title: 정수의 개수
    qtext: <strong>Q4. [두 수 사이의 정수]</strong><br>-5와 3 사이에 있는 정수는 모두 몇 개인가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '7' || ans === '7개'
    options:
    - '5'
    - '14'
    - '7'
    - '9'
    placeholder: 숫자 또는 개수 입력
    error: 수치가 맞지 않아 문이 닫힙니다!
  q5:
    title: 속성 에너지 융합
    qtext: <strong>Q5. [수직선 위의 점]</strong><br>두 정수 a, b에 대하여 a는 원점으로부터의 거리가 4이고, b는
      -2보다 3만큼 큰 수이다. a가 양수일 때 a+b의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    options:
    - '10'
    - '3'
    - '7'
    - '5'
    placeholder: 숫자만 입력
    error: 융합 실패! 에너지 폭발 조짐이 보입니다.
  q6:
    title: 마법 절댓값 장벽
    qtext: <strong>Q6. [절댓값 계산]</strong><br>|-7| + |3| 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '10'
    options:
    - '8'
    - '10'
    - '20'
    - '12'
    placeholder: 숫자만 입력
    error: 장벽의 절댓값이 꿈쩍도 하지 않습니다!
  q7:
    title: 상반되는 속성의 거리
    qtext: <strong>Q7. [절댓값의 성질]</strong><br>절댓값이 4인 두 수의 차를 구하시오. (큰 수에서 작은 수를 뺌)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8'
    options:
    - '16'
    - '6'
    - '8'
    - '10'
    placeholder: 숫자만 입력
    error: 수치 동조 실패! 축의 거리가 맞지 않습니다.
  q8:
    title: 최강의 절댓값 보석
    qtext: <strong>Q8. [절댓값의 대소]</strong><br>다음 수 중 절댓값이 가장 큰 수를 쓰시오.<br>[-2.5, 3,
      -4, 0, 1.5]
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-4'
    options:
    - '-8'
    - '-6'
    - '-4'
    - '-2'
    placeholder: 해당 수 입력 (부호 포함)
    error: 제단이 보석을 밀어냅니다!
  q9:
    title: 부등식과 영역
    qtext: <strong>Q9. [부등호의 이해]</strong><br>-3 < x <= 2 를 만족하는 정수 x의 개수를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5' || ans === '5개'
    options:
    - '10'
    - '3'
    - '7'
    - '5'
    placeholder: 숫자 또는 개수 입력
    error: 압력이 새어나갑니다! 다시 계산하십시오.
  q10:
    title: 균형의 추
    qtext: <strong>Q10. [한가운데 있는 수]</strong><br>수직선에서 -4와 8의 한가운데 있는 점이 나타내는 수를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    options:
    - '4'
    - '2'
    - '0'
    - '10'
    placeholder: 숫자만 입력
    error: 조율 실패! 추가 비대칭으로 기울어집니다.
    extra_class: glitch-bg
  q11:
    title: 기초 마법진 덧셈
    qtext: <strong>Q11. [정수의 덧셈]</strong><br>(-5) + (+8) 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    placeholder: 숫자만 입력
    error: 마법진에 스파크가 튊니다! 연산이 틀렸습니다.
  q12:
    title: 기초 마법진 뺄셈
    qtext: <strong>Q12. [정수의 뺄셈]</strong><br>(+3) - (-7) 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '10'
    placeholder: 숫자만 입력
    error: 반전 에너지가 제어되지 않습니다!
  q13:
    title: 소수점 마나 정렬
    qtext: <strong>Q13. [유리수의 덧셈]</strong><br>(-2.5) + (-1.5) 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-4'
    placeholder: 숫자만 입력 (부호 포함)
    error: 마나 강도 어긋남! 폭주 위험!
  q14:
    title: 3중 혼합 마나
    qtext: <strong>Q15. [정수의 덧뺄셈 혼합]</strong><br>5 - 9 + 3 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-1'
    placeholder: 숫자만 입력 (부호 포함)
    error: 과전류 차단 실패! 회로 차단 경고!
  q15:
    title: 기억의 왜곡 복원
    qtext: <strong>Q15. [식의 바른 계산]</strong><br>어떤 수에서 -3을 빼야 할 것을 잘못하여 더했더니 5가 되었다.
      바르게 계산한 답을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '11'
    placeholder: 숫자만 입력
    error: 왜곡 복원 실패! 기억 마법이 정지됩니다.
    extra_class: glitch-bg
  q16:
    title: 대마법 곱셈 시전
    qtext: <strong>Q16. [정수의 곱셈]</strong><br>(-4) × (+6) 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-24'
    placeholder: 숫자만 입력 (부호 포함)
    error: 곱셈 역류 발생! 차단막이 두꺼워집니다.
  q17:
    title: 대마법 나눗셈 시전
    qtext: <strong>Q17. [정수의 나눗셈]</strong><br>(-15) ÷ (-3) 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    placeholder: 숫자만 입력
    error: 마나가 불균일하게 분열됩니다!
  q18:
    title: 거듭제곱 마법
    qtext: <strong>Q18. [거듭제곱]</strong><br>$(-2)^3$ 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-8'
    placeholder: 숫자만 입력 (부호 포함)
    error: 메아리가 너무 큽니다! 귀를 막고 다시 입력하세요.
  q19:
    title: 사칙 혼합 제어
    qtext: "<strong>Q19. [유리수의 사칙혼합 1]</strong><br>$(-2) \times (-3) - (+10) \\div\
      \ (-2)$ 의 값을 구하시오."
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '11'
    placeholder: 숫자만 입력
    error: 해킹 방어 프로토콜 작동! 수치 리셋 경고!
  q20:
    title: 최종 마법진의 해
    qtext: "<strong>Q20. [유리수의 사칙혼합 2]</strong><br>$12 - [ 5 - \\{ (-2) \times 3 -\
      \ 4 \\} ]$ 의 값을 구하시오."
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-3'
    placeholder: 숫자만 입력 (부호 포함)
    error: 시험 통과 실패! 최종 마나 코어가 작동하지 않습니다.
