questions:
  q1:
    title: 거울 열 배분
    qtext: <strong>Q1. [다각형의 대각선 1]</strong><br>한 꼭짓점에서 그을 수 있는 대각선의 개수가 5개인 다각형의
      이름을 구하시오.
    hint: n각형의 한 꼭짓점에서 그을 수 있는 대각선의 개수 공식은 n-3 입니다.
    ans_check: ans === '팔각형'
    options:
    - 팔각형
    - 팔각형 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 육각형'
    error: 기둥 조작 오류!
  q2:
    title: 기둥 교차망
    qtext: <strong>Q2. [다각형의 대각선 2]</strong><br>십각형 모양의 기둥 배치에서 모든 기둥끼리 서로 빛을 교차 연결하려고
      한다. 총 대각선의 개수를 구하시오.
    hint: n각형의 총 대각선 수 공식인 n(n-3)/2 에 10을 대입하여 계산합니다.
    ans_check: ans === '35'
    options:
    - '37'
    - '33'
    - '70'
    - '35'
    placeholder: 숫자만 입력
    error: 계산 오류!
  q3:
    title: 빛의 반사각
    qtext: <strong>Q3. [삼각형의 외각 1]</strong><br>삼각형 반사판에서 두 내각이 각각 45도, 60도일 때, 나머지
      한 내각의 외각의 크기를 구하시오.
    hint: 삼각형의 한 외각의 크기는 그와 이웃하지 않는 두 내각의 크기의 합과 같습니다.
    ans_check: ans === '105'
    options:
    - '105'
    - '103'
    - '210'
    - '107'
    placeholder: 숫자만 입력
    error: 각도 오류!
  q4:
    title: 외각의 배분
    qtext: <strong>Q4. [삼각형의 외각 2]</strong><br>삼각형의 세 외각의 비가 2:3:4일 때, 가장 큰 외각의 크기를
      구하시오.
    hint: 다각형의 외각의 총합은 항상 360도입니다. 비례배분을 이용하여 가장 큰 비율(4)을 차지하는 외각을 구합니다.
    ans_check: ans === '160'
    options:
    - '160'
    - '162'
    - '158'
    - '320'
    placeholder: 숫자만 입력
    error: 비율 오류!
  q5:
    title: 신전 내각 다이얼
    qtext: <strong>Q5. [다각형의 내각]</strong><br>내각의 크기의 합이 900도인 다각형의 꼭짓점의 개수를 구하시오.
    hint: n각형의 내각의 총합 공식은 180 * (n-2) 입니다. 이 값이 900이 되는 n을 찾습니다.
    ans_check: ans === '7'
    options:
    - '5'
    - '14'
    - '7'
    - '9'
    placeholder: 숫자만 입력
    error: 다각형 모양 오류!
  q6:
    title: 외각의 법칙
    qtext: <strong>Q6. [다각형의 외각의 합]</strong><br>모든 다각형의 외각의 크기의 합은 항상 일정합니다. 그 크기는
      몇 도인가?
    hint: 다각형이 몇 각형이든 상관없이 모든 외각의 크기의 총합은 항상 360도입니다.
    ans_check: ans === '360'
    options:
    - '720'
    - '362'
    - '358'
    - '360'
    placeholder: 숫자만 입력
    error: 회전판이 멈췄습니다!
  q7:
    title: 정다각형의 추적
    qtext: <strong>Q7. [정다각형의 외각]</strong><br>한 외각의 크기가 36도인 정다각형의 이름을 구하시오.
    hint: 정n각형의 한 외각 크기는 360 / n 입니다. 이 값이 36이 되는 n을 구해 정다각형 이름을 적습니다.
    ans_check: ans === '정십각형'
    options:
    - 정십각형
    - 정십각형 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 정오각형'
    error: 다이얼 문양 오류!
  q8:
    title: 블록 설계도
    qtext: <strong>Q8. [정다각형의 내각 1]</strong><br>정팔각형의 한 내각의 크기를 구하시오.
    hint: 정팔각형의 내각 총합인 180 * (8-2) = 1080도를 꼭짓점 개수인 8로 나누어 한 내각을 구합니다.
    ans_check: ans === '135'
    options:
    - '133'
    - '137'
    - '135'
    - '270'
    placeholder: 숫자만 입력
    error: 각도 입력 실패!
  q9:
    title: 대각선 기어
    qtext: <strong>Q9. [정다각형의 내각 2]</strong><br>한 내각의 크기가 150도인 정다각형의 대각선의 총 개수를 구하시오.
    hint: 한 내각이 150도이면 한 외각은 30도입니다. 외각의 합이 360도이므로 정십이각형임을 구한 뒤 총 대각선 공식을 적용합니다.
    ans_check: ans === '54'
    options:
    - '52'
    - '56'
    - '108'
    - '54'
    placeholder: 숫자만 입력
    error: 계산 오류!
  q10:
    title: 비율 정렬
    qtext: <strong>Q10. [내각과 외각의 비]</strong><br>한 내각과 한 외각의 크기의 비가 4:1인 정다각형의 이름을
      구하시오.
    hint: 한 내각과 한 외각의 합은 180도입니다. 이를 4:1로 비례배분하여 한 외각을 구하고 다각형 이름을 유추합니다.
    ans_check: ans === '정십각형'
    options:
    - 정십각형
    - 정십각형 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 정육각형'
    error: 암호판 고정 실패!
    extra_class: glitch-bg
  q11:
    title: 제3구역 석판 봉인
    qtext: <strong>Q11. [호의 길이와 중심각 1]</strong><br>한 원에서 부채꼴의 호의 길이는 중심각의 크기에 어떻게
      비례하는가?
    hint: 부채꼴의 중심각이 커질 때 호의 길이도 이에 비례하여 일정하게 늘어나는 성질을 뜻합니다.
    ans_check: ans === '정비례'
    placeholder: '예: 정비례, 반비례'
    error: 비례 원리 오류!
  q12:
    title: 길이 복사기
    qtext: <strong>Q12. [호의 길이와 중심각 2]</strong><br>중심각이 40도일 때 호의 길이가 6cm라면, 중심각이
      160도일 때 호의 길이를 구하시오.
    hint: 중심각의 크기와 호의 길이는 정비례하므로, 중심각이 4배 증가할 때 호의 길이도 똑같이 4배 증가합니다.
    ans_check: ans === '24'
    placeholder: 숫자만 입력
    error: 호의 길이 조절 실패!
  q13:
    title: 지지대의 평형
    qtext: <strong>Q13. [부채꼴의 넓이와 중심각]</strong><br>부채꼴의 넓이가 원의 넓이의 1/6일 때, 이 부채꼴의
      중심각의 크기를 구하시오.
    hint: 원 전체의 중심각 is 360도입니다. 넓이가 원의 1/6이므로 중심각도 360도의 1/6을 차지합니다.
    ans_check: ans === '60'
    placeholder: 숫자만 입력
    error: 각도 조절 실패!
  q14:
    title: 나무막대 기둥
    qtext: <strong>Q14. [현의 길이]</strong><br>중심각의 크기가 같은 두 부채꼴의 현의 길이는 서로 같은가?
    hint: 중심각이 같은 두 부채꼴에서 원 위의 두 점을 곧게 이은 선분(현)의 길이를 비교해 봅니다.
    ans_check: ans === '같다'
    placeholder: '예: 같다, 다르다'
    error: 현의 길이 오류!
  q15:
    title: 작도 판정
    qtext: <strong>Q15. [현과 중심각의 비례]</strong><br>현의 길이는 중심각의 크기에 정비례하는가?
    hint: 중심각이 2배가 될 때 현의 길이도 정확히 2배가 되는지 원 위에 직접 그려 확인해 봅니다.
    ans_check: ans === '아니다'
    placeholder: '예: 그렇다, 아니다'
    error: 비례 관계 오류!
    extra_class: glitch-bg
  q16:
    title: 제4구역 최종 냉각
    qtext: <strong>Q16. [원주 계산]</strong><br>반지름의 길이가 5cm인 원의 둘레의 길이를 구하시오. (원주율은 π,
      입력시 '파이'로 기재)
    hint: 반지름이 r인 원의 둘레 공식은 2 * 파이 * r 입니다.
    ans_check: ans === '10파이'
    placeholder: '예: 5파이'
    error: 둘레 계산 오류!
  q17:
    title: 원형 뚜껑
    qtext: <strong>Q17. [호의 길이 계산]</strong><br>반지름의 길이가 9cm이고 중심각의 크기가 120도인 부채꼴의
      호의 길이를 구하시오.
    hint: 반지름이 r, 중심각이 x도인 부채꼴 호의 길이 공식은 2 * 파이 * r * (x / 360) 입니다.
    ans_check: ans === '6파이'
    placeholder: '예: 3파이'
    error: 금실 길이 부족!
  q18:
    title: 수로 조율
    qtext: <strong>Q18. [부채꼴의 넓이 계산]</strong><br>반지름의 길이가 6cm이고 중심각의 크기가 60도인 부채꼴
      모양 홈의 넓이를 구하시오.
    hint: 반지름이 r, 중심각이 x도인 부채꼴 넓이 공식은 파이 * r^2 * (x / 360) 입니다.
    ans_check: ans === '6파이'
    placeholder: '예: 2파이'
    error: 면적 계산 오류!
  q19:
    title: 냉각 밸브
    qtext: <strong>Q19. [중심각 없이 넓이 구하기]</strong><br>반지름의 길이가 10cm이고 호의 길이가 5π cm인
      부채꼴 모양 석문의 넓이를 계산하시오.
    hint: 반지름 r과 호의 길이 l이 주어졌을 때의 부채꼴 넓이 공식인 (1/2) * r * l 을 활용합니다.
    ans_check: ans === '25파이'
    placeholder: '예: 10파이'
    error: 게이트 수치 오류!
  q20:
    title: 최종 마스터 게이트
    qtext: <strong>Q20. [색칠한 부분의 넓이]</strong><br>반지름이 8cm인 반원에서 반지름이 4cm인 반원 두 개를
      뺀 색칠된 부분의 넓이를 구하시오.
    hint: 반지름 8cm인 큰 반원 넓이에서 반지름 4cm인 작은 반원 두 개(합치면 작은 원 하나)의 넓이를 뺍니다.
    ans_check: ans === '16파이'
    placeholder: '예: 12파이'
    error: 다이얼이 잠겼습니다!
    extra_class: glitch-bg
