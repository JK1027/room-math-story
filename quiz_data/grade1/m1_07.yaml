questions:
  q1:
    title: 기둥의 성질
    qtext: '<strong>Q1. [다면체의 이해]</strong><br>옆면이 모두 직사각형인 다면체를 무엇이라 부르는가? (힌트: 기둥)'
    hint: 옆면의 모양이 모두 직사각형인 입체도형 계열의 명칭을 떠올려 봅니다.
    ans_check: ans === '각기둥'
    options:
    - 각기둥
    - 각기둥 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 각뿔'
    error: 도형 이름 오류!
  q2:
    title: 오각기둥 락
    qtext: <strong>Q2. [꼭짓점의 개수]</strong><br>밑면이 오각형인 오각기둥의 꼭짓점의 개수를 구하시오.
    hint: n각기둥의 꼭짓점 개수 공식은 2n 입니다.
    ans_check: ans === '10'
    options:
    - '8'
    - '10'
    - '20'
    - '12'
    placeholder: 숫자만 입력
    error: 개수 오류!
  q3:
    title: 육각뿔 모서리
    qtext: <strong>Q3. [모서리의 개수]</strong><br>밑면이 육각형인 육각뿔의 모서리의 개수를 구하시오.
    hint: n각뿔의 모서리 개수 공식은 2n 입니다.
    ans_check: ans === '12'
    options:
    - '14'
    - '24'
    - '10'
    - '12'
    placeholder: 숫자만 입력
    error: 개수 오류!
  q4:
    title: 뿔대 봉인
    qtext: <strong>Q4. [면의 개수]</strong><br>사각뿔대의 면의 개수를 구하시오.
    hint: n각뿔대의 면의 개수는 밑면 2개와 옆면 n개를 더해 n+2 개입니다.
    ans_check: ans === '6'
    options:
    - '4'
    - '6'
    - '8'
    - '12'
    placeholder: 숫자만 입력
    error: 개수 오류!
  q5:
    title: 성스러운 다면체
    qtext: <strong>Q5. [정다면체]</strong><br>각 면이 모두 합동인 정삼각형이고 한 꼭짓점에 모이는 면의 개수가 3개인
      정다면체의 이름을 구하시오.
    hint: 면이 정삼각형인 정다면체 중 한 꼭짓점에 모이는 면의 개수가 3개인 첫 번째 도형입니다.
    ans_check: ans === '정사면체'
    options:
    - 정사면체
    - 정사면체 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 정육면체'
    error: 정다면체 이름 오류!
  q6:
    title: '제2구역: 도자기 방'
    qtext: <strong>Q6. [회전체의 이해]</strong><br>평면도형을 한 직선을 축으로 하여 1회전 시킬 때 생기는 입체도형을
      무엇이라 부르는가?
    hint: 평면도형을 한 직선을 축으로 하여 1회전 시킬 때 생기는 입체도형의 총칭입니다.
    ans_check: ans === '회전체'
    options:
    - 회전체
    - 회전체 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 다면체'
    error: 도형 종류 오류!
  q7:
    title: 세로 절단면
    qtext: <strong>Q7. [회전축과 단면 1]</strong><br>원기둥을 회전축을 포함하는 평면으로 자를 때 생기는 단면의 모양은
      무엇인가?
    hint: 원기둥의 가운데 회전축을 포함하도록 위에서 아래로 세로로 자른 단면의 평면 모양을 생각합니다.
    ans_check: ans === '직사각형'
    options:
    - 직사각형
    - 직사각형 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 사각형'
    error: 단면 모양 오류!
  q8:
    title: 가로 절단면
    qtext: <strong>Q8. [회전축과 단면 2]</strong><br>원뿔을 회전축에 수직인 평면으로 자를 때 생기는 단면의 모양은
      무엇인가?
    hint: 원뿔을 밑면에 평행하게(회전축에 수직으로) 가로로 자를 때 나타나는 단면의 모양을 생각합니다.
    ans_check: ans === '원'
    options:
    - 원
    - 원 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 타원'
    error: 단면 모양 오류!
  q9:
    title: 직각삼각형 회전
    qtext: <strong>Q9. [회전체의 종류]</strong><br>직각삼각형을 직각을 낀 한 변을 축으로 하여 1회전 시킬 때 생기는
      도형은 무엇인가?
    hint: 직각삼각형을 한 변을 축으로 돌리면 고깔모자나 고깔콘 형태의 입체도형이 만들어집니다.
    ans_check: ans === '원뿔'
    options:
    - 원뿔
    - 원뿔 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 원기둥'
    error: 도형 이름 오류!
  q10:
    title: 구의 단면
    qtext: <strong>Q10. [구의 성질]</strong><br>구를 어떤 평면으로 자르더라도 그 단면은 항상 어떤 모양인가?
    hint: 구를 어떤 방향으로 자르더라도 그 단면의 평면 모양은 항상 완벽한 원이 됩니다.
    ans_check: ans === '원'
    options:
    - 원
    - 원 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 타원'
    error: 단면 오류!
    extra_class: glitch-bg
  q11:
    title: '제3구역: 각기둥 도금'
    qtext: <strong>Q11. [각기둥의 겉넓이]</strong><br>밑면이 가로 3cm, 세로 4cm인 직사각형이고, 높이가 5cm인
      직육면체의 겉넓이를 구하시오.
    hint: 세 모서리가 a, b, c인 직육면체의 겉넓이는 모든 면의 넓이 합이므로 2(ab + bc + ca) 입니다.
    ans_check: ans === '94'
    placeholder: 숫자만 입력
    error: 도금 면적 오류!
  q12:
    title: 원기둥 겉넓이
    qtext: <strong>Q12. [원기둥의 겉넓이]</strong><br>밑면의 반지름이 2cm이고 높이가 6cm인 원기둥의 겉넓이를 구하시오.
    hint: 원기둥의 밑면 2개의 넓이(2 * 파이 * r^2)와 옆면 펼친 직사각형 넓이(2 * 파이 * r * h)를 더합니다.
    ans_check: ans === '32파이'
    placeholder: '예: 10파이'
    error: 도금 면적 오류!
  q13:
    title: 정사각뿔 상자
    qtext: <strong>Q13. [사각뿔의 겉넓이]</strong><br>밑면이 한 변의 길이가 4cm인 정사각형이고, 옆면의 삼각형의
      높이가 5cm인 정사각뿔의 겉넓이를 구하시오.
    hint: 밑면 정사각형의 넓이(4*4)와 합동인 옆면 삼각형 4개의 넓이 합을 더합니다.
    ans_check: ans === '56'
    placeholder: 숫자만 입력
    error: 도금 면적 오류!
  q14:
    title: 원뿔 제단
    qtext: <strong>Q14. [원뿔의 겉넓이]</strong><br>밑면의 반지름이 3cm이고, 모선의 길이가 5cm인 원뿔의 겉넓이를
      구하시오.
    hint: 원뿔의 겉넓이 공식인 (밑면 원 넓이) + (옆면 부채꼴 넓이) = 파이*r^2 + 파이*r*l 을 적용합니다.
    ans_check: ans === '24파이'
    placeholder: '예: 10파이'
    error: 도금 면적 오류!
  q15:
    title: 구의 표면적
    qtext: <strong>Q15. [구의 겉넓이]</strong><br>반지름의 길이가 3cm인 구의 겉넓이를 구하시오.
    hint: 반지름이 r인 구의 겉넓이 공식은 4 * 파이 * r^2 입니다.
    ans_check: ans === '36파이'
    placeholder: '예: 10파이'
    error: 도금 면적 오류!
    extra_class: glitch-bg
  q16:
    title: '제4구역: 생명의 수조'
    qtext: <strong>Q16. [각기둥의 부피]</strong><br>밑면의 넓이가 20cm²이고 높이가 8cm인 각기둥의 부피를 구하시오.
    hint: 모든 기둥의 부피는 (밑넓이) * (높이)로 일정하게 구합니다.
    ans_check: ans === '160'
    placeholder: 숫자만 입력
    error: 수압 조절 실패!
  q17:
    title: 원기둥 부피
    qtext: <strong>Q17. [원기둥의 부피]</strong><br>밑면의 반지름이 4cm이고 높이가 5cm인 원기둥의 부피를 구하시오.
    hint: 원기둥의 부피 공식인 (밑면 원 넓이) * (높이) = 파이 * r^2 * h 를 적용합니다.
    ans_check: ans === '80파이'
    placeholder: '예: 10파이'
    error: 물이 넘칩니다!
  q18:
    title: 원뿔 여과기
    qtext: <strong>Q18. [원뿔의 부피]</strong><br>밑면의 반지름이 3cm이고 높이가 4cm인 원뿔의 부피를 구하시오.
    hint: 모든 뿔의 부피는 동일한 기둥 부피의 1/3을 차지하므로, (1/3) * 파이 * r^2 * h 입니다.
    ans_check: ans === '12파이'
    placeholder: '예: 10파이'
    error: 물이 넘칩니다!
  q19:
    title: 구형 물탱크
    qtext: <strong>Q19. [구의 부피]</strong><br>반지름의 길이가 3cm인 구의 부피를 구하시오.
    hint: 반지름이 r인 구의 부피 공식은 (4/3) * 파이 * r^3 입니다.
    ans_check: ans === '36파이'
    placeholder: '예: 10파이'
    error: 물이 부족합니다!
  q20:
    title: 부피의 비례
    qtext: <strong>Q20. [부피의 비]</strong><br>밑면의 반지름과 높이가 모두 같은 원뿔, 구, 원기둥의 부피의 비를
      구하시오.
    hint: 높이와 밑면이 같은 원뿔, 구, 원기둥의 부피의 비를 가장 간단한 자연수의 비로 나타내 봅니다.
    ans_check: ans === '1:2:3'
    placeholder: '예: 1:2:3'
    error: 코드가 틀렸습니다!
    extra_class: glitch-bg
