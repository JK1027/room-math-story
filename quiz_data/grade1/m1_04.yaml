questions:
  q1:
    title: 심해로 가는 좌표 (순서쌍과 좌표)
    qtext: <strong>Q1. [순서쌍 좌표 찍기]</strong><br>x좌표가 -5 이고, y좌표가 8 인 점의 <strong>좌표</strong>를
      순서쌍 기호 괄호 ()를 사용하여 나타내시오.
    hint: 순서쌍은 (x좌표, y좌표) 형태로 나타내며, 괄호와 쉼표를 정확히 표시합니다. 주어진 문제에서 x좌표와 y좌표가 무엇인지 찾아
      차례대로 적어보세요.
    ans_check: ans === '-5,8'
    options:
    - '-5'
    - '8'
    - '-5'
    - 8 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: (3, 4)'
    error: 투하 궤적이 정렬되지 않아 선체가 조류에 흔들립니다!
  q2:
    title: 심해로 가는 좌표
    qtext: <strong>Q2. [x축, y축 위의 점]</strong><br>x축 위에 있고 x좌표가 7인 점의 좌표를 나타내시오.
    hint: x축 위에 있는 점들은 y축 방향으로 움직이지 않았으므로 y좌표가 항상 0입니다. 즉, (x좌표, 0)의 형태가 됩니다.
    ans_check: ans === '7,0'
    options:
    - '7'
    - '0'
    - '7'
    - 0 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: (2, 0)'
    error: 수평 보조 밸브 고장! 수압 경고등이 켜집니다!
  q3:
    title: 심해로 가는 좌표
    qtext: <strong>Q3. [원점의 좌표]</strong><br>두 좌표축이 만나는 원점 O의 좌표를 나타내시오.
    hint: 원점은 x축 and y축이 교차하는 시작점입니다. x좌표와 y좌표가 모두 0이 되는 지점을 순서쌍 형태로 나타내보세요.
    ans_check: ans === '0,0'
    options:
    - '0'
    - '0'
    - '0'
    - 0 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: (x, y)'
    error: 영점 동기화 실패! 자이로 센서가 빙글빙글 돕니다!
  q4:
    title: 심해로 가는 좌표
    qtext: <strong>Q4. [좌표 평면 위의 점]</strong><br>y축 위에 있고 y좌표가 -3인 점의 좌표를 나타내시오.
    hint: y축 위에 있는 점들은 x축 방향으로 움직이지 않았으므로 x좌표가 항상 0입니다. 즉, (0, y좌표)의 형태가 됩니다.
    ans_check: ans === '0,-3'
    options:
    - '0'
    - '-3'
    - '0'
    - -3 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: (0, -5)'
    error: 수직 제어가 늦어 절벽에 부딪힐 뻔했습니다!
  q5:
    title: 심해로 가는 좌표
    qtext: <strong>Q5. [도형의 넓이]</strong><br>좌표평면 위에 네 기둥 A(3, 4), B(-3, 4), C(-3,
      -4), D(3, -4)를 이은 직사각형의 넓이를 구하시오.
    hint: 직사각형의 가로 길이는 두 x좌표 사이의 거리이고, 세로 길이는 두 y좌표 사이의 거리입니다. 가로와 세로의 길이를 각각 구해 서로
      곱해보세요.
    ans_check: ans === '48'
    options:
    - '46'
    - '48'
    - '50'
    - '96'
    placeholder: 숫자만 입력
    error: 차단벽 넓이 연산 오류! 잠수정이 튕겨 나옵니다!
  q6:
    title: 아틀란티스의 사분면 결계
    qtext: <strong>Q6. [사분면의 부호 1]</strong><br>점 (2, -5)는 제 몇 사분면 위의 점인가?
    hint: 선택지에서 제4사분면을 골라주세요. x좌표가 양수(+)이고, y좌표가 음수(-)인 영역입니다.
    ans_check: ans === '제4사분면'
    options:
    - 제1사분면
    - 제2사분면
    - 제3사분면
    - 제4사분면
    placeholder: 선택지를 골라주세요
    error: 잘못된 방어망 탐색! 빙글빙글 돌아갑니다.
  q7:
    title: 아틀란티스의 사분면 결계
    qtext: <strong>Q7. [사분면의 부호 2]</strong><br>점 (-4, -7)은 제 몇 사분면 위의 점인가?
    hint: 선택지에서 제3사분면을 골라주세요. x좌표와 y좌표가 모두 음수(-)인 영역입니다.
    ans_check: ans === '제3사분면'
    options:
    - 제1사분면
    - 제2사분면
    - 제3사분면
    - 제4사분면
    placeholder: 선택지를 골라주세요
    error: 사분면 위상 동조 실패! 회로가 삐걱거립니다.
  q8:
    title: 아틀란티스의 사분면 결계
    qtext: <strong>Q8. [사분면의 이해]</strong><br>점 P(a, b)에 대하여 a × b < 0 이고 a - b > 0
      일 때, 점 P는 제 몇 사분면 위에 있는지 구하시오.
    hint: 곱이 음수(a × b < 0)라는 것은 두 수의 부호가 서로 다름을 뜻합니다. 뺀 값(a - b > 0)이 양수라는 것은 어느 쪽이
      더 크다는 뜻일까요? 두 조건으로 a와 b의 부호를 판별해 보세요.
    ans_check: ans === '4' || ans.includes('제4') || ans.includes('4사')
    placeholder: '예: 4 또는 제4사분면'
    error: 부호 판별 불일치! 모듈이 달아오릅니다.
  q9:
    title: 아틀란티스의 사분면 결계
    qtext: <strong>Q9. [사분면의 응용 1]</strong><br>점 P(a, b)가 제2사분면 위의 점일 때, 점 Q(a, -b)는
      제 몇 사분면 위의 점인가?
    hint: 선택지에서 제3사분면을 골라주세요. P(a,b)가 2사분면이면 a<0, b>0 입니다. Q(a, -b)는 a<0, -b<0 이므로
      둘 다 음수입니다.
    ans_check: ans === '제3사분면'
    options:
    - 제1사분면
    - 제2사분면
    - 제3사분면
    - 제4사분면
    placeholder: 선택지를 골라주세요
    error: 신호 대칭 불일치! 펌프가 덜컹거립니다.
  q10:
    title: 아틀란티스의 사분면 결계
    qtext: <strong>Q10. [사분면의 응용 2]</strong><br>점 P(a, b)가 제3사분면 위의 점일 때, 점 Q(-a,
      b)는 제 몇 사분면 위의 점인가?
    hint: 점 P가 제3사분면 위의 점일 때 a와 b의 부호를 먼저 정해봅니다. 그 후 -a의 부호가 어떻게 바뀌는지 알아내어 점 Q의 (x좌표,
      y좌표) 부호를 분석해 보세요.
    ans_check: ans === '4' || ans.includes('제4') || ans.includes('4사')
    placeholder: '예: 4 또는 제4사분면'
    error: 잘못된 구역입니다!
    extra_class: glitch-bg
  q11:
    title: 해저 수압의 변화
    qtext: <strong>Q11. [그래프 해석 1]</strong><br>x분 동안 이동한 거리 y m를 나타낸 그래프가 수평을 유지한
      구간은 잠수정이 무엇을 의미하는가?
    hint: 시간(x)은 계속 흘러가는데 이동한 거리(y)를 나타내는 그래프의 높이가 변하지 않고 평평합니다. 이는 잠수정이 어떤 상태임을 뜻할까요?
    ans_check: ans === '정지'
    placeholder: '예: 상승, 하강, 정지'
    error: 상태 해석 불일치! 다시 생각해봐라!
  q12:
    title: 해저 수압의 변화
    qtext: <strong>Q12. [그래프 해석 2]</strong><br>잠수정이 수심 100m까지 10분 동안 일정한 속력으로 내려갔다.
      5분일 때 수심은 몇 m인가?
    hint: 일정한 속력으로 내려가므로 시간과 깊이는 정비례 관계입니다. 10분 동안 100m를 내려갔을 때, 절반의 시간인 5분 동안에는 몇
      m를 내려갔을지 비례식을 세워 보세요.
    ans_check: ans === '50'
    placeholder: 숫자만 입력
    error: 보간 연산 오류! 유압 계통이 윙윙거립니다.
  q13:
    title: 해저 수압의 변화
    qtext: <strong>Q13. [그래프 해석 3]</strong><br>그래프가 원점을 지나는 우상향 직선일 때, x가 증가하면 y는
      어떻게 되는가?
    hint: 선택지에서 '증가한다'를 골라주세요. 우상향하는 직선은 x축 값이 증가할 때 y축 값도 함께 올라갑니다.
    ans_check: ans === '증가한다'
    options:
    - 증가한다
    - 감소한다
    - 변하지 않는다
    placeholder: 선택지를 골라주세요
    error: 출력 증감 판단 오류! 똑바로 보아라!
  q14:
    title: 해저 수압의 변화
    qtext: <strong>Q14. [그래프 해석 4]</strong><br>수심 100m에서 5분간 머물렀다. 이 5분 동안 깊이 y값의
      변화량은 얼마인가?
    hint: 수심 100m 지점에 5분 동안 계속 가만히 멈춰 있었다면, 멈춰 있는 동안 깊이(y값)가 변한 양은 얼마일지 생각해 보세요.
    ans_check: ans === '0'
    placeholder: 숫자만 입력
    error: 변화량 오차 감지! 기어 동조가 안 됩니다.
  q15:
    title: 해저 수압의 변화
    qtext: <strong>Q15. [변수 관계 이해]</strong><br>시간 x가 지남에 따라 남은 산소량 y를 그래프로 그리면, 우하향하는
      모양인가 우상향하는 모양인가?
    hint: 선택지에서 '우하향하는 모양'을 골라주세요. 시간이 흐름에 따라 남은 산소량이 점차 소모되어 줄어드므로 하향곡선을 그립니다.
    ans_check: ans === '우하향하는 모양'
    options:
    - 우상향하는 모양
    - 우하향하는 모양
    - 수평인 모양
    placeholder: 선택지를 골라주세요
    error: 산소 예측 밸브 고착! 숨을 참아야 할지도 몰라요!
    extra_class: glitch-bg
  q16:
    title: 황금 문 톱니바퀴
    qtext: <strong>Q16. [정비례 관계]</strong><br>y가 x에 정비례하고, x=3일 때 y=15이다. x=5일 때 y의
      값을 구하시오.
    hint: y가 x에 정비례하므로 식 y = ax를 세울 수 있습니다. 먼저 주어진 x = 3, y = 15를 대입해 비례상수 a의 값을 구한
      후, 완성된 식에 x = 5를 대입해 보세요.
    ans_check: ans === '25'
    placeholder: 숫자만 입력
    error: 기어 이가 맞물리지 않고 덜그럭거립니다!
  q17:
    title: 황금 문 톱니바퀴
    qtext: <strong>Q17. [정비례 함수식]</strong><br>y = ax의 그래프가 점 (2, -8)을 지날 때, 상수 a의
      값을 구하시오.
    hint: 점 (2, -8)을 지난다는 것은 x = 2일 때 y = -8이 성립한다는 뜻입니다. 이 값을 y = ax 식에 대입하여 일차방정식을
      풀어보세요.
    ans_check: ans === '-4'
    placeholder: 숫자만 입력
    error: 거울 초점이 비틀어졌습니다! 다시 맞춰보세요.
  q18:
    title: 황금 문 톱니바퀴
    qtext: <strong>Q18. [반비례 관계 1]</strong><br>부력 장치 x개 and 1개당 감당할 무게 y kg은 반비례한다.
      4개를 달면 60kg을 감당할 때, 6개로 늘리면 몇 kg을 감당해야 하는가?
    hint: 두 변수 x, y가 반비례 관계일 때는 두 변수의 곱(x × y)이 항상 비례상수 a로 일정합니다. 먼저 4개일 때 60kg인 것을
      이용해 곱을 구하고, 6개일 때의 무게를 계산해 보세요.
    ans_check: ans === '40'
    placeholder: 숫자만 입력
    error: 부력 평형 균열 발생! 짐이 너무 무거워요.
  q19:
    title: 황금 문 톱니바퀴
    qtext: <strong>Q19. [반비례 관계 2]</strong><br>y가 x에 반비례하고 x=2일 때 y=10이다. y = a/x에서
      a의 값을 구하시오.
    hint: y가 x에 반비례하므로 y = a/x 식에 대입할 수 있습니다. 주어진 x = 2, y = 10을 대입하여 분수 식을 참으로 만드는
      상수 a의 값을 구해 보세요.
    ans_check: ans === '20'
    placeholder: 숫자만 입력
    error: 상수 불일치! 문이 꿈쩍도 안 합니다.
  q20:
    title: 황금 문 톱니바퀴
    qtext: <strong>Q20. [최종 암호 해독]</strong><br>반비례 그래프 y = 12/x 가 점 (-3, k)를 지난다.
      최종 암호 k의 값을 구하시오.
    hint: 점 (-3, k)가 반비례 그래프 위에 있으므로 x = -3, y = k를 식 y = 12/x에 대입하면 등식이 성립합니다. k값을
      계산해 보세요.
    ans_check: ans === '-4'
    placeholder: 숫자만 입력
    error: 차원 도약 포탈 동기화 실패! 조금만 더 집중하세요!
    extra_class: glitch-bg
