questions:
  q1:
    title: 단순화 코드 전송
    qtext: <strong>Q1. [문자의 사용]</strong><br>a × b × a × 3 을 곱셈 기호를 생략하고 거듭제곱을 사용하여
      간단히 나타내시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3a^2b' || ans === '3ba^2'
    options:
    - 3a^2b
    - 3a^2b 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 5x^2y'
    error: 구문 오류! 시스템 연결 실패!
  q2:
    title: 전력 요구 식 세우기
    qtext: <strong>Q2. [식 세우기]</strong><br>소형 포드 1개 작동에 x kW, 대형 포드 1개 작동에 1000 kW가
      듭니다. 소형 포드 5개와 대형 포드 1개를 동시에 작동할 때 필요한 총 전력량을 x에 대한 식으로 나타내시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5x+1000' || ans === '1000+5x'
    options:
    - 5x+1000
    - 5x+1000 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 3x+500'
    error: 에너지 초과 경고!
  q3:
    title: 냉각수 계수 대입
    qtext: <strong>Q3. [식의 값]</strong><br>x = -2 일 때, 대입 식 3x + 5 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-1'
    options:
    - '-3'
    - '-1'
    - '1'
    - '-2'
    placeholder: 숫자만 입력
    error: 냉각수 부족! 온도가 상승합니다!
  q4:
    title: 증폭 계수 추출
    qtext: <strong>Q4. [다항식과 일차식]</strong><br>다항식 2x² - 5x + 3 에서 x의 계수를 구하시오. (부호
      포함)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-5'
    options:
    - '-3'
    - '-10'
    - '-7'
    - '-5'
    placeholder: 숫자만 입력
    error: 증폭 계수 불일치! 차단벽 가동!
  q5:
    title: 예비 회로 분배 결합
    qtext: <strong>Q5. [일차식의 계산 1]</strong><br>식 3(2x - 4) + 2x 를 분배법칙을 활용해 간단히 정리한
      식을 입력하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8x-12'
    options:
    - 8x-12
    - 8x-12 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 5x-7'
    error: 회로 쇼트 경고! 전력 누출!
  q6:
    title: 서브 전압 분배기
    qtext: <strong>Q6. [일차식의 나눗셈]</strong><br>식 (6x - 4) ÷ 2 를 간단히 한 식을 입력하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3x-2'
    options:
    - 3x-2
    - 3x-2 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 2x-5'
    error: 배터리 과부하! 전력이 역류합니다!
  q7:
    title: 주파수 대역 통분 동기화
    qtext: <strong>Q7. [일차식의 계산 2]</strong><br>식 1/2(4x - 6) - 1/3(3x + 9) 를 계산하여
      간단히 하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'x-6'
    options:
    - x-6
    - x-6 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 2x-8'
    error: 주파수 왜곡! 동기화 실패!
  q8:
    title: 일차식 전원 코어 감별
    qtext: <strong>Q8. [일차식 판별]</strong><br>다음 중 차수가 1인 <strong>일차식</strong>의 번호만
      쓰시오.<br>(1) 3x² &nbsp;&nbsp;(2) 0 × x + 2 &nbsp;&nbsp;(3) 1/x + 1 &nbsp;&nbsp;(4)
      -2x + 1
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4'
    options:
    - 3x²
    - '0'
    - 1/x
    - -2x
    placeholder: 숫자만 입력
    error: 회로 폭발! 코어가 과열되었습니다!
  q9:
    title: 잔류 저항 동류항 정리
    qtext: <strong>Q9. [동류항 정리]</strong><br>식 2x - 3 - (x - 5) 를 계산하여 간단히 정리하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'x+2'
    options:
    - x+2
    - x+2 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 3x-4'
    error: 저항 매칭 실패! 감전 위험!
  q10:
    title: 부하값 대입 최종식
    qtext: <strong>Q10. [식의 대입 정리]</strong><br>A = x - 2, B = -2x + 3 일 때, 2A - B
      를 x에 대한 식으로 나타내시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4x-7'
    options:
    - 4x-7
    - 4x-7 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 3x+5'
    error: 시스템 임계치 돌파! 비상 경보!
    extra_class: glitch-bg
  q11:
    title: 진짜 보안 방정식 감별
    qtext: <strong>Q11. [방정식의 이해]</strong><br>다음 식 중 미지수 x에 따라 참도 되고 거짓도 되는 <strong>방정식</strong>인
      것의 번호를 쓰시오.<br>(1) 2x + 3 &nbsp;&nbsp;(2) x + x = 2x &nbsp;&nbsp;(3) 3x - 1
      = 5 &nbsp;&nbsp;(4) 3 < 5
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    placeholder: 숫자만 입력
    error: 위조 보안식 감지! 암호화 록!
  q12:
    title: 수압 밸브 이항 제어 1
    qtext: <strong>Q12. [일차방정식 1]</strong><br>방정식 x - 4 = 6 의 해를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '10'
    placeholder: 숫자만 입력
    error: 연료 부족! 엔진 시동 지연!
  q13:
    title: 수압 밸브 이항 제어 2
    qtext: <strong>Q13. [일차방정식 2]</strong><br>방정식 2x + 5 = 11 의 해를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    placeholder: 숫자만 입력
    error: 조정 각도 이탈! 압력 경보!
  q14:
    title: 미지수/상수 이항 격리
    qtext: <strong>Q14. [일차방정식 3]</strong><br>방정식 3x - 2 = x + 6 의 해를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4'
    placeholder: 숫자만 입력
    error: 격리 실패! 동력원 손상!
  q15:
    title: 비례식 펌프 동력비
    qtext: '<strong>Q15. [비례식 풀이]</strong><br>비례식 (x - 1) : 2 = (2x + 1) : 5 을 만족하는
      해 x의 값을 구하시오.'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '7'
    placeholder: 숫자만 입력
    error: 비율 붕괴! 기어 훼손 경고!
    extra_class: glitch-bg
  q16:
    title: 사출 궤도 충돌 방지
    qtext: <strong>Q16. [연속하는 세 수]</strong><br>연속하는 세 자연수의 합이 36일 때, 세 자연수 중 가장 큰
      자연수를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '13'
    placeholder: 숫자만 입력
    error: 궤도 겹침 감지! 발사 중단!
  q17:
    title: 유실된 시스템 정수 복원
    qtext: <strong>Q17. [식의 활용 1]</strong><br>어떤 수의 3배에서 5를 뺀 수는 어떤 수의 2배보다 4만큼 크다.
      이 어떤 수를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '9'
    placeholder: 숫자만 입력
    error: 데이터 복원 실패!
  q18:
    title: 산소 팩 과부족 분배
    qtext: <strong>Q18. [과부족 문제]</strong><br>요원들에게 산소 팩을 나누어 주는데, 한 명에게 4개씩 주면 3개가
      남고, 5개씩 주면 2개가 부족하다. 요원 수(명)를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    placeholder: 숫자만 입력
    error: 산소 배분 실패! 탑승 불가!
  q19:
    title: 대피 통로 거리 속력 연산
    qtext: <strong>Q19. [거리 속력 시간]</strong><br>해치까지 가는데 시속 4km로 걸어가면 시속 12km로 호버보드를
      타고 가는 것보다 20분 늦게 도착한다. 총 통로 거리(km)를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2' || ans === '2km'
    placeholder: 숫자만 입력
    error: 도착 시간 지연! 폭발 경보!
  q20:
    title: 동면 생체 나이 동기화
    qtext: <strong>Q20. [나이에 관한 문제]</strong><br>현재 어머니의 나이는 42세이고 딸의 나이는 12세이다. 어머니의
      나이가 딸의 나이의 3배가 되는 것은 몇 년 후인가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3' || ans === '3년'
    placeholder: 숫자만 입력
    error: 동기화 실패! 생체 나이 비동기화 경고!
    extra_class: glitch-bg
