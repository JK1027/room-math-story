questions:
  q1:
    title: "공방 서갑 열기"
    qtext: "<strong>Q1. [소수와 합성수]</strong><br>10 이하의 자연수 중 소수는 모두 몇 개인가?"
    hint: "10 이하의 소수(1보다 크고 1과 자기 자신만을 약수로 가지는 수)를 나열해 보세요. (예: 2, 3...)"
    ans_check: "ans === '4' || ans === '4개'"
    options: ["4", "6", "2", "8"]
    placeholder: "숫자 또는 개수 입력"
    error: "자물쇠가 굳게 닫혀 있습니다! 숫자를 다시 세어 보십시오."
  
  q2:
    title: "비밀 궤짝 수색"
    qtext: "<strong>Q2. [소수의 합]</strong><br>15 이하의 소수의 합을 구하시오."
    hint: "15 이하의 소수는 2, 3, 5, 7, 11, 13 입니다. 이 수들을 모두 합해 보세요."
    ans_check: "ans === '41'"
    options: ["82", "41", "43", "39"]
    placeholder: "숫자만 입력"
    error: "금고에서 불길한 경고음이 납니다!"

  q3:
    title: "壁面 문양 해독"
    qtext: "<strong>Q3. [합성수 판별]</strong><br>다음 중 합성수가 아닌 것은?<br>(1) 9 &nbsp;&nbsp;(2) 15 &nbsp;&nbsp;(3) 17 &nbsp;&nbsp;(4) 21"
    hint: "합성수는 1보다 큰 자연수 중 소수가 아닌 수(약수가 3개 이상인 수)입니다. 보기 중 약수가 1과 자기 자신뿐인 소수를 찾아보세요."
    ans_check: "ans === '3' || ans === '17' || ans === '(3)'"
    options: ["9", "15", "17", "21"]
    placeholder: "보기 번호 또는 숫자 입력"
    error: "벽에서 먼지가 떨어집니다! 잘못 선택했습니다."

  q4:
    title: "비밀 통로 개방"
    qtext: "<strong>Q4. [소수와 합성수의 성질]</strong><br>가장 작은 소수와 가장 작은 합성수의 합을 구하시오."
    hint: "가장 작은 소수는 2이고, 1보다 큰 자연수 중 소수가 아닌 가장 작은 합성수는 4입니다. 두 값을 더해보세요."
    ans_check: "ans === '6'"
    options: ["4", "6", "8", "12"]
    placeholder: "숫자만 입력"
    error: "계단이 흔들립니다! 함정이 작동하기 전 정답을 입력하세요."

  q5:
    title: "수은 수조 활성화"
    qtext: "<strong>Q5. [소수 찾기]</strong><br>20 이상 30 이하의 소수는 모두 몇 개인가?"
    hint: "20과 30 사이의 소수를 직접 하나씩 판별해 봅니다. (21은 3x7, 22는 2x11... 23은 소수...)"
    ans_check: "ans === '2' || ans === '2개'"
    options: ["4", "2", "0", "10"]
    placeholder: "숫자 또는 개수 입력"
    error: "수은이 역류하려고 합니다! 신속하게 개수를 맞추십시오."

  q6:
    title: "앙부일구 영침 정렬"
    qtext: "<strong>Q6. [지수 구하기]</strong><br>60을 소인수분해할 때, 2의 지수는 얼마인가?"
    hint: "60을 소수의 곱으로 쪼개어 나타냅니다. $60 = 2^2 \\times 3 \\times 5$ 입니다. 여기서 소인수 2 위에 쓰인 지수를 찾아보세요."
    ans_check: "ans === '2'"
    options: ["4", "2", "0", "10"]
    placeholder: "숫자만 입력"
    error: "조준 실패! 그림자가 어긋납니다."

  q7:
    title: "청동 반사판 정렬"
    qtext: "<strong>Q7. [거듭제곱의 계산]</strong><br>$2^3 \\times 3^2$ 의 값을 구하시오."
    hint: "거듭제곱을 풀어서 곱셈식으로 변환하세요. $2^3 = 2 \\times 2 \\times 2 = 8$, $3^2 = 3 \\times 3 = 9$ 입니다. 두 결과값을 곱해보세요."
    ans_check: "ans === '72'"
    options: ["70", "72", "74", "144"]
    placeholder: "숫자만 입력"
    error: "거울 각도가 틀렸습니다! 빛이 소멸합니다."

  q8:
    title: "청동 빗장 제어"
    qtext: "<strong>Q8. [소인수의 합]</strong><br>180의 소인수를 모두 더한 값을 구하시오."
    hint: "180을 소인수분해하면 $180 = 2^2 \\times 3^2 \\times 5$ 입니다. 여기서 소인수(밑에 쓰인 소수들)인 2, 3, 5를 더해 보세요."
    ans_check: "ans === '10'"
    options: ["8", "10", "20", "12"]
    placeholder: "숫자만 입력"
    error: "암호판이 잠겨 움직이지 않습니다!"

  q9:
    title: "톱니 기어 동기화"
    qtext: "<strong>Q9. [약수의 개수 1]</strong><br>72의 약수의 개수를 구하시오."
    hint: "72를 소인수분해하면 $72 = 2^3 \\times 3^2$ 입니다. 각 지수에 1을 더해 서로 곱해 보세요. 즉, $(3+1) \\times (2+1)$ 을 계산합니다."
    ans_check: "ans === '12'"
    options: ["14", "24", "10", "12"]
    placeholder: "숫자만 입력"
    error: "기어 맞물림 이상! 톱니 개수가 맞지 않습니다."

  q10:
    title: "정화의 결계 가동"
    qtext: "<strong>Q10. [약수의 개수 2]</strong><br>$3^4 \\times 5^a$ 의 약수의 개수가 15개일 때, a의 값을 구하시오."
    hint: "약수의 개수는 각 지수에 1을 더한 값들의 곱이므로, $(4+1) \\times (a+1) = 15$ 가 성립합니다. 즉, $5 \\times (a+1) = 15$ 식을 만족하는 a를 찾으세요."
    ans_check: "ans === '2'"
    options: ["4", "2", "0", "10"]
    placeholder: "숫자만 입력"
    error: "동기화 실패! 시간이 어긋납니다."
    extra_class: "glitch-bg"

  q11:
    title: "가마 수조 배출 밸브"
    qtext: "<strong>Q11. [최대공약수]</strong><br>24와 36의 최대공약수를 구하시오."
    hint: "24와 36을 소인수분해하여 공통된 소인수 중 지수가 같거나 작은 것을 선택해 곱해 봅니다. ($24=2^3 \\times 3$, $36=2^2 \\times 3^2$ 이므로 최대공약수는 $2^2 \\times 3 = 12$)"
    ans_check: "ans === '12'"
    placeholder: "숫자만 입력"
    error: "수압 이상! 물통이 파열될 위험이 있습니다!"

  q12:
    title: "물레바퀴 동력 동조"
    qtext: "<strong>Q12. [최소공배수]</strong><br>15와 25의 최소공배수를 구하시오."
    hint: "15와 25를 소인수분해하여 모든 소인수 중 지수가 크거나 같은 것을 골라 모두 곱해 봅니다. ($15 = 3 \\times 5$, $25 = 5^2$ 이므로 최소공배수는 $3 \\times 5^2 = 75$)"
    ans_check: "ans === '75'"
    placeholder: "숫자만 입력"
    error: "속도 불일치! 기어가 헛돕니다."

  q13:
    title: "부표 대 수평 조정"
    qtext: "<strong>Q13. [거듭제곱의 최대공약수]</strong><br>두 수 $2^2 \\times 3$, $2 \\times 3^2 \\times 5$ 의 최대공약수를 구하시오. (숫자로 환산)"
    hint: "공통인 소인수 2와 3에서 지수가 작은 쪽을 고릅니다. 즉, $2^1 \\times 3^1$ 이 최대공약수가 되며, 이를 계산하여 숫자로 적으세요."
    ans_check: "ans === '6'"
    placeholder: "숫자만 입력"
    error: "압축 피스톤 불균형! 진동이 커집니다."

  q14:
    title: "수로 배관 정화"
    qtext: "<strong>Q14. [공약수의 개수]</strong><br>두 수 12, 18의 공약수의 개수는 모두 몇 개인가?"
    hint: "두 수의 최대공약수의 약수의 개수가 공약수의 개수와 같습니다. 12와 18의 최대공약수인 6의 약수 개수(1, 2, 3, 6)를 구해보세요."
    ans_check: "ans === '4' || ans === '4개'"
    placeholder: "숫자 또는 개수 입력"
    error: "배수가 막혔습니다! 수조가 넘치려 합니다."

  q15:
    title: "자격루 영적 전력 복구"
    qtext: "<strong>Q15. [최소공배수의 성질]</strong><br>두 수의 곱이 300이고 최대공약수가 5일 때, 이 두 수의 최소공배수를 구하시오."
    hint: "밀실 중앙 서버 복구 공식 \"두 수의 곱 = 최대공약수 x 최소공배수\" 라는 수학적 성질을 이용합니다. 즉, $300 = 5 \\times 최소공배수$ 식을 만족하는 해를 계산하세요."
    ans_check: "ans === '60'"
    placeholder: "숫자만 입력"
    error: "부력 균형 붕괴! 부표가 가라앉습니다."
    extra_class: "glitch-bg"

  q16:
    title: "혼천의 복원 타일"
    qtext: "<strong>Q16. [최대공약수 활용]</strong><br>가로 18cm, 세로 24cm인 직사각형 벽을 가능한 큰 정사각형 타일로 빈틈없이 채우려 한다. 타일 한 변의 길이를 구하시오. (단위 생략)"
    hint: "벽면을 빈틈없이 쪼갤 때 타일 한 변의 길이는 가로(18)와 세로(24)의 공약수여야 하며, 가능한 가장 큰 타일이 되려면 최대공약수를 찾아야 합니다."
    ans_check: "ans === '6' || ans === '6cm'"
    placeholder: "숫자 또는 cm 입력"
    error: "타일 배치 실패! 벽면이 무너집니다."

  q17:
    title: "혼천의 기어 빗장"
    qtext: "<strong>Q17. [최소공배수 활용 1]</strong><br>톱니수가 각각 12개, 18개인 두 톱니바퀴 A, B가 맞물려 돌 때, 처음으로 다시 같은 톱니에서 맞물리려면 A는 몇 바퀴를 돌아야 하는가?"
    hint: "두 톱니바퀴가 처음으로 다시 제자리에서 맞물리는 총 톱니수는 12와 18의 최소공배수인 36개입니다. 기어 A(톱니수 12개)가 이 36개의 톱니만큼 돌려면 회전 수 36 / 12 를 계산하세요."
    ans_check: "ans === '3' || ans === '3바퀴'"
    placeholder: "숫자 또는 바퀴 수 입력"
    error: "기어 스펙이 안 맞습니다! 회전이 멈춥니다."

  q18:
    title: "태양 관측 렌즈 경통"
    qtext: "<strong>Q18. [최대공약수 활용 2]</strong><br>어떤 수로 37을 나누면 1이 남고, 46을 나누면 2가 남는다. 이러한 수 중 가장 큰 수를 구하시오."
    hint: "37을 나누었을 때 1이 남는다는 것은 36(= 37-1)이 나누어떨어진다는 뜻이고, 46을 나누어 2가 남는다는 것은 44(= 46-2)가 나누어떨어진다는 뜻입니다. 즉, 36과 44의 최대공약수를 찾습니다."
    ans_check: "ans === '4'"
    placeholder: "숫자만 입력"
    error: "렌즈 초점이 맞지 않아 일식이 보이지 않습니다!"

  q19:
    title: "대고 신호기 동기화"
    qtext: "<strong>Q19. [최소공배수 활용 2]</strong><br>버스 A는 10분, 버스 B는 15분 간격으로 출발한다. 오전 9시에 동시에 출발했다면, 다음으로 처음 동시에 출발하는 시각은 9시 몇 분인가? (분만 입력)"
    hint: "출발 주기 10과 15의 공배수 간격으로 동시에 출발하며, 처음으로 다시 동시에 출발하는 시점은 10과 15의 최소공배수인 30분 뒤가 됩니다."
    ans_check: "ans === '30' || ans === '30분'"
    placeholder: "숫자 또는 분 입력"
    error: "북 신호가 어긋나 백성들이 혼란에 빠집니다!"

  q20:
    title: "최종 탈출 격벽 봉인"
    qtext: "<strong>Q20. [최소공배수 활용 3]</strong><br>3, 4, 5 어느 수로 나누어도 2가 남는 가장 작은 세 자리 자연수를 구하시오."
    hint: "3, 4, 5로 나누어떨어지는 가장 작은 자연수는 최소공배수인 60입니다. 어느 수로 나누어도 2가 남는 수는 $60 \\times k + 2$ 형태이므로, k를 대입하여 가장 작은 세 자리 수인 $60 \\times 2 + 2$ 를 계산하세요."
    ans_check: "ans === '122'"
    placeholder: "숫자만 입력"
    error: "암호 실패! 일식 예측 보고가 불가능합니다!"
    extra_class: "glitch-bg"

