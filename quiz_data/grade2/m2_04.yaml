questions:
  q1:
    title: 보안 장벽 해독
    qtext: '<strong>Q1. [미지수 2개인 일차방정식]</strong><br>방정식 $2x + y - 5 = 0$ 은 미지수가 몇
      개인 일차방정식인가? (예: 2개)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2개'
    options:
    - 2개
    - 2개 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q2:
    title: 미술관 회로 판독
    qtext: <strong>Q2. [일차방정식 판별]</strong><br>다음 중 미지수가 2개인 일차방정식은?<br>(1) $x + 2
      = 3$<br>(2) $x + y = 5$<br>(3) $x^2 + y = 1$
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    options:
    - $x
    - $x^2
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q3:
    title: 유도 장치 매핑
    qtext: <strong>Q3. [자연수 해 구하기]</strong><br>$x, y$가 자연수일 때, $x + y = 3$ 을 만족하는
      순서쌍 $(x, y)$의 개수를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2' || ans === '2개'
    options:
    - '-1'
    - '1'
    - '3'
    - '2'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q4:
    title: 레이저 그물 분석
    qtext: <strong>Q4. [조건 만족 순서쌍]</strong><br>$x, y$가 자연수일 때, $2x + y = 5$ 를 만족하는
      순서쌍 $(x, y)$의 개수는 몇 개인가? (숫자 또는 개 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2개' || ans === '2'
    options:
    - 2개
    - 2개 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q5:
    title: 상수 매트릭스 도출
    qtext: <strong>Q5. [미지수 상수 대입]</strong><br>$x=1, y=2$ 가 방정식 $3x - ay = -1$ 의 해일
      때, 상수 $a$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    options:
    - '4'
    - '2'
    - '0'
    - '10'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q6:
    title: 보안 용어 동기화
    qtext: <strong>Q6. [연립방정식의 정의]</strong><br>두 일차방정식을 한 쌍으로 묶어 놓은 것을 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '연립일차방정식'
    options:
    - 연립일차방정식
    - 연립일차방정식 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q7:
    title: 상수 다이얼 매칭
    qtext: <strong>Q7. [공통 해 대입]</strong><br>$(x=2, y=1)$ 이 연립방정식 $\begin{cases} x+y=3
      \ ax-y=3 \end{cases}$ 의 해일 때, $a$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    options:
    - '4'
    - '2'
    - '0'
    - '10'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q8:
    title: 직관적 평형 복구
    qtext: <strong>Q8. [직관적 해 도출]</strong><br>$\begin{cases} x+y=5 \ x-y=1 \end{cases}$
      의 해 중 $x$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    options:
    - '6'
    - '1'
    - '3'
    - '5'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q9:
    title: 그래프 기하 분석
    qtext: <strong>Q9. [연립방정식과 그래프]</strong><br>연립방정식의 해는 두 일차방정식의 그래프가 만나는 ( ? )의
      좌표와 같다. ?에 들어갈 알맞은 용어는? (두 글자)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '교점'
    options:
    - 교점
    - 교점 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q10:
    title: 대입 해제 프로토콜
    qtext: <strong>Q10. [대입법의 정의]</strong><br>연립방정식을 풀 때 한 방정식을 다른 방정식에 대입하여 미지수를
      없애는 방법을 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '대입법'
    options:
    - 대입법
    - 대입법 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
    extra_class: glitch-bg
  q11:
    title: 가감 해제 프로토콜
    qtext: <strong>Q11. [가감법의 정의]</strong><br>연립방정식을 풀 때 두 방정식을 더하거나 빼서 미지수를 없애는 방법을
      무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '가감법'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q12:
    title: 대입 해법 시뮬레이션
    qtext: <strong>Q12. [대입법 연습]</strong><br>$\begin{cases} y = 2x \ x + y = 6 \end{cases}$
      을 대입법으로 풀 때, $x$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q13:
    title: 가감 조작 선택
    qtext: <strong>Q13. [소거 기호 판정]</strong><br>$\begin{cases} 2x + y = 7 \ 2x - y
      = 1 \end{cases}$ 을 가감법으로 풀기 위해 두 식을 어떻게 조작(더해야 / 빼야)하는지 쓰시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '더해야'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q14:
    title: 가감 결과 복구
    qtext: <strong>Q14. [가감법 실제 연산]</strong><br>Q13의 연립방정식 $\begin{cases} 2x + y =
      7 \ 2x - y = 1 \end{cases}$ 을 풀어 $x$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q15:
    title: 소거 매트릭스 복구
    qtext: <strong>Q15. [복합 연립방정식 연산]</strong><br>연립방정식 $\begin{cases} x + 2y = 4
      \ 3x + 2y = 8 \end{cases}$ 을 풀어 $x$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
    extra_class: glitch-bg
  q16:
    title: 토끼와 닭의 다리 수
    qtext: <strong>Q16. [다리 개수 식 세우기]</strong><br>토끼와 닭이 섞여 있는 우리에 머리가 모두 10개, 다리가
      모두 28개이다. 토끼를 $x$마리, 닭을 $y$마리라 할 때, 다리 수에 대한 방정식 중 토끼 다리의 개수 항(4x)을 쓰시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4X' || ans === '4*X'
    placeholder: '예: 4x'
    error: 틀렸습니다. 다시 시도해보세요.
  q17:
    title: 토끼 개수 추출
    qtext: '<strong>Q17. [토끼 마리 수 해 도출]</strong><br>Q16의 연립방정식을 풀어 토끼($x$)는 몇 마리인지
      구하시오. (예: 4마리)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4마리' || ans === '4'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q18:
    title: 동전 주머니 식
    qtext: <strong>Q18. [동전 개수 기호]</strong><br>100원짜리 동전 $x$개와 500원짜리 동전 $y$개를 합하여
      10개, 금액이 2600원일 때, 동전 개수에 대한 방정식 중 100원짜리 동전 개수의 미지수 기호(x)를 입력하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'X'
    placeholder: '예: x'
    error: 틀렸습니다. 다시 시도해보세요.
  q19:
    title: 100원 동전 개수
    qtext: '<strong>Q19. [동전 수량 구하기]</strong><br>Q18의 연립방정식을 풀어 100원짜리 동전($x$)은 몇
      개인가? (예: 6개)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '6개' || ans === '6'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
  q20:
    title: 최종 은신처 맵핑
    qtext: '<strong>Q20. [나이 연립방정식 활용]</strong><br>현재 아버지와 아들의 나이의 합은 50세이고, 5년 후에는
      아버지의 나이가 아들의 나이의 3배가 된다. 현재 아들의 나이를 구하시오. (예: 10세)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '10세' || ans === '10'
    placeholder: 정답 입력
    error: 틀렸습니다. 다시 시도해보세요.
    extra_class: glitch-bg
