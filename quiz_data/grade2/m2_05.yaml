    next_stage: panel_q11
    progress: 50
  event3:
    title: 핵심 복원 제단 활성화
    btn_text: 제단 활성화
    next_stage: panel_q16
    progress: 75
  event4:
    title: 탈출 차원 포탈 개방
    btn_text: 지상으로 탈출
    next_stage: outro
    progress: 100
