questions:
  q1:
    title: 설계도의 기본 뼈대
    qtext: <strong>Q1. [삼각형의 기본]</strong><br>두 변의 길이가 같은 삼각형을 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '이등변삼각형'
    options:
    - 이등변삼각형
    - 이등변삼각형 아님
    - 알 수 없음
    - 해 없음
    placeholder: 이등변삼각형 입력
    error: 삼각형의 명칭이 올바르지 않습니다.
  q2:
    title: 대칭의 각도
    qtext: <strong>Q2. [이등변삼각형의 성질 1]</strong><br>이등변삼각형의 두 ( ? )의 크기는 같다. (두 글자)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '밑각'
    options:
    - 밑각
    - 밑각 아님
    - 알 수 없음
    - 해 없음
    placeholder: 두 글자 입력
    error: 틀렸습니다. 밑변에 접하는 두 각의 이름입니다.
  q3:
    title: 기단의 경사각 계산
    qtext: <strong>Q3. [밑각의 크기 구하기]</strong><br>꼭지각이 40도인 이등변삼각형의 한 밑각의 크기를 구하시오.
      (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '70' || ans === '70도'
    options:
    - '70'
    - '72'
    - '140'
    - '68'
    placeholder: 숫자만 입력
    error: 틀렸습니다. 삼각형 내각의 합(180도)과 꼭지각의 차를 2로 나누어보세요.
  q4:
    title: 직각 기둥의 대칭 조건
    qtext: '<strong>Q4. [직각삼각형의 합동 조건]</strong><br>직각삼각형의 합동 조건 두 가지를 영어 기호로 쓰시오.
      (쉼표로 구분하여 예: RHS, RHA)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans.includes('RHS') && ans.includes('RHA')
    options:
    - RHS
    - RHA
    - SSS
    - SAS
    - ASA
    placeholder: '예: RHS, RHA'
    error: 합동 조건 기호가 올바르지 않습니다. (RHS, RHA 확인)
  q5:
    title: 예각의 합동 판정
    qtext: <strong>Q5. [RHA 합동의 성질]</strong><br>빗변의 길이와 한 예각의 크기가 같은 두 직각삼각형은 서로 합동이다.
      이 조건을 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans.includes('RHA')
    options:
    - RHS
    - RHA
    - SSS
    - SAS
    - ASA
    placeholder: 알파벳 기호 입력
    error: 틀렸습니다. R...?
  q6:
    title: 세 꼭짓점의 외접원
    qtext: <strong>Q6. [외심의 정의]</strong><br>삼각형의 세 꼭짓점을 지나는 원을 외접원이라 하고, 그 중심을 무엇이라
      하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '외심'
    options:
    - 외심
    - 내심
    - 무게중심
    - 수심
    placeholder: 두 글자 입력
    error: 올바른 명칭이 아닙니다. 바깥쪽 원의 중심입니다.
  q7:
    title: 기울어진 기둥의 외심
    qtext: <strong>Q7. [둔각삼각형의 외심 위치]</strong><br>둔각삼각형의 외심은 삼각형의 ( 내부 / 외부 )에 위치한다.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '외부'
    placeholder: 내부 또는 외부 입력
    error: 틀렸습니다. 기하학 모형을 머릿속으로 그려보세요.
  q8:
    title: 직각 지붕의 중심
    qtext: <strong>Q8. [직각삼각형의 외심 위치]</strong><br>직각삼각형의 외심은 빗변의 ( ? )에 위치한다. (두 글자)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '중점'
    placeholder: 두 글자 입력
    error: 틀렸습니다. 빗변을 정확히 반으로 가르는 지점입니다.
  q9:
    title: 세 내각의 분할점
    qtext: <strong>Q9. [내심의 정의]</strong><br>삼각형의 세 내각의 이등분선이 만나는 점을 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '내심'
    options:
    - 외심
    - 내심
    - 무게중심
    - 수심
    placeholder: 두 글자 입력
    error: 틀렸습니다. 안쪽 원의 중심입니다.
  q10:
    title: 내심의 거리적 특징
    qtext: <strong>Q10. [내심의 성질]</strong><br>삼각형의 내심에서 세 ( ? )에 이르는 거리는 같다. (한 글자)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '변'
    placeholder: 한 글자 입력
    error: 틀렸습니다. 기하학 구조를 확인하세요.
    extra_class: glitch-bg
  q11:
    title: 평행 회랑의 정의
    qtext: <strong>Q11. [평행사변형의 정의]</strong><br>마주 보는 두 쌍의 대변이 각각 평행한 사각형을 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '평행사변형'
    options:
    - 평행사변형
    - 평행사변형 아님
    - 알 수 없음
    - 해 없음
    placeholder: 다섯 글자 입력
    error: 올바른 명칭이 아닙니다.
  q12:
    title: 대변의 균형
    qtext: <strong>Q12. [평행사변형의 성질 1]</strong><br>평행사변형에서 마주 보는 대변의 길이는 서로 ( 같다 /
      다르다 ).
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '같다'
    placeholder: 같다 또는 다르다 입력
    error: 틀렸습니다. 두 대변의 길이를 가늠해보세요.
  q13:
    title: 대각의 평형
    qtext: <strong>Q13. [평행사변형의 성질 2]</strong><br>평행사변형에서 마주 보는 두 대각의 크기는 서로 ( 같다
      / 다르다 ).
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '같다'
    placeholder: 같다 또는 다르다 입력
    error: 틀렸습니다. 대칭되는 두 각의 관계를 상기하세요.
  q14:
    title: 대각선의 골조 교차
    qtext: <strong>Q15. [평행사변형의 성질 3]</strong><br>평행사변형의 두 대각선은 서로 다른 것을 ( ? ) 한다.
      (네 글자)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans.includes('이등분')
    placeholder: 네 글자 입력
    error: 틀렸습니다. 서로를 똑같이 둘로 나눕니다.
  q15:
    title: 인접한 두 각의 합
    qtext: <strong>Q15. [이웃한 각의 합]</strong><br>이웃하는 두 내각의 크기의 합이 항상 180도인 사각형은 무엇인가?
      (다섯 글자)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '평행사변형'
    options:
    - 평행사변형
    - 평행사변형 아님
    - 알 수 없음
    - 해 없음
    placeholder: 다섯 글자 입력
    error: 틀렸습니다. 대변이 평행한 사각형입니다.
    extra_class: glitch-bg
  q16:
    title: 직각 보석함의 형태
    qtext: <strong>Q16. [직사각형의 정의]</strong><br>네 내각의 크기가 모두 90도로 같은 사각형을 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '직사각형'
    placeholder: 세 글자 입력
    error: 틀렸습니다. 직각을 이루는 사각형입니다.
  q17:
    title: 보석함의 대각선 지지대
    qtext: <strong>Q17. [직사각형의 대각선 성질]</strong><br>직사각형의 두 대각선의 길이는 서로 ( 같다 / 다르다
      ).
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '같다'
    placeholder: 같다 또는 다르다 입력
    error: 틀렸습니다. 직사각형 대각선의 성질을 상기하세요.
  q18:
    title: 대칭 석재의 정렬
    qtext: <strong>Q18. [마름모의 정의]</strong><br>네 변의 길이가 모두 같은 사각형을 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '마름모'
    placeholder: 세 글자 입력
    error: 틀렸습니다. 마름모꼴 모양의 사각형입니다.
  q19:
    title: 수직 교차의 법칙
    qtext: <strong>Q19. [마름모의 대각선 성질]</strong><br>마름모의 두 대각선은 서로 수직으로 만난다. ( O / X
      )
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'O' || ans === '오' || ans === 'TRUE'
    options:
    - O
    - X
    placeholder: O 또는 X 입력
    error: 틀렸습니다. 마름모 대각선의 직교 성질을 생각해 보세요.
  q20:
    title: 완벽의 정사각형
    qtext: <strong>Q20. [정사각형의 정의]</strong><br>네 변의 길이가 같고 네 각의 크기가 모두 같은 사각형의 이름은
      무엇인가? (세 글자)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '정사각형'
    placeholder: 세 글자 입력
    error: 최종 보석의 명칭이 바르지 않습니다.
    extra_class: glitch-bg
