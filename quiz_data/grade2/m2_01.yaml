questions:
  q1:
    title: 사이버 트랙 분석
    qtext: <strong>Q1. [유리수와 소수]</strong><br>$\frac{3}{4}$ 을 소수로 나타내시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '0.75'
    options:
    - '0.75'
    - 0.75 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 0.5'
    error: 트랙 분석 실패! 소수 변환 값이 틀렸습니다.
  q2:
    title: 유한소수 게이트
    qtext: <strong>Q2. [유한소수의 뜻]</strong><br>소수점 아래 0이 아닌 숫자가 유한 번 나타나는 소수를 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '유한소수'
    options:
    - 유한소수
    - 순환소수
    - 순환하지 않는 무한소수
    - 정수
    placeholder: '네 글자 입력 (예: 무한소수)'
    error: 잘못된 보안 코드! 게이트가 열리지 않습니다.
  q3:
    title: 엔진 냉각 조율
    qtext: <strong>Q3. [유한소수 판별 조건]</strong><br>분수를 유한소수로 나타낼 수 있으려면 기약분수로 나타내었을 때
      분모의 소인수가 무엇무엇뿐이어야 하는가? (숫자만 쉼표로 구분)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: (ans.includes('2') && ans.includes('5')) || ans === '2또는5' || ans ===
      '2,5'
    options:
    - '4'
    - '2'
    - '0'
    - '10'
    placeholder: '예: 2, 5'
    error: 냉각 장치 오작동! 소인수 조건이 틀렸습니다.
  q4:
    title: 두 갈래 길 선택
    qtext: <strong>Q4. [유한소수 판별 1]</strong><br>$\frac{7}{20}$ 은 유한소수인가, 무한소수인가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '유한소수'
    options:
    - 유한소수
    - 순환소수
    - 순환하지 않는 무한소수
    - 정수
    placeholder: 유한소수 또는 무한소수 입력
    error: 함정 트랙으로 진입했습니다! 조종 불능!
  q5:
    title: 급커브 코스 감속
    qtext: <strong>Q5. [유한소수 판별 2]</strong><br>$\frac{13}{30}$ 은 유한소수인가, 무한소수인가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '무한소수'
    options:
    - 무한소수
    - 무한소수 아님
    - 알 수 없음
    - 해 없음
    placeholder: 유한소수 또는 무한소수 입력
    error: 오버스티어 발생! 차량이 트랙 밖으로 밀려납니다.
  q6:
    title: 무한 루프 진입
    qtext: <strong>Q6. [순환소수의 뜻]</strong><br>무한소수 중 일정한 숫자의 배열이 끝없이 되풀이되는 소수를 무엇이라
      하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '순환소수'
    options:
    - 유한소수
    - 순환소수
    - 순환하지 않는 무한소수
    - 정수
    placeholder: 네 글자 입력
    error: 동기화 실패! 무한 루프에 영원히 갇힙니다.
  q7:
    title: 순환마디 락 해제
    qtext: <strong>Q7. [순환소수 표현 1]</strong><br>0.3333... 을 순환마디에 점을 찍어 간단히 나타낸 기호를
      대괄호 형식을 사용하여 쓰시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '0.[3]' || ans === '0.(3)' || ans === '0.3'
    options:
    - 0.[3]
    - 0.[3] 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 0.[3] 또는 0.(3)'
    error: 해독 코드 불일치! 루프 차단막이 강해집니다.
  q8:
    title: 트랙 코어 해킹
    qtext: <strong>Q8. [순환마디 구하기 1]</strong><br>1.252525... 의 순환마디를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '25'
    options:
    - '27'
    - '50'
    - '25'
    - '23'
    placeholder: '예: 25'
    error: 패턴 인식 오류! 코어가 응답하지 않습니다.
  q9:
    title: 복합 루프 우회
    qtext: <strong>Q9. [순환소수 표현 2]</strong><br>0.4565656... 을 대괄호 형식을 사용하여 간단히 나타내시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '0.4[56]' || ans === '0.4(56)' || ans === '0.456'
    options:
    - 0.4[56]
    - 0.4[56] 아님
    - 알 수 없음
    - 해 없음
    placeholder: '예: 0.4[56]'
    error: 우회 실패! 백신 프로그램에 발각되었습니다.
  q10:
    title: 루프 마디 압축
    qtext: <strong>Q10. [순환마디 구하기 2]</strong><br>분수 $\frac{1}{3}$ 을 소수로 나타낼 때, 순환마디는
      무엇인가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    placeholder: 숫자만 입력
    error: 압축기 오작동! 기어 압력이 급상승합니다.
    extra_class: glitch-bg
  q11:
    title: 방화벽 1단계 돌파
    qtext: <strong>Q11. [순환소수를 분수로 1]</strong><br>순환소수 $0.\dot{7}$ 을 기약분수로 나타내시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '7/9'
    placeholder: '슬래시(/)를 사용하여 입력 (예: 7/9)'
    error: 포트가 즉시 잠겼습니다! 올바른 분수 값을 입력하세요.
  q12:
    title: 방화벽 2단계 돌파
    qtext: <strong>Q12. [순환소수를 분수로 2]</strong><br>$0.\dot{4}\dot{5}$ 를 기약분수로 나타내시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5/11' || ans === '45/99'
    placeholder: '예: 5/11'
    error: 우회 거부! 신호 주파수가 맞지 않습니다.
  q13:
    title: 방화벽 우회 공식
    qtext: <strong>Q13. [소수점 아래 정리]</strong><br>순환소수 $x = 0.\dot{3}$ 을 분수로 고치기 위해
      $10x - x$ 의 식을 이용한다. 이때 $9x$ 의 값은 얼마인가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    placeholder: 숫자만 입력
    error: 수식 동기화 실패! 데이터 오차가 발생했습니다.
  q14:
    title: 방화벽 3단계 돌파
    qtext: <strong>Q14. [순환소수를 분수로 3]</strong><br>$1.\dot{2}$ 를 기약분수로 나타내시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '11/9'
    placeholder: '예: 11/9'
    error: 잘못된 기약분수 전송! 방화벽 압박이 가중됩니다.
  q15:
    title: 방화벽 마스터 해킹
    qtext: <strong>Q15. [마스터 포트 해킹]</strong><br>순환소수 $x = 0.2\dot{5}$ 를 기약분수로 나타내시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '23/90'
    placeholder: '예: 23/90'
    error: 해킹 실패! 백신 시스템의 추적이 시작되었습니다!
    extra_class: glitch-bg
  q16:
    title: 부스터 점화 공식
    qtext: <strong>Q16. [분모 결정 공식]</strong><br>$0.1\dot{2}\dot{3}$ 을 분수로 고칠 때 분모에
      들어갈 숫자는 얼마인가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '990'
    placeholder: 숫자만 입력
    error: 출력 엔진 미시동! 분모 값이 잘못되었습니다.
  q17:
    title: 부스터 출력 충전
    qtext: <strong>Q17. [기약분수 조율]</strong><br>$0.1\dot{2}\dot{3}$ 을 분수로 고칠 때 분자에 들어갈
      식은 $123 - 1$ 이다. 계산한 최종 기약분수를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '61/495'
    placeholder: '예: 61/495'
    error: 에너지 충전 오류! 엔진 과부하!
  q18:
    title: 최종 부스터 대소비교
    qtext: <strong>Q18. [유리수 대소 비교]</strong><br>$0.\dot{3}$ 과 $0.3$ 중 어느 쪽이 더 큰가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '0.[3]' || ans === '0.(3)' || ans === '0.3(dot)' || ans ===
      '0.333...'
    placeholder: '예: 0.[3] 또는 0.(3)'
    error: 추진력 부족! 연료 연소 온도가 급감합니다.
  q19:
    title: 부스터 잠금 해제
    qtext: <strong>Q19. [유리수의 정의]</strong><br>모든 순환소수는 유리수이다. ( O / X )
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'O' || ans === 'o' || ans === '오'
    options:
    - O
    - X
    placeholder: O 또는 X 입력
    error: 회로 단선! 스파크가 발생합니다!
  q20:
    title: 골인 레이저 가동
    qtext: <strong>Q20. [순환소수의 극한]</strong><br>$0.\dot{9}$ 를 분수로 나타내면 얼마인가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1'
    placeholder: 숫자만 입력
    error: 조준 실패! 결승선 돌파 기회를 놓칩니다!
    extra_class: glitch-bg
