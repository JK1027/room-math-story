questions:
  q1:
    title: 닮음의 문양 계측
    qtext: <strong>Q1. [닮음의 정의]</strong><br>한 도형을 일정한 비율로 확대하거나 축소한 도형이 다른 도형과 합동이
      될 때, 두 도형은 서로 ( ? )인 관계에 있다고 한다.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '닮음'
    options:
    - 닮음
    - 합동
    - 대칭
    - 닮음비
    placeholder: 두 글자 입력
    error: 틀렸습니다. 대칭과 축소의 기본 관계 단어입니다.
  q2:
    title: 축소의 배율
    qtext: <strong>Q2. [닮음비의 정의]</strong><br>서로 닮은 두 평면도형에서 대응하는 선분의 길이의 비를 무엇이라 하는가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '닮음비'
    options:
    - 닮음
    - 합동
    - 대칭
    - 닮음비
    placeholder: 세 글자 입력
    error: 틀렸습니다. 닮음인 두 도형의 선분 길이의 비입니다.
  q3:
    title: 원형 거울의 굴절
    qtext: <strong>Q3. [원의 닮음]</strong><br>두 원은 항상 닮은 도형인가? ( O / X )
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'O' || ans === '오'
    options:
    - O
    - X
    placeholder: O 또는 X 입력
    error: 틀렸습니다. 모든 원은 중심에서 테두리까지 비율이 균일합니다.
  q4:
    title: 축소된 액자의 가로
    qtext: <strong>Q4. [비례식의 연산]</strong><br>닮음비가 2:3인 두 직사각형이 있다. 작은 직사각형의 가로가 4cm일
      때, 큰 직사각형의 가로는 몇 cm인가? (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '6' || ans === '6CM'
    placeholder: 단위 없이 숫자만 또는 '6cm' 입력
    error: 틀렸습니다. 비례식 $2:3 = 4:x$를 해결해보세요.
  q5:
    title: 체스판 타일의 닮음
    qtext: <strong>Q5. [정사각형의 닮음]</strong><br>모든 정사각형은 항상 서로 닮은 도형인가? ( O / X )
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'O' || ans === '오'
    options:
    - O
    - X
    placeholder: O 또는 X 입력
    error: 틀렸습니다. 정사각형은 네 변의 길이가 같고 네 각이 90도로 고정되어 있습니다.
  q6:
    title: 세 변의 닮음 조건
    qtext: <strong>Q6. [삼각형의 닮음 조건 1]</strong><br>삼각형의 세 쌍의 대응하는 변의 길이의 비가 같을 때의 닮음
      조건을 쓰시오. (영문 대문자)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'SSS'
    options:
    - SSS
    - SAS
    - AA
    - ASA
    placeholder: '영문 세 글자 입력 (예: SSS)'
    error: 기호가 올바르지 않습니다. Side-Side-Side의 약자입니다.
  q7:
    title: 변과 사잇각의 조건
    qtext: <strong>Q7. [삼각형의 닮음 조건 2]</strong><br>삼각형의 두 쌍의 대응하는 변의 길이의 비가 같고, 그 끼인각의
      크기가 같을 때의 닮음 조건을 쓰시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'SAS'
    options:
    - SSS
    - SAS
    - AA
    - ASA
    placeholder: '영문 세 글자 입력 (예: SAS)'
    error: 기호가 올바르지 않습니다. Side-Angle-Side의 약자입니다.
  q8:
    title: 두 각의 닮음 조건
    qtext: <strong>Q8. [삼각형의 닮음 조건 3]</strong><br>삼각형의 두 쌍의 대응하는 각의 크기가 같을 때의 닮음 조건을
      쓰시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'AA'
    options:
    - SSS
    - SAS
    - AA
    - ASA
    placeholder: '영문 두 글자 입력 (예: AA)'
    error: 기호가 올바르지 않습니다. Angle-Angle의 약자입니다.
  q9:
    title: 정삼각형의 정합비
    qtext: <strong>Q9. [정삼각형의 닮음]</strong><br>한 각이 60도인 두 정삼각형은 무조건 어떤 닮음 조건에 의해 닮음인가?
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'AA' || ans === 'AA닮음'
    options:
    - SSS
    - SAS
    - AA
    - ASA
    placeholder: '예: AA닮음'
    error: 조건이 틀렸습니다. 세 각의 크기가 모두 60도로 동일하게 되는 성질을 생각하세요.
  q10:
    title: 수선 궤적의 쪼개짐
    qtext: <strong>Q10. [직각삼각형의 닮음]</strong><br>직각삼각형 내부에서 직각인 꼭짓점에서 빗변에 수선을 내렸을 때
      만들어지는 두 개의 작은 직각삼각형은 서로 ( ? ) 관계이다.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '닮음'
    options:
    - 닮음
    - 합동
    - 대칭
    - 닮음비
    placeholder: 두 글자 입력
    error: 틀렸습니다. 크기는 다르지만 모양이 똑같습니다.
    extra_class: glitch-bg
  q11:
    title: 평행 관계의 사다리
    qtext: <strong>Q11. [중점연결정리와 위치]</strong><br>삼각형 ABC에서 변 AB의 중점 M, 변 AC의 중점 N을
      이은 선분 MN은 변 BC와 어떤 위치 관계에 있는가? (두 글자)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '평행'
    options:
    - 평행
    - 수직
    - 일치
    - 꼬인 위치
    placeholder: '두 글자 입력 (예: 평행)'
    error: 틀렸습니다. 두 기둥이 나란히 뻗어 있습니다.
  q12:
    title: 중점 연결의 길이 비
    qtext: '<strong>Q12. [중점연결정리와 길이비]</strong><br>삼각형 중점 연결 정리에서 선분 MN의 길이는 선분 BC의
      길이의 ( 몇 분의 몇 ) 인가? (예: 1/2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1/2' || ans === '절반' || ans === '0.5'
    placeholder: '예: 1/2 또는 절반'
    error: 틀렸습니다. 중점을 연결했으므로 크기가 절반으로 축소됩니다.
  q13:
    title: 평행 차단막의 닮음
    qtext: <strong>Q13. [평행선과 닮음]</strong><br>삼각형의 한 변에 평행한 선분을 그어 다른 두 변과 만나게 하면,
      새로 만들어진 작은 삼각형은 원래 삼각형과 ( ? ) 관계이다.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '닮음'
    placeholder: 두 글자 입력
    error: 틀렸습니다. 세 각의 크기가 같은 비례형 삼각형입니다.
  q14:
    title: 평행 빔의 등가 비율
    qtext: <strong>Q14. [평행선 사이의 선분비]</strong><br>평행한 세 직선이 두 직선과 만날 때, 잘린 대응하는 선분의
      길이의 비는 서로 ( 같다 / 다르다 ).
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '같다'
    placeholder: 같다 또는 다르다 입력
    error: 틀렸습니다. 평행선 사이의 선분 비례 공식을 생각하세요.
  q15:
    title: 질량 중심의 분할비
    qtext: '<strong>Q15. [무게중심의 성질]</strong><br>삼각형의 무게중심은 세 중선의 길이를 꼭짓점으로부터 각각 몇
      대 몇의 비율로 나누는가? (예: 2:1)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans.replace(/\s+/g, '') === '2:1' || ans.replace(/\s+/g, '') === '2대1'
    placeholder: '예: 2:1 또는 2대1'
    error: 비율이 올바르지 않습니다. 위쪽이 아래쪽보다 두 배 더 깁니다.
    extra_class: glitch-bg
  q16:
    title: 넓이의 차원비
    qtext: <strong>Q16. [닮음비와 넓이비]</strong><br>두 평면도형의 닮음비가 $m:n$ 일 때, 넓이의 비는 얼마인가?
      (거듭제곱 기호 ^ 사용)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans.replace(/\s+/g, '') === 'M^2:N^2' || ans.replace(/\s+/g, '') ===
      'M2:N2' || ans.replace(/\s+/g, '') === 'M^2대N^2'
    placeholder: '예: m^2:n^2'
    error: 비율 식이 잘못되었습니다. 넓이의 비는 닮음비의 제곱의 비입니다.
  q17:
    title: 정육면체 거울 상자의 표면적
    qtext: '<strong>Q17. [입체도형의 겉넓이비]</strong><br>두 정육면체의 닮음비가 1:2 일 때, 넓이(겉넓이)의 비는
      얼마인가? (예: 1:4)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans.replace(/\s+/g, '') === '1:4' || ans.replace(/\s+/g, '') === '1대4'
    placeholder: '예: 1:4 또는 1대4'
    error: 틀렸습니다. 닮음비가 1:2이면 넓이의 비는 제곱의 비입니다.
  q18:
    title: 부피의 차원비
    qtext: <strong>Q18. [닮음비와 부피비]</strong><br>두 입체도형의 닮음비가 $m:n$ 일 때, 부피의 비는 얼마인가?
      (세제곱 기호 ^ 사용)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans.replace(/\s+/g, '') === 'M^3:N^3' || ans.replace(/\s+/g, '') ===
      'M3:N3' || ans.replace(/\s+/g, '') === 'M^3대N^3'
    placeholder: '예: m^3:n^3'
    error: 부피의 비는 닮음비의 세제곱에 비례합니다.
  q19:
    title: 거울 구슬의 체적비
    qtext: '<strong>Q19. [구슬의 부피비]</strong><br>닮음비가 1:3 인 두 구슬의 부피의 비는 얼마인가? (예: 1:27)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans.replace(/\s+/g, '') === '1:27' || ans.replace(/\s+/g, '') === '1대27'
    placeholder: '예: 1:27'
    error: 틀렸습니다. 1과 3을 각각 세제곱하여 비율을 구하세요.
  q20:
    title: 광선 증폭의 최종 비례식
    qtext: <strong>Q20. [부피 활용 비례식]</strong><br>작은 컵의 부피가 10mL이다. 닮음비가 2:3인 큰 컵이 있다면,
      큰 컵의 부피(x)를 구하기 위한 비례식을 세워보시오. (공백 없이 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans.replace(/\s+/g, '') === '8:27=10:X' || ans.replace(/\s+/g, '')
      === '10:X=8:27'
    placeholder: '예: 8:27=10:x'
    error: 비례식 세팅 실패! 부피비는 닮음비의 세제곱인 8:27임을 이용해 10:x와 연계해 세우세요.
    extra_class: glitch-bg
