    title: 비상 차단 장치 리셋
    btn_text: 비상 전력 가동
    next_stage: panel_q11
    progress: 50
  event3:
    title: 핵심 복원 제단 활성화
    btn_text: 제단 활성화
    next_stage: panel_q16
    progress: 75
  event4:
    title: 탈출 차원 포탈 개방
