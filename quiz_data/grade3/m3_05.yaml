questions:
  q1:
    title: 중력 기준비 측정
    qtext: '<strong>Q1. [삼각비의 정의]</strong><br>직각삼각형에서 빗변의 길이에 대한 높이의 비율을 나타내는 삼각비의
      명칭을 구하시오. (한글 두 글자로 입력. 예: 사인)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '사인'
    options:
    - 사인
    - 코사인
    - 탄젠트
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q2:
    title: 중력 30도 경사각
    qtext: '<strong>Q2. [특수각의 삼각비 1]</strong><br>$\sin 30^\circ$ 의 값을 구하시오. (슬래시를
      사용해 분수로 나타내시오. 예: 1/2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1/2' || ans === '0.5'
    options:
    - 1/2
    - '0.5'
    - √3/2
    - '1'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q3:
    title: 밑변 45도 센서
    qtext: '<strong>Q3. [특수각의 삼각비 2]</strong><br>$\cos 45^\circ$ 의 값을 구하시오. (루트와 분수를
      사용해 공백 없이 나타내시오. 예: √2/2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '√2/2'
    options:
    - √2/2
    - √3/2
    - 1/2
    - '1'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q4:
    title: 상승 60도 빔 노즐
    qtext: '<strong>Q4. [특수각의 삼각비 3]</strong><br>$\tan 60^\circ$ 의 값을 구하시오. (예: √3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '√3'
    options:
    - √3
    - √2
    - '1'
    - '3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q5:
    title: 가변 삼각 격자비
    qtext: '<strong>Q5. [삼각비의 계산]</strong><br>직각삼각형 ABC 에서 $\angle B = 90^\circ$ 이고,
      빗변 $AC = 5$, 높이 $BC = 4$, 밑변 $AB = 3$ 일 때, $\sin A$ 의 값을 구하시오. (슬래시 분수 입력 예:
      4/5)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4/5' || ans === '0.8'
    options:
    - 4/5
    - 3/5
    - '1'
    - '0.8'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q6:
    title: 중력 최대 지향점 90도
    qtext: <strong>Q6. [임계 삼각비 1]</strong><br>$\sin 90^\circ$ 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1'
    options:
    - '1'
    - '0'
    - 1/2
    - √3/2
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q7:
    title: 수평 수축 한계 90도
    qtext: <strong>Q7. [임계 삼각비 2]</strong><br>$\cos 90^\circ$ 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '0'
    options:
    - '0'
    - '1'
    - 1/2
    - √2/2
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q8:
    title: 대칭 반사각 45도
    qtext: <strong>Q8. [임계 삼각비 3]</strong><br>$\tan 45^\circ$ 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1'
    options:
    - '1'
    - √3
    - √3/3
    - '0'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q9:
    title: 출발 수평각 0도
    qtext: <strong>Q9. [임계 삼각비 4]</strong><br>$\cos 0^\circ$ 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1'
    options:
    - '1'
    - '0'
    - 1/2
    - √3/2
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q10:
    title: 합성 삼각 주파수
    qtext: '<strong>Q10. [삼각비의 덧셈 계산]</strong><br>$\sin 60^\circ + \cos 30^\circ$
      의 값을 구하시오. (루트를 사용해 공백 없이 입력. 예: √3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '√3'
    options:
    - √3
    - 2√3
    - '1'
    - '0'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q11:
    title: 수직 제로 조향각 0도
    qtext: <strong>Q11. [기본 삼각비 5]</strong><br>$\tan 0^\circ$ 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '0'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q12:
    title: 동조 융합곱 45도
    qtext: '<strong>Q12. [삼각비의 곱셈 계산]</strong><br>$\sin 45^\circ \times \cos 45^\circ$
      의 값을 구하시오. (슬래시를 사용해 분수로 나타내시오. 예: 1/2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1/2' || ans === '0.5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q13:
    title: 유리화된 레이저 위상
    qtext: '<strong>Q13. [유리화된 삼각비]</strong><br>$\tan 30^\circ$ 의 값을 구하시오. (루트와 분수를
      사용해 공백 없이 나타내시오. 예: √3/3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '√3/3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q14:
    title: 항해 빗변 투영 고도
    qtext: <strong>Q14. [빗변과 높이의 계산]</strong><br>직각삼각형 ABC 에서 $\angle C = 90^\circ$
      이고 빗변 $AB = 10$, $\angle A = 30^\circ$ 일 때, 높이 $BC$ 의 길이를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q15:
    title: 수평 경사 높이 정합
    qtext: <strong>Q15. [밑변과 탄젠트 응용]</strong><br>직각삼각형 ABC 에서 $\angle C = 90^\circ$
      이고 밑변 $AC = 8$, $\angle A = 45^\circ$ 일 때, 대변 $BC$ 의 길이를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q16:
    title: 예각 에너지 융합 넓이 1
    qtext: <strong>Q16. [삼각형의 넓이 계산 1]</strong><br>두 변의 길이가 각각 4, 6이고 그 사잇각이 $30^\circ$
      인 삼각형의 넓지를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '6'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q17:
    title: 예각 에너지 융합 넓이 2
    qtext: '<strong>Q17. [삼각형의 넓이 계산 2]</strong><br>두 변의 길이가 각각 6, 8이고 그 사잇각이 $45^\circ$
      인 삼각형의 넓이를 구하시오. (루트를 사용해 공백 없이 나타내시오. 예: 12√2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '12√2'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q18:
    title: 둔각 궤도 에너지 감쇄 넓이
    qtext: '<strong>Q18. [둔각삼각형의 넓이]</strong><br>두 변의 길이가 각각 4, 5이고 그 사잇각이 $120^\circ$
      인 둔각삼각형의 넓이를 구하시오. (루트를 사용해 공백 없이 나타내시오. 예: 5√3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5√3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q19:
    title: 이중 평행 궤도 넓이
    qtext: '<strong>Q19. [평행사변형의 넓이]</strong><br>이웃한 두 변의 길이가 5, 8이고 그 사잇각이 $60^\circ$
      인 평행사변형의 넓이를 구하시오. (루트를 사용해 공백 없이 나타내시오. 예: 20√3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '20√3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q20:
    title: 최종 탈출 관측소 높이
    qtext: '<strong>Q20. [삼각비의 높이 측정 활용]</strong><br>관측소 돔탑 밑동에서 10m 떨어진 지점에서 돔탑 꼭대기를
      올려다본 각도가 $30^\circ$ 일 때, 돔탑의 높이를 구하시오. (루트와 분수를 사용해 공백 없이 나타내시오. 예: 10√3/3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '10√3/3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
