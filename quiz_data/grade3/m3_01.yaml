questions:
  q1:
    title: 제곱근의 기초 각인
    qtext: '<strong>Q1. [제곱근의 정의]</strong><br>9의 제곱근을 구하시오. (단, 답이 2개인 경우 ± 기호를 사용해
      나타내시오. 예: ±3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '±3' || ans === '+-3' || ans === '3,-3' || ans === '-3,3'
    options:
    - ±3
    - ±3 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q2:
    title: 근호의 해독
    qtext: <strong>Q2. [근호의 성질]</strong><br>$\sqrt{16}$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4'
    options:
    - '4'
    - '6'
    - '2'
    - '8'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q3:
    title: 제곱근의 명칭 구분
    qtext: <strong>Q3. [제곱근 읽기]</strong><br>제곱근 25의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    options:
    - '10'
    - '3'
    - '7'
    - '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q4:
    title: 음수 제곱의 양의 근
    qtext: <strong>Q4. [제곱근의 성질 2]</strong><br>$(-3)^2$의 제곱근 중 양수인 것을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    options:
    - '6'
    - '1'
    - '3'
    - '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q5:
    title: 유리수와 무리수의 경계
    qtext: "<strong>Q5. [무리수 판별]</strong><br>다음 보기 중 무리수인 것의 번호를 쓰시오.<br>(1) $0.1$<br>(2)\
      \ $\\sqrt{4}$<br>(3) $\\pi$<br>(4) $-\frac{1}{2}$"
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3' || ans === '(3)'
    options:
    - (1)
    - (2)
    - (3)
    - (4)
    placeholder: '번호 입력 (예: 3)'
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q6:
    title: 대소 관계 분석
    qtext: <strong>Q6. [실수의 대소 비교]</strong><br>두 실수 $\sqrt{2}$와 $\sqrt{3}$ 중 더 큰 수를
      쓰시오. (루트 기호 포함 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '√3' || ans === '루트3'
    options:
    - √3
    - √3 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q7:
    title: 정수 궤도 매핑
    qtext: <strong>Q7. [무리수의 정수 부분]</strong><br>$\sqrt{5}$의 정수 부분을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    options:
    - '4'
    - '2'
    - '0'
    - '10'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q8:
    title: 소수 부분의 잔여 에너지
    qtext: '<strong>Q8. [무리수의 소수 부분]</strong><br>$\sqrt{5}$의 소수 부분을 구하시오. (루트 기호를
      사용하여 식으로 나타내시오. 예: √5-2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '√5-2'
    options:
    - √5-2
    - √5-2 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q9:
    title: 소인수 정합의 밖
    qtext: <strong>Q9. [a√b 형태로 나타내기]</strong><br>$\sqrt{12}$를 $a\sqrt{b}$ 꼴로 나타낼
      때, 자연수 $a, b$에 대하여 $a+b$의 값을 구하시오. (단, $b$는 가장 작은 자연수)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    options:
    - '10'
    - '3'
    - '7'
    - '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q10:
    title: 수직선 좌표 정합
    qtext: <strong>Q10. [수직선 대소 비교]</strong><br>수직선 위에서 2와 $\sqrt{5}$ 중 더 우측에 있는 수를
      쓰시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '√5' || ans === '루트5'
    options:
    - √5
    - √5 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q11:
    title: '사칙 마법진: 곱셈'
    qtext: "<strong>Q11. [근호의 곱셈]</strong><br>$\\sqrt{3} \times \\sqrt{5}$ 의 값을 구하시오.\
      \ (루트 기호 포함 입력)"
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '√15' || ans === '루트15'
    options:
    - √15
    - √15 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q12:
    title: '사칙 마법진: 나눗셈'
    qtext: <strong>Q12. [근호의 나눗셈]</strong><br>$\sqrt{18} \div \sqrt{2}$ 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q13:
    title: 혼합 빔의 조율
    qtext: "<strong>Q13. [근호의 곱셈 2]</strong><br>$2\\sqrt{6} \times 3\\sqrt{3}$ 의 값을\
      \ 구하시오. (간단히 나타내시오. 예: 18√2)"
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '18√2' || ans === '18루트2'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q14:
    title: 유리화의 수식 변환
    qtext: "<strong>Q14. [분모의 유리화]</strong><br>$\frac{6}{\\sqrt{3}}$의 분모를 유리화한 값을\
      \ 구하시오. (예: 2√3)"
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2√3' || ans === '2루트3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q15:
    title: 에너지 핵 융합
    qtext: "<strong>Q15. [기본 곱셈 연산]</strong><br>$\\sqrt{20} \times \\sqrt{5}$ 의 값을\
      \ 구하시오."
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '10'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q16:
    title: 동류항 합산 공식
    qtext: '<strong>Q16. [근호를 포함한 식의 덧셈]</strong><br>$3\sqrt{2} + 5\sqrt{2}$ 의 값을
      구하시오. (예: 8√2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8√2' || ans === '8루트2'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q17:
    title: 분배의 마법진
    qtext: '<strong>Q17. [분배법칙과 근호]</strong><br>$\sqrt{2}(\sqrt{2} + \sqrt{6})$ 의
      값을 분배법칙을 이용해 계산하시오. (예: 2+2√3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2+2√3' || ans === '2+2루트3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q18:
    title: 수식 압축 및 감쇄
    qtext: '<strong>Q18. [근호의 변형과 뺄셈]</strong><br>$5\sqrt{3} - \sqrt{12}$ 의 값을 구하시오.
      (예: 3√3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3√3' || ans === '3루트3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q19:
    title: 유리수와 무리수의 분리
    qtext: <strong>Q19. [실수의 사칙연산]</strong><br>$(2 + \sqrt{3}) + (3 - \sqrt{3})$ 의
      값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q20:
    title: 최종 분수 정합 및 복원
    qtext: "<strong>Q20. [유리화와 혼합 계산]</strong><br>$\frac{\\sqrt{3}}{\\sqrt{2}} + \f\
      rac{\\sqrt{2}}{\\sqrt{3}}$ 을 계산하여 분모를 유리화한 값을 구하시오. (예: 5√6/6)"
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5√6/6' || ans === '5루트6/6'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
