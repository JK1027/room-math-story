questions:
  q1:
    title: 시간 기어의 차수 판별
    qtext: <strong>Q1. [이차방정식 판별]</strong><br>다음 보기 중 이차방정식인 것의 번호를 쓰시오.<br>(1) $2x
      - 5 = 0$<br>(2) $x^2 - 3x + 2 = 0$<br>(3) $x^3 + x^2 - 1 = 0$<br>(4) $x^2 -
      (x^2 - 2x) = 0$
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2' || ans === '(2)' || ans === '2번'
    options:
    - (1)
    - (2)
    - (3)
    - (4)
    placeholder: '번호 입력 (예: 2)'
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q2:
    title: 동력축 대칭 회전
    qtext: '<strong>Q2. [이차방정식의 기본 해]</strong><br>이차방정식 $x^2 - 4 = 0$ 의 두 근을 구하시오.
      (단, 답이 2개인 경우 ± 기호를 사용해 나타내시오. 예: ±2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '±2' || ans === '+-2' || ans === '2,-2' || ans === '-2,2'
    options:
    - ±2
    - ±2 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q3:
    title: 시간의 한 근 동조
    qtext: <strong>Q3. [근의 대입과 상수]</strong><br>$x=2$ 가 이차방정식 $x^2 - ax + 6 = 0$ 의
      한 근일 때, 상수 $a$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    options:
    - '10'
    - '3'
    - '7'
    - '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q4:
    title: 분할 인수의 해
    qtext: '<strong>Q4. [인수분해된 식의 해]</strong><br>이차방정식 $(x-3)(x+2) = 0$ 의 두 근을 구하시오.
      (작은 수부터 쉼표로 구분하여 적으시오. 예: -2, 3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-2,3'
    options:
    - '-2'
    - '3'
    - '-2'
    - 3 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q5:
    title: 이차식 동조율 인수분해
    qtext: '<strong>Q5. [인수분해를 이용한 풀이]</strong><br>이차방정식 $x^2 - 5x + 6 = 0$ 의 두 근을
      구하시오. (작은 수부터 적으시오. 예: 2, 3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2,3'
    options:
    - '2'
    - '3'
    - '2'
    - 3 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q6:
    title: 중첩된 시간의 근(중근)
    qtext: <strong>Q6. [중근 구하기]</strong><br>이차방정식 $x^2 - 8x + 16 = 0$ 의 근을 구하시오. (숫자만
      입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4'
    options:
    - '4'
    - '6'
    - '2'
    - '8'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q7:
    title: 중근 가용 계수 산출
    qtext: <strong>Q7. [중근을 가질 조건]</strong><br>이차방정식 $x^2 + ax + 9 = 0$ 이 중근을 가질 때,
      양수 $a$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '6'
    options:
    - '4'
    - '6'
    - '8'
    - '12'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q8:
    title: 완전제곱 궤적의 근
    qtext: '<strong>Q8. [완전제곱식을 이용한 풀이]</strong><br>이차방정식 $(x-2)^2 = 5$ 의 근을 구하시오.
      (기호 ±와 루트를 사용하여 공백 없이 나타내시오. 예: 2±√5)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2±√5' || ans === '2+-√5' || ans === '2+√5,2-√5' || ans ===
      '2-√5,2+√5'
    options:
    - ±2√5
    - ±2√5 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q9:
    title: 완전제곱식 유도 변형
    qtext: <strong>Q9. [완전제곱식 만들기]</strong><br>이차방정식 $x^2 - 6x + 2 = 0$ 을 $(x-p)^2
      = q$ 꼴로 고칠 때, 두 상수 $p, q$에 대하여 $p+q$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8'
    options:
    - '16'
    - '6'
    - '8'
    - '10'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q10:
    title: 공식 분모 계수 정합
    qtext: <strong>Q10. [근의 공식의 적용]</strong><br>근의 공식을 사용하여 이차방정식 $x^2 - 3x + 1 =
      0$ 의 근을 구할 때, 분모에 들어갈 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    options:
    - '4'
    - '2'
    - '0'
    - '10'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q11:
    title: 근의 공식 실전 해독
    qtext: '<strong>Q11. [근의 공식 활용]</strong><br>이차방정식 $x^2 - 4x - 1 = 0$ 의 근을 구하시오.
      (근의 공식을 활용하여 공백 없이 나타내시오. 예: 2±√5)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2±√5' || ans === '2+-√5' || ans === '2+√5,2-√5' || ans ===
      '2-√5,2+√5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q12:
    title: 분수 근의 조합
    qtext: '<strong>Q12. [계수가 양수인 이차방정식]</strong><br>이차방정식 $2x^2 + 5x - 3 = 0$ 의 두
      근을 구하시오. (작은 수부터 적으시오. 분수는 슬래시로 표현하시오. 예: -3, 1/2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-3,1/2'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q13:
    title: 전개형 기어의 통합 해
    qtext: '<strong>Q13. [식의 정리 후 풀이]</strong><br>이차방정식 $(x-1)(x-2) = 6$ 의 두 근을 구하시오.
      (작은 수부터 쉼표로 구분하여 적으시오. 예: -1, 4)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-1,4'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q14:
    title: 두 근의 역추적 작성
    qtext: '<strong>Q14. [이차방정식 세우기]</strong><br>두 근이 -2와 5 이고 $x^2$의 계수가 1인 이차방정식을
      구하시오. (공백 없이 대문자로 예: X^2-3X-10=0)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'X²-3X-10=0' || ans === 'X^2-3X-10=0'
    options:
    - X²-3X-10=0
    - X²-3X-10=0 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q15:
    title: 양의 궤적 축 선별
    qtext: <strong>Q15. [양수인 근 구하기]</strong><br>이차방정식 $x^2 + 4x - 5 = 0$ 의 두 근 중 양수인
      근을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q16:
    title: 상수 유도 제거 회선
    qtext: '<strong>Q16. [공통인수를 이용한 풀이]</strong><br>이차방정식 $x^2 - 2x = 0$ 의 두 근을 구하시오.
      (작은 수부터 적으시오. 예: 0, 2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '0,2'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q17:
    title: 정수 회전축 필터링
    qtext: <strong>Q17. [해의 조건 판별]</strong><br>이차방정식 $3x^2 - 7x + 2 = 0$ 의 두 근 중 정수인
      근을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q18:
    title: 완전 정합의 중근
    qtext: <strong>Q18. [완전제곱식과 중근]</strong><br>이차방정식 $x^2 - 6x + 9 = 0$ 의 중근을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q19:
    title: 연속 기어의 크기
    qtext: <strong>Q19. [이차방정식의 실생활 활용]</strong><br>연속하는 두 자연수의 곱이 56일 때, 두 자연수 중
      큰 수를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q20:
    title: 최종 제동 도달 시간
    qtext: '<strong>Q20. [이차방정식 최종 활용]</strong><br>지면에서 초속 30m로 똑바로 쏘아 올린 물체의 $t$초
      후의 높이가 $30t - 5t^2$ (m)이다. 이 물체의 높이가 40m가 되는 시점은 몇 초 후인지 모두 구하시오. (오름차순으로 쉼표로
      구분하여 적으시오. 예: 2, 4)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2,4'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
