questions:
  q1:
    title: 대표 스펙트럼 분류
    qtext: '<strong>Q1. [대푯값의 정의]</strong><br>자료 전체의 특징을 대표적으로 나타내는 값을 통틀어 무엇이라 부르는가?
      (한글 세 글자로 입력. 예: 대푯값)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '대푯값'
    options:
    - 대푯값
    - 평균값
    - 변량값
    - 중앙값
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q2:
    title: 스펙트럼 평균 락
    qtext: '<strong>Q2. [평균의 정의]</strong><br>자료의 값을 모두 더하여 자료의 개수로 나눈 값을 구하시오. (한글
      두 글자로 입력. 예: 평균)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '평균'
    options:
    - 평균
    - 합계
    - 분산
    - 편차
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q3:
    title: 중앙 궤도 주파수
    qtext: '<strong>Q3. [중앙값의 정의]</strong><br>자료의 값을 크기순으로 나열했을 때 가장 한가운데에 위치하는 값을
      무엇이라 하는가? (한글 세 글자로 입력. 예: 중앙값)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '중앙값'
    options:
    - 중앙값
    - 최빈값
    - 대푯값
    - 평균값
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q4:
    title: 최다 검출 성분
    qtext: '<strong>Q4. [최빈값의 정의]</strong><br>자료의 값 중 가장 자주 나타나는 값을 무엇이라 하는가? (한글
      세 글자로 입력. 예: 최빈값)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '최빈값'
    options:
    - 최빈값
    - 중앙값
    - 대푯값
    - 편차
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q5:
    title: 원소 데이터 평균 보정
    qtext: <strong>Q5. [평균의 계산]</strong><br>다섯 개의 우주 변량 데이터 1, 3, 5, 7, 9 의 평균을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    options:
    - '10'
    - '3'
    - '7'
    - '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q6:
    title: 짝수 궤도 중앙 제어
    qtext: <strong>Q6. [중앙값의 계산]</strong><br>여섯 개의 우주 데이터 2, 4, 6, 8, 10, 12 의 중앙값을
      구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '7'
    options:
    - '5'
    - '14'
    - '7'
    - '9'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q7:
    title: 최빈 기압 정합
    qtext: <strong>Q7. [최빈값의 계산]</strong><br>데이터 3, 5, 5, 7, 8, 8, 8 의 최빈값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8'
    options:
    - '16'
    - '6'
    - '8'
    - '10'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q8:
    title: 극단값 영향 방어
    qtext: '<strong>Q8. [중앙값의 성질]</strong><br>대푯값 중 극단적인 값(아주 크거나 아주 작은 값)에 영향을 가장
      적게 받아, 치우친 자료에 유용한 대푯값을 쓰시오. (한글 세 글자로 입력. 예: 중앙값)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '중앙값'
    options:
    - 중앙값
    - 평균값
    - 최빈값
    - 편차
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q9:
    title: 평균과의 이격 수치
    qtext: '<strong>Q9. [편차의 정의]</strong><br>변량들이 평균으로부터 떨어져 있는 차이(즉, 변량 - 평균)를 무엇이라
      부르는가? (한글 두 글자로 입력. 예: 편차)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '편차'
    options:
    - 편차
    - 분산
    - 평균
    - 제곱
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q10:
    title: 오차 편차의 총합
    qtext: <strong>Q10. [편차의 성질]</strong><br>변량들의 편차의 총합은 항상 얼마인가? (숫자 하나만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '0'
    options:
    - '-1'
    - '1'
    - '0'
    - '2'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q11:
    title: 오차 제곱 평균 분산
    qtext: '<strong>Q11. [분산의 정의]</strong><br>편차의 제곱의 평균을 구하여 산포도를 나타내는 통계 값을 무엇이라
      부르는가? (한글 두 글자로 입력. 예: 분산)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '분산'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q12:
    title: 단위 정합 표준 오차
    qtext: '<strong>Q12. [표준편차의 정의]</strong><br>분산의 음이 아닌 양의 제곱근 값을 구하여 실제 변량과 단위를
      맞춘 산포도 값을 무엇이라 하는가? (한글 네 글자로 입력. 예: 표준편차)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '표준편차'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q13:
    title: 수치 산포 분포율
    qtext: '<strong>Q13. [산포도의 정의]</strong><br>자료들의 흩어진 정도를 나타내는 하나의 수치를 통틀어 무엇이라
      하는가? (한글 세 글자로 입력. 예: 산포도)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '산포도'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q14:
    title: 원탁 분산 실제 측정
    qtext: '<strong>Q14. [분산의 계산]</strong><br>세 변량 3, 5, 7 의 분산을 구하시오. (슬래시를 사용해 분수로
      나타내시오. 예: 8/3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8/3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q15:
    title: 표준편차 빔 동조
    qtext: '<strong>Q15. [표준편차의 계산]</strong><br>네 변량 1, 3, 5, 7 의 표준편차를 구하시오. (루트
      기호를 사용하여 나타내시오. 예: √5)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '√5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q16:
    title: 상관 빔 분포 도면
    qtext: '<strong>Q16. [산점도의 정의]</strong><br>두 변량의 상관관계를 한눈에 알아보기 위해 좌표평면 위에 점으로
      나타낸 그림을 무엇이라 하는가? (한글 세 글자로 입력. 예: 산점도)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '산점도'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q17:
    title: 동반 우상향 주파수
    qtext: '<strong>Q17. [양의 상관관계]</strong><br>한 변량 $x$의 값이 증가할 때, 다른 변량 $y$의 값도 대체로
      증가하는 관계를 무슨 상관관계라 하는가? (공백 없이 한글 일곱 글자로 입력. 예: 양의상관관계)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '양의상관관계'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q18:
    title: 상쇄 우하향 주파수
    qtext: '<strong>Q18. [음의 상관관계]</strong><br>한 변량 $x$의 값이 증가할 때, 다른 변량 $y$의 값은 대체로
      감소하는 관계를 무슨 상관관계라 하는가? (공백 없이 한글 일곱 글자로 입력. 예: 음의상관관계)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '음의상관관계'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q19:
    title: 독립 인자 기압 무관계
    qtext: '<strong>Q19. [상관관계가 없는 경우]</strong><br>"사람들의 키와 지능지수(IQ) 사이의 상관관계"는 어떤
      관계가 있는지 쓰시오. (한글 세 글자로 입력. 예: 없다)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '없다'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q20:
    title: 기온과 가스 난방 밀도
    qtext: '<strong>Q20. [상관관계 실생활 활용]</strong><br>"겨울철 실외 평균 기온과 각 가정의 가스 난방비 사이의
      상관관계"는 어떤 관계가 있는지 쓰시오. (공백 없이 한글 일곱 글자로 입력. 예: 음의상관관계)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '음의상관관계'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
