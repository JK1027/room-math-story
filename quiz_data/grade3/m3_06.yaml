questions:
  q1:
    title: 원형 보호막 현 수직분해
    qtext: '<strong>Q1. [현의 수직이등분]</strong><br>원의 중심에서 현에 내린 수선은 그 현을 어떻게 하는가? (한글
      세 글자로 입력. 예: 이등분)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '이등분'
    options:
    - 이등분
    - 삼등분
    - 수직
    - 무한분
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q2:
    title: 원형 격벽 외선 길이
    qtext: <strong>Q2. [현의 길이 계산]</strong><br>원 O 의 반지름의 길이가 5 이고, 원의 중심에서 현 AB 까지의
      거리가 3 일 때, 현 AB 의 길이를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8'
    options:
    - '16'
    - '6'
    - '8'
    - '10'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q3:
    title: 이중 현의 평행비
    qtext: '<strong>Q3. [중심에서 같은 거리에 있는 현]</strong><br>한 원에서 중심으로부터 같은 거리에 있는 두 현의
      길이는 서로 어떠한가? (한글 두 글자로 입력. 예: 같다)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '같다'
    options:
    - 같다
    - 다르다
    - 절반이다
    - 두배다
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q4:
    title: 이중 실드 대칭 거리
    qtext: <strong>Q4. [현의 거리와 길이]</strong><br>원 O 에서 현 AB 의 길이가 6 이고 현 CD 의 길이도 6
      이다. 원의 중심에서 현 AB 까지의 거리가 4 일 때, 중심에서 현 CD 까지의 거리를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4'
    options:
    - '4'
    - '6'
    - '2'
    - '8'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q5:
    title: 수선 지시반 현 복원
    qtext: <strong>Q5. [현의 수직이등분의 성질]</strong><br>원 O 의 중심에서 현 AB 에 내린 수선의 발을 M 이라
      할 때, 선분 AM 의 길이가 5 이다. 현 AB 의 길이를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '10'
    options:
    - '8'
    - '10'
    - '20'
    - '12'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q6:
    title: 원 밖의 접선 대칭성
    qtext: '<strong>Q6. [접선의 길이 성질]</strong><br>원 밖의 한 점에서 그 원에 그은 두 접선의 길이는 서로 어떠한가?
      (한글 두 글자로 입력. 예: 같다)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '같다'
    options:
    - 같다
    - 다르다
    - 절반이다
    - 두배다
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q7:
    title: 접점 레이저 통로 계측
    qtext: <strong>Q7. [접선의 길이 계산]</strong><br>원 O 의 반지름의 길이가 6 이고, 원 밖의 한 점 P 에서
      원에 그은 접선 PT 의 접점 T 에 대하여 선분 OP 의 길이가 10 일 때, 접선의 길이 PT 를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '8'
    options:
    - '16'
    - '6'
    - '8'
    - '10'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q8:
    title: 원형 챔버 대각 각도
    qtext: <strong>Q8. [접선이 이루는 각]</strong><br>원 밖의 점 P 에서 두 접점 A, B 에 접선을 그어 형성된
      각 $\angle APB = 50^\circ$ 일 때, 사각형 AOBP 의 내부각 $\angle AOB$ 의 크기(도)를 구하시오. (숫자만
      적으시오.)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '130'
    options:
    - '128'
    - '132'
    - '130'
    - '260'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q9:
    title: 외접 프레임 대변합
    qtext: '<strong>Q9. [외접사각형의 성질]</strong><br>원에 외접하는 사각형의 마주 보는 두 쌍의 대변의 길이의 합은
      서로 어떠한가? (한글 두 글자로 입력. 예: 같다)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '같다'
    options:
    - 같다
    - 다르다
    - 절반이다
    - 두배다
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q10:
    title: 원주 주파수 비율
    qtext: '<strong>Q10. [원주각과 중심각]</strong><br>한 호에 대한 원주각의 크기는 그 호에 대한 중심각의 크기의
      몇 배인가? (슬래시를 사용해 분수로 쓰시오. 예: 1/2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1/2' || ans === '0.5'
    options:
    - 1/2
    - '2'
    - 1/3
    - '0.5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q11:
    title: 원주각 불변 법칙
    qtext: '<strong>Q11. [호에 대한 원주각 성질]</strong><br>한 호에 대한 원주각들의 크기는 위치에 관계없이 모두
      어떠한가? (한글 두 글자로 입력. 예: 같다)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '같다'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q12:
    title: 지름 궤도 기준각
    qtext: <strong>Q12. [지름에 대한 원주각 크기]</strong><br>반원(지름)에 대한 원주각의 크기(도)는 몇 도인가?
      (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '90'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q13:
    title: 중심각 역산 원주각
    qtext: <strong>Q13. [원주각의 크기 구하기]</strong><br>원 O 에서 호 AB 에 대한 중심각의 크기가 $80^\circ$
      일 때, 원주각 $\angle APB$ 의 크기(도)를 구하시오. (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '40'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q14:
    title: 원주각 순산 중심각
    qtext: <strong>Q14. [중심각의 크기 구하기]</strong><br>원 O 에서 한 호에 대한 원주각의 크기가 $35^\circ$
      일 때, 동일한 호에 대한 중심각의 크기(도)를 구하시오. (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '70'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q15:
    title: 지름 내접 삼각 각도
    qtext: <strong>Q15. [지름을 포함한 직각삼각형]</strong><br>지름 AB 를 지나는 원주각 $\angle ACB$ 가
      형성되어 있는 원 O 에서, $\angle A = 50^\circ$ 일 때, 각 $\angle B$ 의 크기(도)를 구하시오. (숫자만
      입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '40'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q16:
    title: 내접 사각형 마주 보는 각
    qtext: <strong>Q16. [내접사각형의 대각의 합]</strong><br>원에 내접하는 사각형에서 한 쌍의 대각의 크기의 합은 몇
      도인가? (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '180'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q17:
    title: 내접 프레임 대각 계측
    qtext: <strong>Q17. [내접사각형의 대각 계산]</strong><br>원에 내접하는 사각형 ABCD 에서 각 $\angle A
      = 75^\circ$ 일 때, 마주 보는 대각 $\angle C$ 의 크기(도)를 구하시오. (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '105'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q18:
    title: 외각 통과 내대각
    qtext: <strong>Q18. [내접사각형의 외각과 내대각]</strong><br>원에 내접하는 사각형 ABCD 의 한 외각의 크기가
      $85^\circ$ 일 때, 이와 이웃하지 않는 대각(내대각)의 크기(도)를 구하시오. (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '85'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q19:
    title: 접선-현 진동각 궤적
    qtext: <strong>Q19. [접선과 현이 이루는 각]</strong><br>원 O 의 접선 PT 에 대하여 접점 T 를 지나는 현
      TA 가 만드는 각 $\angle ATP = 60^\circ$ 일 때, 그 현에 대한 원주각의 크기(도)를 구하시오. (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '60'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q20:
    title: 동일 호 원주각 비율
    qtext: '<strong>Q20. [원주각의 크기와 호의 길이]</strong><br>원 O 에서 길이가 서로 같은 두 호에 대한 두 원주각의
      크기의 비율은 몇 대 몇인지 수치 비율로 적으시오. (예: 1)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
