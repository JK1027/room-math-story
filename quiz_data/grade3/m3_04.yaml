questions:
  q1:
    title: 사이버 비행 함수 감지
    qtext: "<strong>Q1. [이차함수 판별]</strong><br>다음 보기 중 $y$가 $x$에 대한 이차함수인 것의 번호를 쓰시오.<br>(1)\
      \ $y = 3x - 1$<br>(2) $y = x^2 - 4$<br>(3) $y = \frac{2}{x}$<br>(4) $y = 2^x$"
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2' || ans === '(2)' || ans === '2번'
    options:
    - (1)
    - (2)
    - (3)
    - (4)
    placeholder: '번호 입력 (예: 2)'
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q2:
    title: 기본 비행 코어 꼭짓점
    qtext: '<strong>Q2. [기본형의 꼭짓점]</strong><br>이차함수 $y=3x^2$ 그래프의 꼭짓점 좌표를 구하시오. (괄호를
      포함하여 공백 없이 적으시오. 예: (0,0))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(0,0)' || ans === '0,0'
    options:
    - (0
    - 0)
    - (0
    - 0) 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q3:
    title: 중앙 조향 대칭축
    qtext: '<strong>Q3. [기본형의 대칭축]</strong><br>이차함수 $y=-2x^2$ 그래프의 대칭축(축의 방정식)을 구하시오.
      (공백 없이 예: x=0)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'X=0'
    options:
    - X=0
    - X=0 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q4:
    title: 궤도 통과 계수 유도
    qtext: <strong>Q4. [좌표의 대입]</strong><br>이차함수 $y=ax^2$ 의 그래프가 점 $(2,8)$ 을 지날 때,
      상수 $a$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2'
    options:
    - '4'
    - '2'
    - '0'
    - '10'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q5:
    title: y축 방향 수직 천이
    qtext: '<strong>Q5. [y축 평행이동]</strong><br>이차함수 $y=x^2$ 의 그래프를 $y$축의 양의 방향으로 3만큼
      평행이동한 그래프의 식을 구하시오. (공백 없이 대문자로 예: y=x^2+3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'Y=X²+3' || ans === 'Y=X^2+3'
    options:
    - Y=X²+3
    - Y=X²+3 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q6:
    title: 수평 비행 평행이동
    qtext: '<strong>Q6. [x축 평행이동 꼭짓점]</strong><br>이차함수 $y=3(x-1)^2$ 그래프의 꼭짓점 좌표를 구하시오.
      (괄호를 포함하여 공백 없이 적으시오. 예: (1,0))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(1,0)' || ans === '1,0'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q7:
    title: 복합 입체 꼭짓점 좌표
    qtext: '<strong>Q7. [표준형의 꼭짓점]</strong><br>이차함수 $y=-(x-2)^2 + 4$ 그래프의 꼭짓점 좌표를
      구하시오. (괄호를 포함하여 공백 없이 적으시오. 예: (2,4))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(2,4)' || ans === '2,4'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q8:
    title: 표준형 대칭축
    qtext: '<strong>Q8. [표준형의 대칭축]</strong><br>이차함수 $y=2(x+3)^2 - 5$ 그래프의 대칭축의 방정식을
      구하시오. (공백 없이 예: x=-3)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'X=-3'
    options:
    - X=-3
    - X=-3 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q9:
    title: 레이저 레이더 원점 절편
    qtext: <strong>Q9. [y축과의 교점]</strong><br>이차함수 $y=(x-1)^2 + 2$ 그래프가 $y$축과 만나는 점의
      $y$좌표를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    options:
    - '6'
    - '1'
    - '3'
    - '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q10:
    title: 중앙 반전 궤도
    qtext: '<strong>Q10. [대칭인 그래프]</strong><br>이차함수 $y=-x^2$ 의 그래프와 $x$축에 대하여 서로 대칭인
      그래프의 식을 구하시오. (공백 없이 대문자로 예: y=x^2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'Y=X²' || ans === 'Y=X^2'
    options:
    - Y=X²
    - Y=X² 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q11:
    title: 일반 궤도의 기하 분석
    qtext: <strong>Q11. [일반형을 표준형으로 변형]</strong><br>이차함수 $y=x^2 - 4x + 7$ 을 표준형 $y=a(x-p)^2+q$
      꼴로 나타낼 때, 세 상수 $a, p, q$에 대하여 $a+p+q$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '6'
    options:
    - '4'
    - '6'
    - '8'
    - '12'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q12:
    title: 일반형 꼭짓점 도출
    qtext: '<strong>Q12. [일반형의 꼭짓점]</strong><br>이차함수 $y=x^2 - 6x + 5$ 그래프의 꼭짓점 좌표를
      구하시오. (괄호를 포함하여 공백 없이 적으시오. 예: (3,-4))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(3,-4)' || ans === '3,-4'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q13:
    title: 가로 활주로 교점
    qtext: '<strong>Q13. [x축과의 교점의 x좌표]</strong><br>이차함수 $y=x^2 + 2x - 3$ 그래프가 $x$축과
      만나는 두 점의 $x$좌표를 구하시오. (작은 수부터 적으시오. 예: -3, 1)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-3,1'
    options:
    - '-3'
    - '1'
    - '-3'
    - 1 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q14:
    title: 최고 정밀 고도 계측
    qtext: <strong>Q14. [꼭짓점의 y좌표]</strong><br>이차함수 $y=-2x^2 + 8x - 5$ 그래프의 꼭짓점의 $y$좌표를
      구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3'
    options:
    - '6'
    - '1'
    - '3'
    - '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q15:
    title: 중앙 조향 대칭축 복원
    qtext: '<strong>Q15. [일반형의 대칭축]</strong><br>이차함수 $y=x^2 - 4x$ 그래프의 대칭축의 방정식을 구하시오.
      (공백 없이 예: x=2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'X=2'
    options:
    - X=2
    - X=2 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q16:
    title: 포물선 조향 극성
    qtext: '<strong>Q16. [이차함수 그래프의 볼록한 방향]</strong><br>이차함수 $y=ax^2+bx+c$ 의 그래프 모양이
      아래로 볼록할 때, $a$의 값의 부호를 쓰시오. (기호를 포함해 예: >0)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '>0'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q17:
    title: 원점 통과 빔 참거짓
    qtext: <strong>Q17. [함수와 원점 통과]</strong><br>"이차함수 $y=x^2 + 2x$ 의 그래프는 항상 원점$(0,0)$을
      지난다." 이 명제가 맞으면 참, 틀리면 거짓을 쓰시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '참'
    placeholder: 참 또는 거짓 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q18:
    title: y축 접지 도킹 고도
    qtext: <strong>Q18. [일반형의 y절편]</strong><br>이차함수 $y=x^2 - 2x - 3$ 그래프가 $y$축과 만나는
      점의 $y$좌표를 구하시오. (음수 마이너스 포함 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-3'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q19:
    title: 최저 안착 한도 고도
    qtext: <strong>Q19. [이차함수의 최솟값]</strong><br>이차함수 $y=3(x-2)^2 + 1$ 의 최솟값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q20:
    title: 최고 회피 고도 정합
    qtext: <strong>Q20. [이차함수의 최댓값 활용]</strong><br>보안 드론의 회피 포물선 비행 궤도 식은 $y = -x^2
      + 4x$ 이다. 이 드론이 도달할 수 있는 가장 높은 지점의 높이($y$좌표)를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
