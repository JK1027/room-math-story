questions:
  q1:
    title: 배합식의 기본 전개
    qtext: <strong>Q1. [다항식의 전개]</strong><br>$(x+2)(x+3)$ 을 전개했을 때, $x$의 계수를 구하시오.
      (숫자만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '5'
    options:
    - '10'
    - '3'
    - '7'
    - '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q2:
    title: 완전제곱식 조제
    qtext: '<strong>Q2. [완전제곱식의 전개 1]</strong><br>$(x+3)^2$ 을 전개한 식을 구하시오. (공백 없이
      대문자로 예: X^2+6X+9)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'X²+6X+9' || ans === 'X^2+6X+9'
    options:
    - X²+6X+9
    - X²+6X+9 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q3:
    title: 음수 항의 대칭성
    qtext: '<strong>Q3. [완전제곱식의 전개 2]</strong><br>$(2a-b)^2$ 을 전개한 식을 구하시오. (공백 없이
      대문자로 예: 4A^2-4AB+B^2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '4A²-4AB+B²' || ans === '4A^2-4AB+B^2'
    options:
    - 4A²-4AB+B²
    - 4A²-4AB+B² 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q4:
    title: 합차 공식의 융합
    qtext: '<strong>Q4. [합차 공식의 전개]</strong><br>$(x+4)(x-4)$ 을 전개한 식을 구하시오. (공백 없이
      대문자로 예: X^2-16)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === 'X²-16' || ans === 'X^2-16'
    options:
    - X²-16
    - X²-16 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q5:
    title: 상수 유도 연산
    qtext: <strong>Q5. [전개와 상수항]</strong><br>$(x-3)(x+5)$ 을 전개했을 때, 상수항의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-15'
    options:
    - '-17'
    - '-30'
    - '-13'
    - '-15'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q6:
    title: 계수 혼합 분석
    qtext: <strong>Q6. [복잡한 식의 계수]</strong><br>$(2x+1)(3x-2)$ 을 전개했을 때, $x$의 계수를 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '-1'
    options:
    - '-3'
    - '-1'
    - '1'
    - '-2'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q7:
    title: 편리한 배합 공식 선별
    qtext: <strong>Q7. [곱셈공식의 활용 선별]</strong><br>곱셈 공식을 이용하여 $101^2$ 의 값을 가장 편리하게
      계산할 수 있는 공식의 번호를 선택하시오.<br>(1) $(a+b)^2 = a^2+2ab+b^2$<br>(2) $(a-b)^2 = a^2-2ab+b^2$<br>(3)
      $(a+b)(a-b) = a^2-b^2$
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '1' || ans === '(1)' || ans === '1번'
    options:
    - (1)
    - (2)
    - (3)
    placeholder: '번호 입력 (예: 1)'
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q8:
    title: 공통 약수의 격리
    qtext: '<strong>Q8. [공통인수의 추출]</strong><br>다항식 $2a^2b - 4ab^2$ 을 인수분해할 때, 꺼내야
      할 가장 큰 공통인수를 구하시오. (공백 없이 대문자로 예: 2AB)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2AB'
    options:
    - 2AB
    - 2AB 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q9:
    title: 노심 밸브의 압축 정합
    qtext: '<strong>Q9. [완전제곱식 인수분해]</strong><br>$x^2 + 6x + 9$ 를 인수분해한 식을 구하시오. (공백
      없이 대문자로 예: (X+3)^2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(X+3)^2' || ans === '(X+3)²'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q10:
    title: 노심 제동 계수 산출
    qtext: <strong>Q10. [완전제곱식이 될 조건]</strong><br>이차식 $x^2 - 10x + a$ 가 완전제곱식이 되기
      위한 상수 $a$의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '25'
    options:
    - '27'
    - '50'
    - '25'
    - '23'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q11:
    title: 사다리꼴 배합 게이트 1
    qtext: '<strong>Q11. [제곱의 차 인수분해]</strong><br>$a^2 - 16$ 을 인수분해한 식을 구하시오. (공백
      없이 대문자로 예: (A+4)(A-4))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(A+4)(A-4)' || ans === '(A-4)(A+4)'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q12:
    title: 사다리꼴 배합 게이트 2
    qtext: '<strong>Q13. [복합 합차 인수분해]</strong><br>$x^2 - 4y^2$ 을 인수분해한 식을 구하시오. (공백
      없이 대문자로 예: (X+2Y)(X-2Y))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(X+2Y)(X-2Y)' || ans === '(X-2Y)(X+2Y)'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q13:
    title: 합과 곱의 마법 기어
    qtext: '<strong>Q13. [이차식의 인수분해 1]</strong><br>$x^2 + 5x + 6$ 을 인수분해한 식을 구하시오.
      (공백 없이 대문자로 예: (X+2)(X+3))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(X+2)(X+3)' || ans === '(X+3)(X+2)'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q14:
    title: 음의 부호 비약 유입
    qtext: '<strong>Q14. [이차식의 인수분해 2]</strong><br>$x^2 - 8x + 12$ 를 인수분해한 식을 구하시오.
      (공백 없이 대문자로 예: (X-2)(X-6))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(X-2)(X-6)' || ans === '(X-6)(X-2)'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q15:
    title: 대각선 기어 크로스
    qtext: '<strong>Q15. [대각선 인수분해]</strong><br>$2x^2 + 7x + 3$ 을 인수분해한 식을 구하시오. (공백
      없이 대문자로 예: (2X+1)(X+3))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '(2X+1)(X+3)' || ans === '(X+3)(2X+1)'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
  q16:
    title: 공통 약수의 선행 묶기
    qtext: '<strong>Q16. [공통인수와 인수분해]</strong><br>다항식 $3x^2 - 12$ 를 인수분해한 식을 구하시오.
      (공통인수를 먼저 묶어내어 계산하십시오. 공백 없이 대문자로 예: 3(X+2)(X-2))'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '3(X+2)(X-2)' || ans === '3(X-2)(X+2)'
    options:
    - '6'
    - '1'
    - '3'
    - '5'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q17:
    title: 현자의 수치 연산
    qtext: <strong>Q17. [인수분해와 수치 계산]</strong><br>인수분해 공식을 활용하여 $99^2 - 1$ 의 값을 구하시오.
      (최종 정수 계산 값만 입력)
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '9800'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q18:
    title: 비약 밀도 대입
    qtext: <strong>Q18. [식의 대입 계산]</strong><br>$x=98$ 일 때, 식 $x^2 + 4x + 4$ 의 값을 구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '10000'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q19:
    title: 공식 비약의 내적 가치
    qtext: <strong>Q19. [식의 값 구하기]</strong><br>$a+b=5, a-b=3$ 일 때, $a^2 - b^2$ 의 값을
      구하시오.
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '15'
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
  q20:
    title: 최종 비약 배합비의 합산
    qtext: '<strong>Q20. [일차식의 합 구하기]</strong><br>두 일차식의 곱이 $x^2 - 2x - 15$ 일 때, 이
      두 일차식의 합을 구하시오. (공백 없이 대문자로 예: 2X-2)'
    hint: 💡 힌트가 제공되지 않는 구역입니다. 연산을 신중히 전개해 보세요.
    ans_check: ans === '2X-2'
    options:
    - 2X-2
    - 2X-2 아님
    - 알 수 없음
    - 해 없음
    placeholder: 정답 입력
    error: 정답이 올바르지 않습니다. 다시 계산해보세요.
    extra_class: glitch-bg
